<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Devstack — Crosstalk Lab</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap');

    :root {
      --bg-primary:     #0a0e17;
      --bg-secondary:   #111827;
      --bg-card:        #161f30;
      --bg-input:       #1a2332;
      --border-subtle:  #1e2d42;
      --border-hover:   #2a3f5f;
      --text-primary:   #e2e8f0;
      --text-secondary: #8899b0;
      --text-muted:     #4a5a72;
      --claude-accent:  #d4a574;
      --claude-bg:      #1a1610;
      --claude-border:  #3d2e1a;
      --chatgpt-accent: #6bcf8e;
      --gemini-accent:  #7ba4f4;
      --note-yellow:    #f5e642;
      --note-bg:        #2a2510;
      --note-border:    #6b5a10;
      --radius: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      font-family: 'Source Serif 4', Georgia, serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.7;
    }

    /* ── Layout ────────────────────────────────────── */
    .layout {
      display: grid;
      grid-template-columns: 240px 1fr 260px;
      grid-template-rows: 56px 1fr;
      height: 100vh;
    }

    /* ── Header ────────────────────────────────────── */
    header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 24px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-subtle);
      font-family: 'JetBrains Mono', monospace;
    }

    .header-logo {
      font-size: 16px;
      font-weight: 700;
      color: var(--claude-accent);
      letter-spacing: -0.3px;
    }

    .header-sep {
      color: var(--text-muted);
      font-size: 18px;
    }

    .header-title {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .header-actions {
      margin-left: auto;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 5px 12px;
      border-radius: 4px;
      border: 1px solid var(--border-subtle);
      background: var(--bg-input);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn:hover { border-color: var(--border-hover); color: var(--text-primary); }
    .btn.accent { background: var(--claude-border); border-color: var(--claude-border); color: var(--claude-accent); }
    .btn.accent:hover { background: #4a3820; }

    /* ── Left Sidebar — file nav ───────────────────── */
    .sidebar-left {
      grid-row: 2;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-subtle);
      overflow-y: auto;
      padding: 20px 0;
    }

    .nav-section {
      padding: 0 16px;
      margin-bottom: 4px;
    }

    .nav-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 8px 8px 6px;
      display: block;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-secondary);
      text-decoration: none;
      user-select: none;
    }
    .nav-item:hover { background: var(--bg-card); color: var(--text-primary); }
    .nav-item.active { background: var(--claude-border); color: var(--claude-accent); }

    .nav-icon { font-size: 14px; flex-shrink: 0; }

    .nav-note-count {
      margin-left: auto;
      background: var(--note-border);
      color: var(--note-yellow);
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 10px;
      font-weight: 700;
    }

    /* ── TOC — in-page headings ────────────────────── */
    .toc-section {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border-subtle);
    }

    .toc-item {
      display: block;
      padding: 4px 18px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      transition: color 0.15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-decoration: none;
    }
    .toc-item:hover { color: var(--text-primary); }
    .toc-item.h2 { padding-left: 28px; }
    .toc-item.h3 { padding-left: 40px; font-size: 10px; }

    /* ── Main content ──────────────────────────────── */
    .content-area {
      grid-row: 2;
      overflow-y: auto;
      padding: 40px 48px;
      max-width: 100%;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }
    .empty-state .big { font-size: 40px; }
    .empty-state p { font-size: 13px; }

    /* ── Prose styles ──────────────────────────────── */
    .prose { max-width: 720px; }

    .prose h1 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 26px;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0 0 8px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .prose h2 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 700;
      color: var(--claude-accent);
      margin: 40px 0 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .prose h3 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 600;
      color: var(--gemini-accent);
      margin: 28px 0 10px;
    }

    .prose h4 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin: 20px 0 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .prose p { margin-bottom: 14px; font-size: 15px; }

    .prose ul, .prose ol {
      margin: 8px 0 16px 24px;
    }
    .prose li { margin-bottom: 6px; font-size: 15px; }

    .prose code {
      background: var(--bg-input);
      border: 1px solid var(--border-subtle);
      padding: 1px 6px;
      border-radius: 3px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--chatgpt-accent);
    }

    .prose pre {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-left: 3px solid var(--claude-border);
      padding: 16px 20px;
      border-radius: var(--radius);
      overflow-x: auto;
      margin: 16px 0;
    }
    .prose pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 13px;
      color: var(--text-primary);
    }

    .prose blockquote {
      border-left: 3px solid var(--gemini-accent);
      padding: 8px 16px;
      margin: 16px 0;
      color: var(--text-secondary);
      background: var(--bg-card);
      border-radius: 0 var(--radius) var(--radius) 0;
      font-style: italic;
    }

    .prose a { color: var(--gemini-accent); text-decoration: none; }
    .prose a:hover { text-decoration: underline; }

    .prose hr {
      border: none;
      border-top: 1px solid var(--border-subtle);
      margin: 32px 0;
    }

    .prose strong { color: var(--text-primary); }
    .prose em { color: var(--text-secondary); }

    .prose table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 14px;
    }
    .prose th {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      padding: 8px 12px;
      border-bottom: 1px solid var(--border-subtle);
      text-align: left;
    }
    .prose td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border-subtle);
      vertical-align: top;
    }
    .prose tr:hover td { background: var(--bg-card); }

    /* ── Annotation anchor buttons ─────────────────── */
    .note-anchor {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border-radius: 4px;
      background: var(--note-border);
      border: none;
      cursor: pointer;
      font-size: 11px;
      color: var(--note-yellow);
      opacity: 0.7;
      transition: opacity 0.15s;
      vertical-align: middle;
      flex-shrink: 0;
    }
    .note-anchor:hover { opacity: 1; }
    .note-anchor.has-note { opacity: 1; background: #4a3e0a; }

    /* ── Right Sidebar — annotations ──────────────── */
    .sidebar-right {
      grid-row: 2;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border-subtle);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .notes-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border-subtle);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .notes-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .note-card {
      background: var(--note-bg);
      border: 1px solid var(--note-border);
      border-radius: 6px;
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .note-card:hover { border-color: var(--note-yellow); }

    .note-card-heading {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--note-yellow);
      opacity: 0.7;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .note-card-text {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
      word-break: break-word;
    }

    .note-card-delete {
      float: right;
      margin-left: 8px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 14px;
      cursor: pointer;
      line-height: 1;
      padding: 0 2px;
    }
    .note-card-delete:hover { color: #f47068; }

    .notes-empty {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      padding: 32px 16px;
      line-height: 1.7;
    }

    /* ── Note editor modal ─────────────────────────── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    .modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      padding: 24px;
      width: 460px;
      max-width: 90vw;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    }

    .modal-heading {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--note-yellow);
      margin-bottom: 6px;
      opacity: 0.8;
    }

    .modal h3 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      color: var(--text-primary);
      margin-bottom: 16px;
    }

    .modal textarea {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 14px;
      line-height: 1.6;
      padding: 12px 14px;
      resize: vertical;
      min-height: 120px;
      outline: none;
    }
    .modal textarea:focus { border-color: var(--border-hover); }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 14px;
    }

    /* ── Scrollbar ─────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }
  </style>
</head>
<body>

<div class="layout" id="app">

  <!-- Header -->
  <header>
    <span class="header-logo">◈ Crosstalk Lab</span>
    <span class="header-sep">/</span>
    <span class="header-title" id="header-title">Devstack</span>
    <div class="header-actions">
      <button class="btn" id="btn-clear-notes" title="Clear all annotations for current file">Clear notes</button>
      <button class="btn accent" id="btn-load-file">Load .md file</button>
      <input type="file" id="file-input" accept=".md" style="display:none" />
    </div>
  </header>

  <!-- Left Sidebar -->
  <nav class="sidebar-left" id="sidebar-left">
    <div class="nav-section">
      <span class="nav-label">Layers</span>
      <div id="file-list">
        <!-- populated by JS -->
      </div>
    </div>
    <div class="nav-section toc-section">
      <span class="nav-label" style="padding-bottom:8px;display:block">On this page</span>
      <div id="toc-list">
        <!-- populated after render -->
      </div>
    </div>
  </nav>

  <!-- Content -->
  <main class="content-area" id="content-area">
    <div class="empty-state" id="empty-state">
      <span class="big">◈</span>
      <p>Select a layer from the sidebar</p>
      <p style="font-size:11px">or load a .md file directly</p>
    </div>
    <div class="prose" id="prose" style="display:none"></div>
  </main>

  <!-- Right Sidebar — Notes -->
  <aside class="sidebar-right" id="sidebar-right">
    <div class="notes-header">
      <span>Annotations</span>
      <span id="note-count" style="color:var(--note-yellow);font-size:10px"></span>
    </div>
    <div class="notes-list" id="notes-list">
      <div class="notes-empty" id="notes-empty">
        Click the <span style="color:var(--note-yellow)">✎</span> icon<br>next to any heading<br>to add an annotation.
      </div>
    </div>
  </aside>

</div>

<!-- Note editor modal -->
<div class="modal-backdrop" id="modal" style="display:none">
  <div class="modal">
    <div class="modal-heading" id="modal-heading">Note for</div>
    <h3 id="modal-title"></h3>
    <textarea id="modal-textarea" placeholder="Write your annotation here..."></textarea>
    <div class="modal-actions">
      <button class="btn" id="modal-cancel">Cancel</button>
      <button class="btn" id="modal-delete" style="color:#f47068;border-color:#3a1a1a">Delete note</button>
      <button class="btn accent" id="modal-save">Save</button>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// Known layers — edit this list to add new ones
// ─────────────────────────────────────────────
const LAYERS = [
  { id: 'overview',  label: 'Overview',      icon: '◎', file: 'devstack-overview.md' },
  { id: 'auth',      label: 'Auth',           icon: '⊙', file: 'devstack-auth.md' },
  { id: 'workers',   label: 'Workers',        icon: '⊗', file: 'devstack-workers.md' },
  { id: 'api',       label: 'API / CORS',     icon: '⊕', file: 'devstack-api.md' },
  { id: 'storage',   label: 'Storage',        icon: '⊞', file: 'devstack-storage.md' },
  { id: 'security',  label: 'Security',       icon: '⊘', file: 'devstack-security.md' },
  { id: 'dns',       label: 'DNS',            icon: '⊛', file: 'devstack-dns.md' },
  { id: 'hosting',   label: 'Hosting',        icon: '⊡', file: 'devstack-hosting.md' },
  { id: 'frontend',  label: 'Frontend',       icon: '⊠', file: 'devstack-frontend.md' },
];

// ─────────────────────────────────────────────
// State
// ─────────────────────────────────────────────
let currentFileId = null;   // layer id or '__custom__'
let currentFileName = null; // for localStorage key
let modalAnchorId = null;

// ─────────────────────────────────────────────
// localStorage helpers
// ─────────────────────────────────────────────
function storageKey(fileId) {
  return `devstack-notes::${fileId}`;
}

function getNotes(fileId) {
  try {
    const raw = localStorage.getItem(storageKey(fileId));
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}

function saveNotes(fileId, notes) {
  localStorage.setItem(storageKey(fileId), JSON.stringify(notes));
}

function noteCount(fileId) {
  const n = getNotes(fileId);
  return Object.keys(n).length;
}

// ─────────────────────────────────────────────
// Sidebar — file list
// ─────────────────────────────────────────────
function renderFileList() {
  const el = document.getElementById('file-list');
  el.innerHTML = '';
  LAYERS.forEach(layer => {
    const count = noteCount(layer.id);
    const div = document.createElement('div');
    div.className = 'nav-item' + (currentFileId === layer.id ? ' active' : '');
    div.dataset.id = layer.id;
    div.innerHTML = `
      <span class="nav-icon">${layer.icon}</span>
      <span>${layer.label}</span>
      ${count > 0 ? `<span class="nav-note-count">${count}</span>` : ''}
    `;
    div.addEventListener('click', () => loadLayer(layer));
    el.appendChild(div);
  });
}

// ─────────────────────────────────────────────
// TOC from rendered headings
// ─────────────────────────────────────────────
function buildTOC() {
  const toc = document.getElementById('toc-list');
  toc.innerHTML = '';
  const headings = document.querySelectorAll('#prose h1, #prose h2, #prose h3');
  headings.forEach(h => {
    const level = h.tagName.toLowerCase();
    const a = document.createElement('a');
    a.href = '#';
    a.className = `toc-item ${level}`;
    a.textContent = h.dataset.plaintext || h.textContent.replace('✎', '').trim();
    a.addEventListener('click', e => {
      e.preventDefault();
      h.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    toc.appendChild(a);
  });
}

// ─────────────────────────────────────────────
// Annotations panel
// ─────────────────────────────────────────────
function renderNotesPanel() {
  if (!currentFileId) return;
  const notes = getNotes(currentFileId);
  const list = document.getElementById('notes-list');
  const empty = document.getElementById('notes-empty');
  const count = document.getElementById('note-count');
  const keys = Object.keys(notes);

  count.textContent = keys.length > 0 ? `${keys.length} note${keys.length > 1 ? 's' : ''}` : '';

  list.innerHTML = '';
  if (keys.length === 0) {
    list.appendChild(empty);
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';

  keys.forEach(anchorId => {
    const { heading, text } = notes[anchorId];
    const card = document.createElement('div');
    card.className = 'note-card';
    card.innerHTML = `
      <div class="note-card-heading">${escapeHtml(heading)}</div>
      <div class="note-card-text">
        <button class="note-card-delete" data-anchor="${escapeHtml(anchorId)}" title="Delete note">×</button>
        ${escapeHtml(text)}
      </div>
    `;
    card.querySelector('.note-card-delete').addEventListener('click', e => {
      e.stopPropagation();
      deleteNote(anchorId);
    });
    card.addEventListener('click', () => {
      // Scroll to heading in content
      const heading = document.querySelector(`[data-anchor-id="${CSS.escape(anchorId)}"]`);
      if (heading) heading.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    list.appendChild(card);
  });

  // Update anchor button states
  updateAnchorButtons();
  // Update sidebar counts
  renderFileList();
}

function updateAnchorButtons() {
  if (!currentFileId) return;
  const notes = getNotes(currentFileId);
  document.querySelectorAll('.note-anchor').forEach(btn => {
    const id = btn.dataset.anchor;
    if (notes[id]) {
      btn.classList.add('has-note');
      btn.title = 'Edit annotation';
    } else {
      btn.classList.remove('has-note');
      btn.title = 'Add annotation';
    }
  });
}

function deleteNote(anchorId) {
  if (!currentFileId) return;
  const notes = getNotes(currentFileId);
  delete notes[anchorId];
  saveNotes(currentFileId, notes);
  renderNotesPanel();
}

// ─────────────────────────────────────────────
// Post-render: inject annotation anchors into headings
// ─────────────────────────────────────────────
function injectAnchors() {
  const headings = document.querySelectorAll('#prose h2, #prose h3');
  headings.forEach((h, i) => {
    const text = h.textContent.trim();
    const anchorId = slugify(text) + '-' + i;
    h.dataset.anchorId = anchorId;

    // Store plain text for TOC
    h.dataset.plaintext = text;

    // Wrap existing content
    const span = document.createElement('span');
    span.textContent = text;

    const btn = document.createElement('button');
    btn.className = 'note-anchor';
    btn.dataset.anchor = anchorId;
    btn.title = 'Add annotation';
    btn.innerHTML = '✎';
    btn.addEventListener('click', e => {
      e.stopPropagation();
      openModal(anchorId, text);
    });

    h.textContent = '';
    h.appendChild(span);
    h.appendChild(btn);
  });
  updateAnchorButtons();
}

function slugify(str) {
  return str.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─────────────────────────────────────────────
// Modal
// ─────────────────────────────────────────────
function openModal(anchorId, headingText) {
  modalAnchorId = anchorId;
  const notes = getNotes(currentFileId);
  const existing = notes[anchorId];

  document.getElementById('modal-heading').textContent = 'Annotation for';
  document.getElementById('modal-title').textContent = headingText;
  document.getElementById('modal-textarea').value = existing ? existing.text : '';
  document.getElementById('modal-delete').style.display = existing ? '' : 'none';

  document.getElementById('modal').style.display = 'flex';
  setTimeout(() => document.getElementById('modal-textarea').focus(), 50);
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
  modalAnchorId = null;
}

document.getElementById('modal-save').addEventListener('click', () => {
  const text = document.getElementById('modal-textarea').value.trim();
  if (!text || !currentFileId || !modalAnchorId) { closeModal(); return; }

  const headingEl = document.querySelector(`[data-anchor-id="${CSS.escape(modalAnchorId)}"]`);
  const headingText = headingEl ? (headingEl.dataset.plaintext || headingEl.textContent.replace('✎','').trim()) : modalAnchorId;

  const notes = getNotes(currentFileId);
  notes[modalAnchorId] = { heading: headingText, text };
  saveNotes(currentFileId, notes);
  closeModal();
  renderNotesPanel();
});

document.getElementById('modal-delete').addEventListener('click', () => {
  if (modalAnchorId && currentFileId) deleteNote(modalAnchorId);
  closeModal();
});

document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
    if (document.getElementById('modal').style.display !== 'none') {
      document.getElementById('modal-save').click();
    }
  }
});

// ─────────────────────────────────────────────
// Rendering
// ─────────────────────────────────────────────
function renderMarkdown(markdown, fileId, label) {
  currentFileId = fileId;

  document.getElementById('empty-state').style.display = 'none';
  const prose = document.getElementById('prose');
  prose.style.display = '';

  // Configure marked
  marked.setOptions({ breaks: true, gfm: true });
  prose.innerHTML = marked.parse(markdown);

  // Inject annotation anchors
  injectAnchors();

  // Build TOC
  buildTOC();

  // Render notes panel
  renderNotesPanel();

  // Update header
  document.getElementById('header-title').textContent = label || fileId;

  // Scroll to top
  document.getElementById('content-area').scrollTop = 0;

  // Update sidebar active state
  renderFileList();
}

// ─────────────────────────────────────────────
// Load layer from same directory (relative fetch)
// ─────────────────────────────────────────────
async function loadLayer(layer) {
  try {
    const resp = await fetch(layer.file);
    if (!resp.ok) {
      showError(`Could not load ${layer.file} — is the file in the same directory?`);
      return;
    }
    const md = await resp.text();
    renderMarkdown(md, layer.id, layer.label);
  } catch(e) {
    showError(`Could not load ${layer.file}. If running locally (file://), use a local server instead.<br><small>python3 -m http.server 8000</small>`);
  }
}

// ─────────────────────────────────────────────
// Load arbitrary .md file
// ─────────────────────────────────────────────
document.getElementById('btn-load-file').addEventListener('click', () => {
  document.getElementById('file-input').click();
});

document.getElementById('file-input').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  const text = await file.text();
  const id = '__custom__::' + file.name;
  renderMarkdown(text, id, file.name.replace('.md',''));
  e.target.value = '';
});

// ─────────────────────────────────────────────
// Clear notes
// ─────────────────────────────────────────────
document.getElementById('btn-clear-notes').addEventListener('click', () => {
  if (!currentFileId) return;
  const count = noteCount(currentFileId);
  if (count === 0) return;
  if (confirm(`Delete all ${count} annotation(s) for this file?`)) {
    localStorage.removeItem(storageKey(currentFileId));
    renderNotesPanel();
    renderFileList();
  }
});

// ─────────────────────────────────────────────
// Error display
// ─────────────────────────────────────────────
function showError(msg) {
  document.getElementById('empty-state').style.display = 'none';
  const prose = document.getElementById('prose');
  prose.style.display = '';
  prose.innerHTML = `
    <div style="
      padding: 24px; background: rgba(244,112,104,0.08);
      border: 1px solid rgba(244,112,104,0.3); border-radius: 8px;
      font-family: JetBrains Mono, monospace; font-size: 13px; color: #f47068;
    ">${msg}</div>`;
}

// ─────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────
renderFileList();
</script>
