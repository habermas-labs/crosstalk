  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap');

    :root {
      --bg-primary: #0a0e17;
      --bg-secondary: #111827;
      --bg-card: #161f30;
      --bg-input: #1a2332;
      --border-subtle: #1e2d42;
      --border-hover: #2a3f5f;
      --text-primary: #e2e8f0;
      --text-secondary: #8899b0;
      --text-muted: #4a5a72;
      --claude-accent: #d4a574;
      --claude-bg: #1a1610;
      --claude-border: #3d2e1a;
      --chatgpt-accent: #6bcf8e;
      --chatgpt-bg: #101a14;
      --chatgpt-border: #1a3d24;
      --gemini-accent: #7ba4f4;
      --gemini-bg: #10141f;
      --gemini-border: #1a2a4d;
      --grok-accent: #9ab0c4;
      --grok-bg: #0f1418;
      --grok-border: #1c2830;
      --mistral-accent: #e8944a;
      --mistral-bg: #1a1008;
      --mistral-border: #3d2010;
      --deepseek-accent: #4ec4b0;
      --deepseek-bg: #081818;
      --deepseek-border: #103030;
      --radius: 8px;
      --shadow: 0 4px 24px rgba(0,0,0,0.3);
    }

    [data-theme="light"] {
      --bg-primary: #f0f2f6;
      --bg-secondary: #e4e8f0;
      --bg-card: #dde3ed;
      --bg-input: #d6dce8;
      --border-subtle: #c4cdde;
      --border-hover: #a8b8d0;
      --text-primary: #1a1f2e;
      --text-secondary: #4a5878;
      --text-muted: #8896b0;
      --claude-accent: #b8833a;
      --claude-bg: #f5ede0;
      --claude-border: #d4b48a;
      --chatgpt-accent: #2a9e5c;
      --chatgpt-bg: #e4f5ec;
      --chatgpt-border: #8ed4b0;
      --gemini-accent: #3a6ed4;
      --gemini-bg: #e4ecf8;
      --gemini-border: #90aee8;
      --grok-accent: #4a6880;
      --grok-bg: #e4edf4;
      --grok-border: #90b0c8;
      --mistral-accent: #b85c10;
      --mistral-bg: #faeee0;
      --mistral-border: #e8b080;
      --deepseek-accent: #0a8878;
      --deepseek-bg: #d8f4f0;
      --deepseek-border: #70c8b8;
      --shadow: 0 4px 24px rgba(0,0,0,0.12);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Source Serif 4', Georgia, serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
      transition: background 0.3s ease, color 0.3s ease;
    }

    #root { min-height: 100vh; }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

    @keyframes carouselFade {
      0%   { opacity: 0; }
      12%  { opacity: 1; }
      78%  { opacity: 1; }
      92%  { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes carouselFadeLast {
      0%   { opacity: 0; }
      15%  { opacity: 1; }
      100% { opacity: 1; }
    }
    .carousel-word {
      display: inline;
      animation: carouselFade 3.6s ease-in-out forwards;
    }
    .carousel-word-last {
      display: inline;
      animation: carouselFadeLast 3.6s ease-in-out forwards;
    }
    @keyframes taglineFade {
      0%   { opacity: 0; }
      100% { opacity: 1; }
    }

    /* ── Left Sidebar ── */
    .ct-layout {
      display: flex;
      min-height: 100vh;
      align-items: stretch;
    }
    .ct-sidebar-left {
      width: 240px;
      min-width: 240px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      transition: width 0.22s ease, min-width 0.22s ease, opacity 0.18s ease;
      flex-shrink: 0;
    }
    .ct-sidebar-left.collapsed {
      width: 40px;
      min-width: 40px;
      overflow: hidden;
    }
    .ct-sidebar-left.collapsed .sidebar-content {
      opacity: 0;
      pointer-events: none;
    }
    .sidebar-content {
      opacity: 1;
      transition: opacity 0.15s ease;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px 12px;
      min-width: 216px; /* prevents content from reflowing during collapse */
    }
    .ct-main {
      flex: 1;
      min-width: 0;
      padding: 24px;
      max-width: 1400px;
    }
    .sidebar-toggle {
      position: absolute;
      top: 14px;
      right: 10px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--bg-primary);
      border: 1px solid var(--border-hover);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      line-height: 1;
      color: var(--text-secondary);
      z-index: 10;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      font-family: 'JetBrains Mono', monospace;
      flex-shrink: 0;
    }
    .sidebar-toggle:hover {
      background: var(--bg-card);
      color: var(--text-primary);
      border-color: var(--text-muted);
    }
    .ct-sidebar-left.collapsed .sidebar-toggle {
      position: relative;
      top: auto;
      right: auto;
      margin: 12px auto 0;
    }
    .sidebar-section-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
      padding: 0 2px;
    }
    .sidebar-stub {
      background: var(--bg-input);
      border: 1px dashed var(--border-subtle);
      border-radius: var(--radius);
      padding: 10px 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0.6;
      cursor: default;
      margin-bottom: 6px;
    }
    .sidebar-btn {
      background: transparent;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      padding: 8px 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-secondary);
      cursor: pointer;
      text-align: left;
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      margin-bottom: 4px;
    }
    .sidebar-btn:hover {
      background: var(--bg-card);
      border-color: var(--border-hover);
      color: var(--text-primary);
    }
    .sidebar-btn.active-export {
      color: var(--chatgpt-accent);
    }
    .sidebar-btn.disabled {
      opacity: 0.35;
      cursor: default;
    }
    .sidebar-btn.disabled:hover {
      background: transparent;
      border-color: var(--border-subtle);
      color: var(--text-secondary);
    }
    .sidebar-divider {
      height: 1px;
      background: var(--border-subtle);
      margin: 12px 0;
    }
    .sidebar-spacer { flex: 1; }

    .ct-sidebar-right {
      width: 240px;
      min-width: 240px;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      transition: width 0.22s ease, min-width 0.22s ease, opacity 0.18s ease;
      flex-shrink: 0;
    }
    .ct-sidebar-right.collapsed {
      width: 40px;
      min-width: 40px;
      overflow: hidden;
    }
    .ct-sidebar-right.collapsed .sidebar-content {
      opacity: 0;
      pointer-events: none;
    }
    .ct-sidebar-right .sidebar-toggle {
      left: 10px;
      right: auto;
    }
    .ct-sidebar-right.collapsed .sidebar-toggle {
      position: relative;
      left: auto;
      top: auto;
      margin: 12px auto 0;
    }
    .vault-file-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px;
      border-radius: 4px;
      background: var(--bg-input);
      border: 1px solid var(--border-subtle);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .vault-file-row .vault-filename {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .vault-file-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 11px;
      line-height: 1;
      padding: 0 2px;
      flex-shrink: 0;
      transition: color 0.12s;
    }
    .vault-file-remove:hover { color: #f47068; }
    @media (max-width: 1200px) {
      .ct-sidebar-right { width: 40px; min-width: 40px; }
      .ct-sidebar-right .sidebar-content { opacity: 0; pointer-events: none; }
    }

    /* ── Code Block Floating Panels (CT-110) ── */
    .ct-code-token {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      background: var(--bg-input);
      border: 1px solid var(--border-hover);
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-secondary);
      cursor: pointer;
      margin: 4px 0;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      user-select: none;
    }
    .ct-code-token:hover {
      background: var(--bg-card);
      border-color: var(--text-muted);
      color: var(--text-primary);
    }
    .ct-code-token .token-icon { font-size: 12px; opacity: 0.7; }
    .ct-code-panel {
      position: fixed;
      background: var(--bg-card);
      border: 1px solid var(--border-hover);
      border-radius: var(--radius);
      box-shadow: 0 8px 40px rgba(0,0,0,0.45);
      display: flex;
      flex-direction: column;
      max-width: 58vw;
      max-height: 62vh;
      min-width: 320px;
      min-height: 120px;
      overflow: hidden;
      user-select: none;
    }
    .ct-panel-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-subtle);
      cursor: grab;
      flex-shrink: 0;
    }
    .ct-panel-header:active { cursor: grabbing; }
    .ct-panel-header .panel-model {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
    }
    .ct-panel-header .panel-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .ct-panel-header .panel-close {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0 2px;
      flex-shrink: 0;
      transition: color 0.12s;
    }
    .ct-panel-header .panel-close:hover { color: var(--text-primary); }
    .ct-panel-body {
      flex: 1;
      overflow: auto;
      padding: 12px;
    }
    .ct-panel-body pre {
      margin: 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      line-height: 1.6;
      color: var(--text-primary);
      white-space: pre;
    }
    .ct-panel-limit-warning {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--bg-card);
      border: 1px solid #f47068;
      border-radius: var(--radius);
      padding: 12px 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #f47068;
      z-index: 10000;
      box-shadow: var(--shadow);
      pointer-events: none;
    }
    .ct-close-all {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 4px 10px;
      background: transparent;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      color: var(--text-muted);
      cursor: pointer;
      transition: color 0.12s, border-color 0.12s;
    }
    .ct-close-all:hover {
      color: #f47068;
      border-color: #f47068;

    /* prose (markdown output) */

<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    // ─────────────────────────────────────────────
    // Encryption Utilities (Web Crypto API)
    // ─────────────────────────────────────────────

    const cryptoUtils = {
      async deriveKey(passphrase, salt) {
        const enc = new TextEncoder();
        const keyMaterial = await crypto.subtle.importKey(
          'raw', enc.encode(passphrase), 'PBKDF2', false, ['deriveKey']
        );
        return crypto.subtle.deriveKey(
          { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
          keyMaterial,
          { name: 'AES-GCM', length: 256 },
          false,
          ['encrypt', 'decrypt']
        );
      },

      async encrypt(data, passphrase) {
        const enc = new TextEncoder();
        const salt = crypto.getRandomValues(new Uint8Array(16));
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const key = await this.deriveKey(passphrase, salt);
        const encrypted = await crypto.subtle.encrypt(
          { name: 'AES-GCM', iv },
          key,
          enc.encode(JSON.stringify(data))
        );
        const packed = new Uint8Array(salt.length + iv.length + encrypted.byteLength);
        packed.set(salt, 0);
        packed.set(iv, salt.length);
        packed.set(new Uint8Array(encrypted), salt.length + iv.length);
        return btoa(String.fromCharCode(...packed));
      },

      async decrypt(base64, passphrase) {
        const packed = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
        const salt = packed.slice(0, 16);
        const iv = packed.slice(16, 28);
        const ciphertext = packed.slice(28);
        const key = await this.deriveKey(passphrase, salt);
        const decrypted = await crypto.subtle.decrypt(
          { name: 'AES-GCM', iv },
          key,
          ciphertext
        );
        return JSON.parse(new TextDecoder().decode(decrypted));
      }
    };

    // ─────────────────────────────────────────────
    // Session Vault — IndexedDB (CT-019 / CT-083)
    // ─────────────────────────────────────────────
    // Schema: { id (auto), filename, content, mimeType, size, uploadedAt }
    // Stage one: .txt and .md only. mimeType/size fields are present for stage two
    // (binary formats, per-provider file APIs) without requiring a schema migration.

    const vaultDB = (() => {
      const DB_NAME = 'ct-vault';
      const STORE   = 'files';
      const VERSION = 1;

      const open = () => new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, VERSION);
        req.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(STORE)) {
            db.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true });
          }
        };
        req.onsuccess = (e) => resolve(e.target.result);
        req.onerror   = (e) => reject(e.target.error);
      });

      return {
        async getAll() {
          const db = await open();
          return new Promise((resolve, reject) => {
            const tx  = db.transaction(STORE, 'readonly');
            const req = tx.objectStore(STORE).getAll();
            req.onsuccess = (e) => resolve(e.target.result);
            req.onerror   = (e) => reject(e.target.error);
          });
        },

        async put(entry) {
          // entry: { filename, content, mimeType, size, uploadedAt }
          const db = await open();
          return new Promise((resolve, reject) => {
            const tx  = db.transaction(STORE, 'readwrite');
            const req = tx.objectStore(STORE).add(entry);
            req.onsuccess = (e) => resolve(e.target.result); // returns assigned id
            req.onerror   = (e) => reject(e.target.error);
          });
        },

        async remove(id) {
          const db = await open();
          return new Promise((resolve, reject) => {
            const tx  = db.transaction(STORE, 'readwrite');
            const req = tx.objectStore(STORE).delete(id);
            req.onsuccess = () => resolve();
            req.onerror   = (e) => reject(e.target.error);
          });
        },

        async clear() {
          const db = await open();
          return new Promise((resolve, reject) => {
            const tx  = db.transaction(STORE, 'readwrite');
            const req = tx.objectStore(STORE).clear();
            req.onsuccess = () => resolve();
            req.onerror   = (e) => reject(e.target.error);
          });
        },
      };
    })();

    // ─────────────────────────────────────────────
    // API Adapters
    // ─────────────────────────────────────────────

    // Default model strings — used on first load before dynamic fetch
    const DEFAULT_MODELS = {
      claude:   'claude-sonnet-4-20250514',
      chatgpt:  'gpt-4o',
      gemini:   'gemini-2.5-flash',
      grok:     'grok-3-latest',
      mistral:  'mistral-large-latest',
      deepseek: 'deepseek-chat',
    };

    // Central provider metadata — single source of truth for labels, icons, colors
    const PROVIDER_META = {
      claude:   { label: 'Claude',   icon: '◈', accent: 'var(--claude-accent)',   bg: 'var(--claude-bg)',   border: 'var(--claude-border)'   },
      chatgpt:  { label: 'ChatGPT',  icon: '◇', accent: 'var(--chatgpt-accent)',  bg: 'var(--chatgpt-bg)',  border: 'var(--chatgpt-border)'  },
      gemini:   { label: 'Gemini',   icon: '△', accent: 'var(--gemini-accent)',   bg: 'var(--gemini-bg)',   border: 'var(--gemini-border)'   },
      grok:     { label: 'Grok',     icon: '◉', accent: 'var(--grok-accent)',     bg: 'var(--grok-bg)',     border: 'var(--grok-border)'     },
      mistral:  { label: 'Mistral',  icon: '⬡', accent: 'var(--mistral-accent)',  bg: 'var(--mistral-bg)',  border: 'var(--mistral-border)'  },
      deepseek: { label: 'DeepSeek', icon: '▿', accent: 'var(--deepseek-accent)', bg: 'var(--deepseek-bg)', border: 'var(--deepseek-border)' },
    };
    const ALL_PROVIDERS = Object.keys(PROVIDER_META);

    // Fetch available models from each provider using the user's API key.
    // Returns array of { id, label } objects, or [{id:'default',label:'Default'}] on failure.
    const fetchProviderModels = async (provider, apiKey) => {
      try {
        if (provider === 'claude') {
          const res = await fetch('https://api.anthropic.com/v1/models', {
            headers: {
              'x-api-key': apiKey,
              'anthropic-version': '2023-06-01',
              'anthropic-dangerous-direct-browser-access': 'true',
            }
          });
          const data = await res.json();
          if (!data.data) return [{ id: 'default', label: 'Default' }];
          // Filter to text models only, sort newest first
          return data.data
            .filter(m => m.type === 'model')
            .sort((a, b) => b.created_at - a.created_at)
            .map(m => ({ id: m.id, label: m.display_name || m.id }));
        }
        if (provider === 'chatgpt') {
          const res = await fetch('https://api.openai.com/v1/models', {
            headers: { 'Authorization': `Bearer ${apiKey}` }
          });
          const data = await res.json();
          if (!data.data) return [{ id: 'default', label: 'Default' }];
          // Filter to GPT chat models only, sort newest first
          return data.data
            .filter(m => m.id.startsWith('gpt-') && !m.id.includes('instruct'))
            .sort((a, b) => b.created - a.created)
            .map(m => ({ id: m.id, label: m.id }));
        }
        if (provider === 'gemini') {
          const res = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`
          );
          const data = await res.json();
          if (!data.models) return [{ id: 'default', label: 'Default' }];
          return data.models
            .filter(m => m.supportedGenerationMethods?.includes('generateContent'))
            .map(m => ({
              id: m.name.replace('models/', ''),
              label: m.displayName || m.name.replace('models/', '')
            }));
        }
        // OpenAI-compatible providers: grok, mistral, deepseek
        const OAI_ENDPOINTS = {
          grok:     'https://api.x.ai/v1/models',
          mistral:  'https://api.mistral.ai/v1/models',
          deepseek: 'https://api.deepseek.com/v1/models',
        };
        const OAI_FILTERS = {
          grok:     m => !m.id.includes('image') && !m.id.includes('embed'),
          mistral:  m => !m.id.includes('embed') && !m.id.includes('voxtral') && !m.id.includes('moderation'),
          deepseek: m => true,
        };
        if (OAI_ENDPOINTS[provider]) {
          const res = await fetch(OAI_ENDPOINTS[provider], {
            headers: { 'Authorization': `Bearer ${apiKey}` }
          });
          const data = await res.json();
          if (!data.data) return [{ id: 'default', label: 'Default' }];
          return data.data
            .filter(OAI_FILTERS[provider])
            .sort((a, b) => (b.created || 0) - (a.created || 0))
            .map(m => ({ id: m.id, label: m.id }));
        }
      } catch (_) {
        return [{ id: 'default', label: 'Default' }];
      }
      return [{ id: 'default', label: 'Default' }];
    };

    const apiAdapters = {
      claude: async (messages, systemPrompt, apiKey, modelString) => {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: modelString || DEFAULT_MODELS.claude,
            max_tokens: 4096,
            system: systemPrompt || 'You are a helpful assistant participating in a multi-model triangulation discussion.',
            messages: messages.map(m => ({ role: m.role, content: m.content }))
          })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error.message);
        return data.content.map(b => b.text).join('\n');
      },

      chatgpt: async (messages, systemPrompt, apiKey, modelString) => {
        const msgs = [];
        if (systemPrompt) msgs.push({ role: 'system', content: systemPrompt });
        msgs.push(...messages.map(m => ({ role: m.role, content: m.content })));
        const res = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`
          },
          body: JSON.stringify({
            model: modelString || DEFAULT_MODELS.chatgpt,
            max_tokens: 4096,
            messages: msgs
          })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error.message);
        return data.choices[0].message.content;
      },

      gemini: async (messages, systemPrompt, apiKey, modelString) => {
        const model = modelString || DEFAULT_MODELS.gemini;
        const contents = messages.map(m => ({
          role: m.role === 'assistant' ? 'model' : 'user',
          parts: [{ text: m.content }]
        }));
        const body = { contents };
        if (systemPrompt) {
          body.systemInstruction = { parts: [{ text: systemPrompt }] };
        }
        const res = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          }
        );
        const data = await res.json();
        if (data.error) throw new Error(data.error.message);
        return data.candidates[0].content.parts.map(p => p.text).join('\n');
      },

      // OpenAI-compatible adapters: grok, mistral, deepseek
      grok: async (messages, systemPrompt, apiKey, modelString) => {
        const msgs = [];
        if (systemPrompt) msgs.push({ role: 'system', content: systemPrompt });
        msgs.push(...messages.map(m => ({ role: m.role, content: m.content })));
        const res = await fetch('https://api.x.ai/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
          body: JSON.stringify({ model: modelString || DEFAULT_MODELS.grok, max_tokens: 4096, messages: msgs })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
        return data.choices[0].message.content;
      },

      mistral: async (messages, systemPrompt, apiKey, modelString) => {
        const msgs = [];
        if (systemPrompt) msgs.push({ role: 'system', content: systemPrompt });
        msgs.push(...messages.map(m => ({ role: m.role, content: m.content })));
        const res = await fetch('https://api.mistral.ai/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
          body: JSON.stringify({ model: modelString || DEFAULT_MODELS.mistral, max_tokens: 4096, messages: msgs })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
        return data.choices[0].message.content;
      },

      deepseek: async (messages, systemPrompt, apiKey, modelString) => {
        const msgs = [];
        if (systemPrompt) msgs.push({ role: 'system', content: systemPrompt });
        msgs.push(...messages.map(m => ({ role: m.role, content: m.content })));
        const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
          body: JSON.stringify({ model: modelString || DEFAULT_MODELS.deepseek, max_tokens: 4096, messages: msgs })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
        return data.choices[0].message.content;
      },
    };

    // ─────────────────────────────────────────────
    // ─────────────────────────────────────────────
    // Session Utilities
    // ─────────────────────────────────────────────

    const generateSessionId = () => {
      // compact ISO date + 6 random hex chars — human-readable, no dependency
      const date = new Date().toLocaleDateString('en-CA').replace(/-/g, '');
      const rand = Math.floor(Math.random() * 0xffffff).toString(16).padStart(6, '0');
      return `${date}-${rand}`;
    };

    // Markdown renderer
    // ─────────────────────────────────────────────

    function RenderedMarkdown({ text }) {
      const html = marked.parse(text || '', { breaks: true, gfm: true });
      return <div dangerouslySetInnerHTML={{ __html: html }} className="prose" />;
    }

    // ─────────────────────────────────────────────
    // CT-110 — Code Block Floating Panels
    // ─────────────────────────────────────────────

    const MAX_PANELS = 3;
    const CASCADE_OFFSET = 24;

    // Parse code blocks out of markdown text, return mixed array of {type:'text'|'code', ...}
    function parseCodeBlocks(text) {
      const segments = [];
      const regex = /```(\w*)\n?([\s\S]*?)```/g;
      let lastIndex = 0;
      let match;
      while ((match = regex.exec(text)) !== null) {
        if (match.index > lastIndex) {
          segments.push({ type: 'text', content: text.slice(lastIndex, match.index) });
        }
        const lang = match[1] || 'code';
        const code = match[2];
        const lines = code.split('\n').length;
        segments.push({ type: 'code', lang, code, lines });
        lastIndex = regex.lastIndex;
      }
      if (lastIndex < text.length) {
        segments.push({ type: 'text', content: text.slice(lastIndex) });
      }
      return segments;
    }

    // Draggable floating code panel
    function CodePanel({ panel, onClose, onFocus }) {
      const panelRef = useRef(null);
      const dragState = useRef(null);

      const MODEL_META = PROVIDER_META;
      const meta = MODEL_META[panel.model];

      const handleMouseDown = (e) => {
        if (e.target.classList.contains('panel-close')) return;
        onFocus(panel.id);
        const rect = panelRef.current.getBoundingClientRect();
        dragState.current = {
          startX: e.clientX - rect.left,
          startY: e.clientY - rect.top,
        };
        document.addEventListener('mousemove', handleMouseMove);
        document.addEventListener('mouseup', handleMouseUp);
        e.preventDefault();
      };

      const handleMouseMove = (e) => {
        if (!dragState.current || !panelRef.current) return;
        const pw = panelRef.current.offsetWidth;
        const ph = panelRef.current.offsetHeight;
        let x = e.clientX - dragState.current.startX;
        let y = e.clientY - dragState.current.startY;
        // Clamp to viewport
        x = Math.max(0, Math.min(window.innerWidth - pw, x));
        y = Math.max(0, Math.min(window.innerHeight - ph, y));
        panelRef.current.style.left = x + 'px';
        panelRef.current.style.top  = y + 'px';
        panelRef.current.style.right = 'auto';
      };

      const handleMouseUp = (e) => {
        dragState.current = null;
        document.removeEventListener('mousemove', handleMouseMove);
        document.removeEventListener('mouseup', handleMouseUp);
        // Save position to panel origin memory
        if (panelRef.current) {
          const rect = panelRef.current.getBoundingClientRect();
          panel.onPositionSave && panel.onPositionSave(panel.model, { x: rect.left, y: rect.top });
        }
      };

      const firstLine = panel.code.split('\n').find(l => l.trim()) || '';
      const preview = firstLine.length > 40 ? firstLine.slice(0, 40) + '…' : firstLine;

      return (
        <div
          ref={panelRef}
          className="ct-code-panel"
          style={{
            left: panel.anchor === 'right'
              ? 'auto'
              : panel.x + 'px',
            right: panel.anchor === 'right'
              ? (window.innerWidth - panel.x - (window.innerWidth * 0.58)) + 'px'
              : 'auto',
            top: panel.y + 'px',
            zIndex: panel.zIndex,
          }}
          onMouseDown={() => onFocus(panel.id)}
        >
          <div className="ct-panel-header" onMouseDown={handleMouseDown}>
            <span className="panel-model" style={{ color: meta.accent }}>
              {meta.icon} {meta.label}
            </span>
            <span className="panel-meta">
              {panel.lang} · {panel.lines} lines · {preview}
            </span>
            <button
              onClick={() => navigator.clipboard.writeText(panel.code)}
              title="Copy code to clipboard"
              className="panel-close"
              style={{ marginRight: '2px' }}
            >
              <svg width="13" height="13" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="4" y="4" width="8" height="9" rx="1.2" stroke="currentColor" strokeWidth="1.2" fill="none"/>
                <path d="M2 10V2.8C2 2.08 2.08 2 2.8 2H9" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/>
              </svg>
            </button>
            <button className="panel-close" onClick={() => onClose(panel.id)}>✕</button>
          </div>
          <div className="ct-panel-body">
            <pre>{panel.code}</pre>
          </div>
        </div>
      );
    }

    // Rendered markdown with code blocks replaced by tokens
    function RenderedMarkdownWithCodePanels({ text, model, onOpenPanel }) {
      const segments = parseCodeBlocks(text || '');
      if (segments.length === 0) return null;
      // If no code blocks, fall through to standard renderer
      const hasCode = segments.some(s => s.type === 'code');
      if (!hasCode) {
        const html = marked.parse(text || '', { breaks: true, gfm: true });
        return <div dangerouslySetInnerHTML={{ __html: html }} className="prose" />;
      }
      return (
        <div className="prose">
          {segments.map((seg, i) => {
            if (seg.type === 'text') {
              const html = marked.parse(seg.content, { breaks: true, gfm: true });
              return <div key={i} dangerouslySetInnerHTML={{ __html: html }} />;
            }
            return (
              <div
                key={i}
                className="ct-code-token"
                onClick={() => onOpenPanel({ lang: seg.lang, code: seg.code, lines: seg.lines, model })}
                title="Click to open code panel"
              >
                <span className="token-icon">⌥</span>
                <span style={{ fontWeight: 600 }}>{seg.lang || 'code'}</span>
                <span style={{ color: 'var(--text-muted)' }}>{seg.lines} lines</span>
                <span style={{ color: 'var(--text-muted)', fontSize: '10px' }}>↗ open</span>
              </div>
            );
          })}
        </div>
      );
    }

    // ─────────────────────────────────────────────
    // Settings Panel
    // ─────────────────────────────────────────────

    // ─────────────────────────────────────────────
    // Generate .ctk Modal (CT-099 key management)
    // ─────────────────────────────────────────────
    function GenerateCtkModal({ keys, setKeys, systemPrompts, setSystemPrompts, onClose }) {
      const ALL_PROVIDERS = ['claude', 'chatgpt', 'gemini', 'grok', 'mistral', 'deepseek'];
      const PROVIDER_META = {
        claude:   { label: 'Claude',   accent: 'var(--claude-accent)',   icon: '◈' },
        chatgpt:  { label: 'ChatGPT',  accent: 'var(--chatgpt-accent)',  icon: '◇' },
        gemini:   { label: 'Gemini',   accent: 'var(--gemini-accent)',   icon: '△' },
        grok:     { label: 'Grok',     accent: 'var(--grok-accent)',     icon: '◉' },
        mistral:  { label: 'Mistral',  accent: 'var(--mistral-accent)',  icon: '⬡' },
        deepseek: { label: 'DeepSeek', accent: 'var(--deepseek-accent)', icon: '▿' },
      };

      const [exportPassphrase, setExportPassphrase] = useState('');
      const [showPassphraseExport, setShowPassphraseExport] = useState(false);
      const [cryptoStatus, setCryptoStatus] = useState(null);
      const [exportConfirm, setExportConfirm] = useState(null);
      const [showKey, setShowKey] = useState(Object.fromEntries(ALL_PROVIDERS.map(p => [p, false])));
      const [keyTestStatus, setKeyTestStatus] = useState(Object.fromEntries(ALL_PROVIDERS.map(p => [p, null])));
      const [keyTestMsg, setKeyTestMsg] = useState(Object.fromEntries(ALL_PROVIDERS.map(p => [p, ''])));

      const setTestResult = (provider, status, msg = '') => {
        setKeyTestStatus(prev => ({ ...prev, [provider]: status }));
        setKeyTestMsg(prev => ({ ...prev, [provider]: msg }));
      };

      const testKey = async (provider) => {
        const key = keys[provider]?.trim();
        if (!key) { setTestResult(provider, 'fail', 'No key entered.'); return; }
        setTestResult(provider, 'testing', '');
        try {
          if (provider === 'claude') {
            const res = await fetch('https://api.anthropic.com/v1/messages', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
              body: JSON.stringify({ model: 'claude-haiku-4-5-20251001', max_tokens: 10, messages: [{ role: 'user', content: 'Hi' }] })
            });
            const data = await res.json();
            if (data.error) throw new Error(data.error.type + ': ' + data.error.message);
          } else if (provider === 'gemini') {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ contents: [{ role: 'user', parts: [{ text: 'Hi' }] }] })
            });
            const data = await res.json();
            if (data.error) {
              const msg = data.error.message || '';
              if (msg.includes('limit: 0') || msg.includes('free_tier') || (res.status === 429 && msg.includes('quota')))
                throw new Error('Quota not provisioned — create a new key in a new Google project.');
              throw new Error(data.error.message);
            }
          } else {
            // OpenAI-compatible: chatgpt, grok, mistral, deepseek
            const endpoints = {
              chatgpt: 'https://api.openai.com/v1/chat/completions',
              grok:    'https://api.x.ai/v1/chat/completions',
              mistral: 'https://api.mistral.ai/v1/chat/completions',
              deepseek:'https://api.deepseek.com/v1/chat/completions',
            };
            const testModels = {
              chatgpt: 'gpt-4o-mini',
              grok:    'grok-3-latest',
              mistral: 'mistral-small-latest',
              deepseek:'deepseek-chat',
            };
            const res = await fetch(endpoints[provider], {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
              body: JSON.stringify({ model: testModels[provider], max_tokens: 10, messages: [{ role: 'user', content: 'Hi' }] })
            });
            const data = await res.json();
            if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
          }
          setTestResult(provider, 'pass', 'Key validated.');
        } catch (err) {
          const msg = err.message || 'Unknown error.';
          if (msg.includes('401') || msg.includes('invalid_api_key') || msg.includes('authentication') || msg.includes('Unauthorized'))
            setTestResult(provider, 'fail', 'Invalid key — check you copied the full key without extra spaces.');
          else if (msg.includes('Quota not provisioned'))
            setTestResult(provider, 'fail', msg);
          else if (msg.includes('Failed to fetch') || msg.includes('NetworkError'))
            setTestResult(provider, 'fail', 'Service unreachable — check your connection.');
          else
            setTestResult(provider, 'fail', msg);
        }
      };

      const testAll = async () => {
        const ids = ALL_PROVIDERS.filter(id => keys[id]?.trim());
        if (ids.length === 0) return;
        await Promise.all(ids.map(id => testKey(id)));
      };

      const exportState = (() => {
        const entered = ALL_PROVIDERS.filter(id => keys[id]?.trim());
        if (entered.length === 0) return 'yellow';
        const statuses = entered.map(id => keyTestStatus[id]);
        if (statuses.every(s => s === 'pass')) return 'green';
        if (statuses.some(s => s === 'fail')) return 'red';
        return 'yellow';
      })();

      const exportColors = {
        green:  { bg: '#1a3d24', color: '#6bcf8e', border: '#1a3d24' },
        yellow: { bg: '#2a2a10', color: '#c8b84a', border: '#3a3a18' },
        red:    { bg: '#3d1a1a', color: '#f47068', border: '#3d1a1a' },
      };
      const exportTooltips = {
        green:  'All keys validated — ready to export',
        yellow: 'Some keys untested — export will include only entered keys',
        red:    'One or more keys failed — click to review before exporting',
      };

      const pillColor = (provider) => {
        const s = keyTestStatus[provider];
        if (s === 'pass')    return { bg: '#1a3d24', color: '#6bcf8e', border: '#2a5a34' };
        if (s === 'fail')    return { bg: '#3d1a1a', color: '#f47068', border: '#5a2a2a' };
        if (s === 'testing') return { bg: 'var(--bg-input)', color: 'var(--text-muted)', border: 'var(--border-subtle)' };
        return { bg: '#2a2a10', color: '#c8b84a', border: '#3a3a18' };
      };

      const handleExport = async () => {
        if (!exportPassphrase.trim()) { setCryptoStatus({ type: 'error', msg: 'Enter a passphrase to encrypt your keys.' }); return; }
        const failedProviders = ALL_PROVIDERS.filter(id => keyTestStatus[id] === 'fail');
        if (failedProviders.length > 0) {
          const failedLabels = failedProviders.map(id => PROVIDER_META[id].label);
          let exportKeys = { ...keys };
          failedProviders.forEach(id => { exportKeys[id] = ''; });
          const hasValid = ALL_PROVIDERS.some(id => exportKeys[id]?.trim());
          if (!hasValid) { setCryptoStatus({ type: 'error', msg: 'No valid keys to export.' }); return; }
          setExportConfirm({ failedLabels, exportKeys });
          return;
        }
        await doExport({ ...keys });
      };

      const doExport = async (exportKeys) => {
        setExportConfirm(null);
        try {
          setCryptoStatus({ type: 'info', msg: 'Encrypting...' });
          const data = { keys: exportKeys, systemPrompts, exportedAt: new Date().toISOString() };
          const encrypted = await cryptoUtils.encrypt(data, exportPassphrase);
          const blob = new Blob([encrypted], { type: 'text/plain' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url; a.download = 'crosstalk-keys.ctk'; a.click();
          URL.revokeObjectURL(url);
          setExportPassphrase('');
          setCryptoStatus({ type: 'success', msg: 'Keys exported and encrypted.' });
        } catch (err) {
          setCryptoStatus({ type: 'error', msg: 'Export failed: ' + err.message });
        }
      };

      const statusColors = { error: '#f47068', success: 'var(--chatgpt-accent)', info: 'var(--gemini-accent)' };

      return (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.7)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 100 }}
          onMouseDown={e => { if (e.target === e.currentTarget) e.currentTarget._closeOnMouseUp = true; }}
          onMouseUp={e => { if (e.currentTarget._closeOnMouseUp) { e.currentTarget._closeOnMouseUp = false; onClose(); } }}>
          <div style={{ background: 'var(--bg-secondary)', borderRadius: '12px', padding: '32px', width: '90%', maxWidth: '600px', maxHeight: '85vh', overflowY: 'auto', border: '1px solid var(--border-subtle)', boxShadow: 'var(--shadow)' }}
            onMouseDown={e => e.stopPropagation()} onClick={e => e.stopPropagation()}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px' }}>
              <h2 style={{ fontFamily: 'JetBrains Mono', fontSize: '18px', fontWeight: 700 }}>Generate .ctk</h2>
              <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
                <button onClick={testAll} disabled={ALL_PROVIDERS.some(id => keyTestStatus[id] === 'testing')}
                  style={{ fontFamily: 'JetBrains Mono', fontSize: '11px', padding: '5px 14px', borderRadius: '999px', cursor: 'pointer', transition: 'all 0.2s ease', border: `1px solid ${exportColors[exportState].border}`, background: exportColors[exportState].bg, color: exportColors[exportState].color }}>
                  {ALL_PROVIDERS.some(id => keyTestStatus[id] === 'testing') ? 'Testing...' : 'Test All'}
                </button>
                <button onClick={onClose} style={{ background: 'none', border: 'none', color: 'var(--text-secondary)', fontSize: '20px', cursor: 'pointer' }}>✕</button>
              </div>
            </div>
            <p style={{ fontFamily: 'JetBrains Mono', fontSize: '11px', color: 'var(--text-muted)', marginBottom: '24px', lineHeight: 1.5 }}>
              Enter API keys, test them, then export an encrypted .ctk file for loading via URL.
            </p>

            {ALL_PROVIDERS.map(provider => {
              const meta = PROVIDER_META[provider];
              return (
                <div key={provider} style={{ marginBottom: '20px' }}>
                  <label style={{ fontFamily: 'JetBrains Mono', fontSize: '13px', fontWeight: 500, color: meta.accent, display: 'block', marginBottom: '6px' }}>
                    {meta.icon} {meta.label} API Key
                  </label>
                  <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
                    <div style={{ flex: 1, position: 'relative' }}>
                      <input type={showKey[provider] ? 'text' : 'password'} autoComplete="new-password"
                        value={keys[provider] || ''}
                        onChange={e => { setKeys(prev => ({ ...prev, [provider]: e.target.value })); setTestResult(provider, null, ''); }}
                        onInput={e => { setKeys(prev => ({ ...prev, [provider]: e.target.value })); setTestResult(provider, null, ''); }}
                        placeholder={`Enter ${meta.label} API key...`}
                        style={{ width: '100%', padding: '10px 36px 10px 14px', background: 'var(--bg-input)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius)', color: 'var(--text-primary)', fontFamily: 'JetBrains Mono', fontSize: '13px', outline: 'none' }}
                      />
                      <button onClick={() => setShowKey(prev => ({ ...prev, [provider]: !prev[provider] }))}
                        style={{ position: 'absolute', right: '10px', top: '50%', transform: 'translateY(-50%)', background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text-muted)', fontSize: '14px', padding: '2px', lineHeight: 1 }}>
                        {showKey[provider] ? '🙈' : '👁'}
                      </button>
                    </div>
                    <button onClick={() => testKey(provider)} disabled={keyTestStatus[provider] === 'testing'}
                      style={{ fontFamily: 'JetBrains Mono', fontSize: '11px', padding: '6px 12px', borderRadius: '999px', border: `1px solid ${pillColor(provider).border}`, background: pillColor(provider).bg, color: pillColor(provider).color, cursor: keyTestStatus[provider] === 'testing' ? 'default' : 'pointer', whiteSpace: 'nowrap', transition: 'all 0.2s ease', flexShrink: 0 }}>
                      {keyTestStatus[provider] === 'testing' ? '...' : 'Test'}
                    </button>
                  </div>
                  {keyTestMsg[provider] && (
                    <div style={{ marginTop: '4px', fontSize: '11px', fontFamily: 'JetBrains Mono', color: keyTestStatus[provider] === 'pass' ? '#6bcf8e' : '#f47068', lineHeight: 1.4 }}>
                      {keyTestMsg[provider]}
                    </div>
                  )}
                  <label style={{ fontFamily: 'JetBrains Mono', fontSize: '12px', fontWeight: 500, color: 'var(--text-secondary)', display: 'block', marginBottom: '4px', marginTop: '10px' }}>
                    {meta.label} System Prompt (optional)
                  </label>
                  <textarea value={systemPrompts[provider] || ''} onChange={e => setSystemPrompts(prev => ({ ...prev, [provider]: e.target.value }))}
                    placeholder={`Custom instructions for ${meta.label}...`} rows={2}
                    style={{ width: '100%', padding: '8px 12px', background: 'var(--bg-input)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius)', color: 'var(--text-primary)', fontFamily: 'Source Serif 4', fontSize: '13px', outline: 'none', resize: 'vertical' }}
                  />
                </div>
              );
            })}

            {/* Export */}
            <div style={{ paddingTop: '20px', borderTop: '1px solid var(--border-subtle)' }}>
              <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
                <div style={{ flex: 1, position: 'relative' }}>
                  <input type={showPassphraseExport ? 'text' : 'password'} value={exportPassphrase} onChange={e => setExportPassphrase(e.target.value)}
                    autoComplete="new-password" placeholder="Choose a passphrase..."
                    style={{ width: '100%', padding: '8px 32px 8px 12px', background: 'var(--bg-input)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius)', color: 'var(--text-primary)', fontFamily: 'JetBrains Mono', fontSize: '12px', outline: 'none' }}
                  />
                  <button onClick={() => setShowPassphraseExport(p => !p)}
                    style={{ position: 'absolute', right: '8px', top: '50%', transform: 'translateY(-50%)', background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text-muted)', fontSize: '12px', padding: '2px', lineHeight: 1 }}>
                    {showPassphraseExport ? '🙈' : '👁'}
                  </button>
                </div>
                <button onClick={handleExport} title={exportTooltips[exportState]}
                  style={{ fontFamily: 'JetBrains Mono', fontSize: '12px', padding: '8px 16px', border: 'none', borderRadius: 'var(--radius)', cursor: 'pointer', whiteSpace: 'nowrap', transition: 'all 0.2s ease', background: exportColors[exportState].bg, color: exportColors[exportState].color }}>
                  Export .ctk
                </button>
              </div>
              <div style={{ marginTop: '8px', fontFamily: 'JetBrains Mono', fontSize: '10px', color: 'var(--text-muted)' }}>
                🟡 Untested · 🟢 Validated · 🔴 Failed keys excluded · AES-256-GCM encrypted
              </div>
            </div>

            {exportConfirm && (
              <div style={{ marginTop: '12px', padding: '12px', borderRadius: 'var(--radius)', background: '#3d1a1a', border: '1px solid #5a2a2a', fontFamily: 'JetBrains Mono', fontSize: '12px', color: '#f47068' }}>
                <div style={{ marginBottom: '8px', fontWeight: 600 }}>
                  The following {exportConfirm.failedLabels.length > 1 ? 'keys' : 'key'} failed and will not be included:
                </div>
                {exportConfirm.failedLabels.map(l => <div key={l} style={{ marginBottom: '4px' }}>• {l}</div>)}
                <div style={{ marginTop: '10px', display: 'flex', gap: '8px' }}>
                  <button onClick={() => doExport(exportConfirm.exportKeys)}
                    style={{ fontFamily: 'JetBrains Mono', fontSize: '11px', padding: '5px 12px', background: '#5a2a2a', border: '1px solid #7a3a3a', borderRadius: 'var(--radius)', color: '#f47068', cursor: 'pointer' }}>
                    Proceed without {exportConfirm.failedLabels.length > 1 ? 'them' : 'it'}
                  </button>
                  <button onClick={() => setExportConfirm(null)}
                    style={{ fontFamily: 'JetBrains Mono', fontSize: '11px', padding: '5px 12px', background: 'var(--bg-input)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius)', color: 'var(--text-secondary)', cursor: 'pointer' }}>
                    Cancel
                  </button>
                </div>
              </div>
            )}

            {cryptoStatus && (
              <div style={{ marginTop: '12px', fontSize: '12px', fontFamily: 'JetBrains Mono', color: statusColors[cryptoStatus.type] || 'var(--text-secondary)' }}>
                {cryptoStatus.msg}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────
    // Load Keys Modal
    // ─────────────────────────────────────────────
    function LoadKeysModal({ setKeys, setSystemPrompts, onClose }) {
      const [importPassphrase, setImportPassphrase] = useState('');
      const [urlKeySource, setUrlKeySource] = useState('');
      const [urlPassphrase, setUrlPassphrase] = useState('');
      const [showPassphrase, setShowPassphrase] = useState({ import: false, url: false });
      const [cryptoStatus, setCryptoStatus] = useState(null);
      const fileInputRef = useRef(null);

      const statusColors = { error: '#f47068', success: 'var(--chatgpt-accent)', info: 'var(--gemini-accent)' };

      const handleImport = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        if (!importPassphrase.trim()) {
          setCryptoStatus({ type: 'error', msg: 'Enter your passphrase before importing.' });
          fileInputRef.current.value = '';
          return;
        }
        try {
          setCryptoStatus({ type: 'info', msg: 'Decrypting...' });
          const base64 = await file.text();
          const data = await cryptoUtils.decrypt(base64.trim(), importPassphrase);
          if (data.keys) setKeys(data.keys);
          if (data.systemPrompts) setSystemPrompts(data.systemPrompts);
          setImportPassphrase('');
          setCryptoStatus({ type: 'success', msg: 'Keys imported successfully.' });
        } catch (err) {
          setCryptoStatus({ type: 'error', msg: 'Decryption failed — wrong passphrase or corrupted file.' });
        }
        fileInputRef.current.value = '';
      };

      const handleLoadFromUrl = async () => {
        if (!urlKeySource.trim()) { setCryptoStatus({ type: 'error', msg: 'Enter a URL to load from.' }); return; }
        if (!urlPassphrase.trim()) { setCryptoStatus({ type: 'error', msg: 'Enter your passphrase before loading.' }); return; }
        try {
          setCryptoStatus({ type: 'info', msg: 'Fetching key file...' });
          const res = await fetch(urlKeySource.trim(), { credentials: 'include' });
          if (!res.ok) throw new Error(`Server returned ${res.status}`);
          const base64 = (await res.text()).trim();
          setCryptoStatus({ type: 'info', msg: 'Decrypting...' });
          const data = await cryptoUtils.decrypt(base64, urlPassphrase);
          if (data.keys) setKeys(data.keys);
          if (data.systemPrompts) setSystemPrompts(data.systemPrompts);
          setUrlPassphrase('');
          setCryptoStatus({ type: 'success', msg: 'Keys loaded from URL successfully.' });
        } catch (err) {
          setCryptoStatus({ type: 'error', msg: 'Load failed — ' + err.message });
        }
      };

      return (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.7)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 100 }}
          onMouseDown={e => { if (e.target === e.currentTarget) e.currentTarget._closeOnMouseUp = true; }}
          onMouseUp={e => { if (e.currentTarget._closeOnMouseUp) { e.currentTarget._closeOnMouseUp = false; onClose(); } }}>
          <div style={{ background: 'var(--bg-secondary)', borderRadius: '12px', padding: '32px', width: '90%', maxWidth: '560px', border: '1px solid var(--border-subtle)', boxShadow: 'var(--shadow)' }}
            onMouseDown={e => e.stopPropagation()} onClick={e => e.stopPropagation()}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px' }}>
              <h2 style={{ fontFamily: 'JetBrains Mono', fontSize: '18px', fontWeight: 700 }}>Load Keys</h2>
              <button onClick={onClose} style={{ background: 'none', border: 'none', color: 'var(--text-secondary)', fontSize: '20px', cursor: 'pointer' }}>✕</button>
            </div>
            <p style={{ fontFamily: 'JetBrains Mono', fontSize: '11px', color: 'var(--text-muted)', marginBottom: '24px', lineHeight: 1.5 }}>
              Load an encrypted .ctk key file from disk or from your Cloudflare Worker URL.
            </p>

            {/* Import from file */}
            <div style={{ marginBottom: '24px' }}>
              <label style={{ fontFamily: 'JetBrains Mono', fontSize: '12px', color: 'var(--text-secondary)', display: 'block', marginBottom: '6px' }}>
                Import — load keys from an encrypted file
              </label>
              <div style={{ display: 'flex', gap: '8px' }}>
                <div style={{ flex: 1, position: 'relative' }}>
                  <input type={showPassphrase.import ? 'text' : 'password'} value={importPassphrase} onChange={e => setImportPassphrase(e.target.value)}
                    autoComplete="new-password" placeholder="Enter your passphrase..."
                    style={{ width: '100%', padding: '8px 32px 8px 12px', background: 'var(--bg-input)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius)', color: 'var(--text-primary)', fontFamily: 'JetBrains Mono', fontSize: '12px', outline: 'none' }}
                  />
                  <button onClick={() => setShowPassphrase(prev => ({ ...prev, import: !prev.import }))}
                    style={{ position: 'absolute', right: '8px', top: '50%', transform: 'translateY(-50%)', background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text-muted)', fontSize: '12px', padding: '2px', lineHeight: 1 }}>
                    {showPassphrase.import ? '🙈' : '👁'}
                  </button>
                </div>
                <button onClick={() => fileInputRef.current?.click()}
                  style={{ fontFamily: 'JetBrains Mono', fontSize: '12px', padding: '8px 16px', background: 'var(--gemini-border)', border: 'none', borderRadius: 'var(--radius)', cursor: 'pointer', color: 'var(--gemini-accent)', whiteSpace: 'nowrap' }}>
                  Import .ctk
                </button>
                <input ref={fileInputRef} type="file" accept=".ctk" onChange={handleImport} style={{ display: 'none' }} />
              </div>
            </div>

            {/* Load from URL */}
            <div style={{ paddingTop: '20px', borderTop: '1px solid var(--border-subtle)' }}>
              <label style={{ fontFamily: 'JetBrains Mono', fontSize: '12px', color: 'var(--text-secondary)', display: 'block', marginBottom: '6px' }}>
                Load from URL — fetch encrypted key file from your Worker
              </label>
              <div style={{ display: 'flex', gap: '8px', marginBottom: '8px' }}>
                <input type="text" value={urlKeySource} onChange={e => setUrlKeySource(e.target.value)}
                  placeholder="https://keys.yourcrosstalklab.com"
                  style={{ flex: 1, padding: '8px 12px', background: 'var(--bg-input)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius)', color: 'var(--text-primary)', fontFamily: 'JetBrains Mono', fontSize: '12px', outline: 'none' }}
                />
              </div>
              <div style={{ display: 'flex', gap: '8px' }}>
                <div style={{ flex: 1, position: 'relative' }}>
                  <input type={showPassphrase.url ? 'text' : 'password'} value={urlPassphrase} onChange={e => setUrlPassphrase(e.target.value)}
                    autoComplete="new-password" placeholder="Enter your passphrase..."
                    style={{ width: '100%', padding: '8px 32px 8px 12px', background: 'var(--bg-input)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius)', color: 'var(--text-primary)', fontFamily: 'JetBrains Mono', fontSize: '12px', outline: 'none' }}
                  />
                  <button onClick={() => setShowPassphrase(prev => ({ ...prev, url: !prev.url }))}
                    style={{ position: 'absolute', right: '8px', top: '50%', transform: 'translateY(-50%)', background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text-muted)', fontSize: '12px', padding: '2px', lineHeight: 1 }}>
                    {showPassphrase.url ? '🙈' : '👁'}
                  </button>
                </div>
                <button onClick={handleLoadFromUrl}
                  style={{ fontFamily: 'JetBrains Mono', fontSize: '12px', padding: '8px 16px', background: 'var(--chatgpt-border)', border: 'none', borderRadius: 'var(--radius)', cursor: 'pointer', color: 'var(--chatgpt-accent)', whiteSpace: 'nowrap' }}>
                  Load ↓
                </button>
              </div>
            </div>

            {cryptoStatus && (
              <div style={{ marginTop: '12px', fontSize: '12px', fontFamily: 'JetBrains Mono', color: statusColors[cryptoStatus.type] || 'var(--text-secondary)' }}>
                {cryptoStatus.msg}
              </div>
            )}

            {/* Security note */}
            <div style={{ marginTop: '20px', padding: '14px', background: 'var(--bg-input)', borderRadius: 'var(--radius)', border: '1px solid var(--border-subtle)', fontSize: '12px', color: 'var(--text-secondary)', lineHeight: 1.6 }}>
              <strong style={{ color: 'var(--text-primary)' }}>Security:</strong> API keys exist only in browser session memory and are never stored on disk unless you explicitly export them. Exported .ctk files are encrypted with AES-256-GCM — without your passphrase, the contents are unrecoverable.
            </div>
          </div>
        </div>
      );
    }
    // ─────────────────────────────────────────────
    // Model Response Card
    // ─────────────────────────────────────────────

    function ModelCard({ model, response, isLoading, error, enabled, hasKey, onToggle, onOpenPanel, onClip }) {
      const config = PROVIDER_META[model] || { label: model, accent: 'var(--text-muted)', bg: 'var(--bg-secondary)', border: 'var(--border-subtle)', icon: '◌' };

      return (
        <div style={{
          background: enabled ? config.bg : 'var(--bg-secondary)',
          border: `1px solid ${enabled ? config.border : 'var(--border-subtle)'}`,
          borderRadius: '12px', padding: '20px', minHeight: '200px',
          opacity: enabled ? 1 : 0.4, transition: 'all 0.3s ease',
          display: 'flex', flexDirection: 'column', position: 'relative'
        }}>
          {/* Header */}
          <div style={{
            display: 'flex', justifyContent: 'space-between', alignItems: 'center',
            marginBottom: '16px'
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
              <span style={{ color: config.accent, fontSize: '18px' }}>{config.icon}</span>
              <span style={{
                fontFamily: 'JetBrains Mono', fontSize: '14px', fontWeight: 700, color: config.accent
              }}>{config.label}</span>
              {isLoading && (
                <span style={{
                  display: 'inline-block', width: '8px', height: '8px', borderRadius: '50%',
                  background: config.accent, animation: 'pulse 1s infinite'
                }} />
              )}
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
              {response && (
                <>
                  <button
                    onClick={() => navigator.clipboard.writeText(response)}
                    title="Copy to clipboard"
                    style={{
                      background: 'none', border: 'none', cursor: 'pointer',
                      color: 'var(--text-muted)', lineHeight: 1,
                      padding: '2px 4px', borderRadius: '3px',
                      transition: 'color 0.12s', display: 'flex', alignItems: 'center'
                    }}
                    onMouseEnter={e => e.currentTarget.style.color = 'var(--text-primary)'}
                    onMouseLeave={e => e.currentTarget.style.color = 'var(--text-muted)'}
                  >
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <rect x="4" y="4" width="8" height="9" rx="1.2" stroke="currentColor" strokeWidth="1.2" fill="none"/>
                      <path d="M2 10V2.8C2 2.08 2.08 2 2.8 2H9" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/>
                    </svg>
                  </button>
                  <button
                    onClick={() => onClip && onClip(model, response)}
                    title="Clip to CT clipboard"
                    style={{
                      background: 'none', border: 'none', cursor: 'pointer',
                      color: 'var(--text-muted)', fontSize: '14px', lineHeight: 1,
                      padding: '2px 4px', borderRadius: '3px',
                      transition: 'color 0.12s'
                    }}
                    onMouseEnter={e => e.currentTarget.style.color = config.accent}
                    onMouseLeave={e => e.currentTarget.style.color = 'var(--text-muted)'}
                  >✂</button>
                </>
              )}
              <button
                onClick={onToggle}
                style={{
                  fontFamily: 'JetBrains Mono', fontSize: '11px', padding: '4px 10px',
                  background: enabled ? config.border : 'var(--border-subtle)',
                  border: 'none', borderRadius: '4px', cursor: 'pointer',
                  color: enabled ? config.accent : 'var(--text-muted)'
                }}
              >
                {enabled ? 'ON' : 'OFF'}
              </button>
            </div>
          </div>

          {/* Content */}
          <div style={{ flex: 1, overflowY: 'auto', overflowX: 'hidden', minWidth: 0, fontSize: '14px', lineHeight: 1.7 }}>
            {error && (
              <div style={{
                color: '#f47068', fontFamily: 'JetBrains Mono', fontSize: '12px',
                padding: '8px', background: 'rgba(244,112,104,0.1)', borderRadius: '4px'
              }}>
                {error}
              </div>
            )}
            {isLoading && !response && (
              <div style={{ color: 'var(--text-muted)', fontStyle: 'italic' }}>Thinking...</div>
            )}
            {response && <RenderedMarkdownWithCodePanels text={response} model={model} onOpenPanel={onOpenPanel} />}
            {!response && !isLoading && !error && (
              <div style={{ color: 'var(--text-muted)', fontStyle: 'italic', fontSize: '13px' }}>
                {hasKey ? 'Waiting for prompt...' : 'No API key loaded.'}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────
    // Conversation History
    // ─────────────────────────────────────────────

    function HistoryPanel({ history, onLoadTurn }) {
      const [expanded, setExpanded] = useState({});
      const [copied, setCopied] = useState({});

      if (history.length === 0) return null;

      const toggleExpand = (i, e) => {
        e.stopPropagation();
        setExpanded(prev => ({ ...prev, [i]: !prev[i] }));
      };

      const copyText = (i, text, e) => {
        e.stopPropagation();
        navigator.clipboard.writeText(text).then(() => {
          setCopied(prev => ({ ...prev, [i]: true }));
          setTimeout(() => setCopied(prev => ({ ...prev, [i]: false })), 2000);
        });
      };

      return (
        <div style={{
          borderTop: '1px solid var(--border-subtle)', marginTop: '24px', paddingTop: '20px'
        }}>
          <h3 style={{ fontFamily: 'JetBrains Mono', fontSize: '13px', color: 'var(--text-muted)', marginBottom: '12px' }}>
            CONVERSATION HISTORY
          </h3>
          <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
            {history.map((turn, i) => {
              const fullText = turn.userText || turn.prompt || '';
              const isLong = fullText.length > 120;
              const isExpanded = expanded[i];
              return (
                <div key={i} style={{
                  padding: '12px 16px', background: 'var(--bg-secondary)',
                  borderRadius: 'var(--radius)', border: '1px solid var(--border-subtle)',
                  cursor: 'pointer'
                }} onClick={() => onLoadTurn(turn)}>
                  <div style={{
                    fontFamily: 'JetBrains Mono', fontSize: '11px', color: 'var(--text-muted)', marginBottom: '6px'
                  }}>
                    Turn {i + 1} — {
                      turn.mode === 'parallel' ? 'Parallel' :
                      turn.mode === 'conductor' ? `Conductor (${turn.order?.map(m => PROVIDER_META[m]?.icon || m).join('→')})` :
                      `Directed → ${PROVIDER_META[turn.target]?.icon || ''} ${PROVIDER_META[turn.target]?.label || turn.target}`
                    }
                  </div>
                  <div style={{ fontSize: '14px', color: 'var(--text-secondary)' }}>
                    {isExpanded ? fullText : `${fullText.slice(0, 120)}${isLong ? '…' : ''}`}
                  </div>
                  {/* Expand / copy controls */}
                  <div style={{
                    display: 'flex', alignItems: 'center', gap: '10px',
                    marginTop: '8px'
                  }} onClick={e => e.stopPropagation()}>
                    {isLong && (
                      <button onClick={e => toggleExpand(i, e)} style={{
                        fontFamily: 'JetBrains Mono', fontSize: '11px', padding: '3px 8px',
                        background: 'transparent', border: '1px solid var(--border-subtle)',
                        borderRadius: 'var(--radius)', cursor: 'pointer', color: 'var(--text-muted)'
                      }}>
                        {isExpanded ? '▲ collapse' : '▼ expand'}
                      </button>
                    )}
                    <button onClick={e => copyText(i, fullText, e)} style={{
                      fontFamily: 'JetBrains Mono', fontSize: '11px', padding: '3px 8px',
                      background: copied[i] ? 'var(--chatgpt-border)' : 'transparent',
                      border: '1px solid var(--border-subtle)',
                      borderRadius: 'var(--radius)', cursor: 'pointer',
                      color: copied[i] ? 'var(--chatgpt-accent)' : 'var(--text-muted)',
                      transition: 'color 0.15s, background 0.15s'
                    }}>
                      {copied[i] ? '✓ copied' : '⎘ copy'}
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────
    // Main App
    // ─────────────────────────────────────────────

    function App() {
      const [keys, setKeys] = useState({ claude: '', chatgpt: '', gemini: '', grok: '', mistral: '', deepseek: '' });
      const [systemPrompts, setSystemPrompts] = useState({ claude: '', chatgpt: '', gemini: '', grok: '', mistral: '', deepseek: '' });
      const [showGenerateCtk, setShowGenerateCtk] = useState(false);
      const [showLoadKeys, setShowLoadKeys] = useState(false);
      const [showAbout, setShowAbout] = useState(false);
      const [prompt, setPrompt] = useState('');
      const [responses, setResponses] = useState(Object.fromEntries(ALL_PROVIDERS.map(p => [p, null])));
      const [loading, setLoading] = useState(Object.fromEntries(ALL_PROVIDERS.map(p => [p, false])));
      const [errors, setErrors] = useState(Object.fromEntries(ALL_PROVIDERS.map(p => [p, null])));
      const [enabled, setEnabled] = useState(Object.fromEntries(ALL_PROVIDERS.map(p => [p, true])));
      const [conversationHistory, setConversationHistory] = useState(
        Object.fromEntries(ALL_PROVIDERS.map(p => [p, []]))
      );
      const [turnHistory, setTurnHistory] = useState([]);
      const [sessionMeta, setSessionMeta] = useState(() => ({
        sessionId: generateSessionId(),
        startedAt: new Date().toISOString(),
        modelsActive: [],       // populated on first send
        verbosity: null,        // hook for CT-063
        readabilityTarget: null, // hook for CT-064
        sessionModality: 'visual', // hook for CT-062/067
      }));
      // Theme (CT-099 light/dark mode)
      const [darkMode, setDarkMode] = useState(() => {
        const stored = localStorage.getItem('ct-theme');
        return stored ? stored === 'dark' : true; // dark by default
      });
      useEffect(() => {
        document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : 'light');
        localStorage.setItem('ct-theme', darkMode ? 'dark' : 'light');
      }, [darkMode]);

      // Left sidebar open/collapsed state — auto-open on wide viewports
      const [sidebarOpen, setSidebarOpen] = useState(() => window.innerWidth >= 1100);
      // Right sidebar open/collapsed state
      const [sidebarRightOpen, setSidebarRightOpen] = useState(() => window.innerWidth >= 1200);
      const rightSidebarRef = useRef(null);

      // ── CT-110 Code Panel state ──
      const [codePanels, setCodePanels] = useState([]);
      const [panelZCounter, setPanelZCounter] = useState(100);
      const [panelLimitWarning, setPanelLimitWarning] = useState(false);
      // Position memory per model origin: { claude: {x,y}, chatgpt: {x,y}, gemini: {x,y} }
      const panelPositionMemory = useRef({});
      // Track last opened panel position for cascade
      const lastPanelPos = useRef(null);
      const panelIdCounter = useRef(0);

      const getInitialPanelPos = (model) => {
        const isFirst = codePanels.length === 0 && lastPanelPos.current === null;
        if (isFirst) {
          // Snap to column anchor
          const vw = window.innerWidth;
          const sidebarW = sidebarOpen ? 240 : 40;
          const contentW = vw - sidebarW;
          const colW = contentW / 3;
          if (model === 'gemini') {
            // Right edge anchor — panel right aligns to gemini column right
            return { x: Math.min(vw - 100, sidebarW + contentW - 40), y: 80, anchor: 'right' };
          } else {
            const colIndex = model === 'claude' ? 0 : 1;
            return { x: sidebarW + colIndex * colW + 8, y: 80, anchor: 'left' };
          }
        }
        // Cascade from last opened or from position memory
        const base = panelPositionMemory.current[model] || lastPanelPos.current || { x: 120, y: 80 };
        return {
          x: Math.min(base.x + CASCADE_OFFSET, window.innerWidth - 400),
          y: Math.min(base.y + CASCADE_OFFSET, window.innerHeight - 200),
          anchor: 'left'
        };
      };

      const openCodePanel = ({ lang, code, lines, model }) => {
        if (codePanels.length >= MAX_PANELS) {
          setPanelLimitWarning(true);
          setTimeout(() => setPanelLimitWarning(false), 2500);
          return;
        }
        const newZ = panelZCounter + 1;
        setPanelZCounter(newZ);
        const pos = getInitialPanelPos(model);
        lastPanelPos.current = pos;
        const id = ++panelIdCounter.current;
        const panel = {
          id, model, lang, code, lines,
          x: pos.x, y: pos.y, anchor: pos.anchor || 'left',
          zIndex: newZ,
          onPositionSave: (m, p) => {
            panelPositionMemory.current[m] = p;
            lastPanelPos.current = p;
          },
        };
        setCodePanels(prev => [...prev, panel]);
      };

      const closeCodePanel = (id) => {
        setCodePanels(prev => prev.filter(p => p.id !== id));
      };

      const closeAllCodePanels = () => {
        setCodePanels([]);
        lastPanelPos.current = null;
      };

      const focusCodePanel = (id) => {
        const newZ = panelZCounter + 1;
        setPanelZCounter(newZ);
        setCodePanels(prev => prev.map(p => p.id === id ? { ...p, zIndex: newZ } : p));
      };

      // CT-097 — per-slot model version selector
      const [selectedModels, setSelectedModels] = useState({ ...DEFAULT_MODELS });
      const [pendingModels, setPendingModels]   = useState({ ...DEFAULT_MODELS });
      const [availableModels, setAvailableModels] = useState(
        Object.fromEntries(ALL_PROVIDERS.map(p => [p, [{ id: DEFAULT_MODELS[p], label: DEFAULT_MODELS[p] }]]))
      );
      const [modelsFetching, setModelsFetching] = useState(Object.fromEntries(ALL_PROVIDERS.map(p => [p, false])));
      const [modelConfirmOpen, setModelConfirmOpen] = useState(false);
      const [modelConfirmWarning, setModelConfirmWarning] = useState(false);

      // Fetch model lists once per provider when a key becomes available
      const fetchedRef = React.useRef(Object.fromEntries(ALL_PROVIDERS.map(p => [p, false])));
      useEffect(() => {
        ALL_PROVIDERS.forEach(async (provider) => {
          const key = keys[provider]?.trim();
          if (!key || fetchedRef.current[provider]) return;
          fetchedRef.current[provider] = true;
          setModelsFetching(prev => ({ ...prev, [provider]: true }));
          const models = await fetchProviderModels(provider, key);
          setAvailableModels(prev => ({ ...prev, [provider]: models }));
          setSelectedModels(prev => {
            const ids = models.map(m => m.id);
            if (!ids.includes(prev[provider]) && models[0]?.id !== 'default') {
              const next = { ...prev, [provider]: models[0].id };
              setPendingModels(p => ({ ...p, [provider]: models[0].id }));
              return next;
            }
            return prev;
          });
          setModelsFetching(prev => ({ ...prev, [provider]: false }));
        });
      }, [keys]);

      const applyModelChanges = () => {
        setSelectedModels({ ...pendingModels });
        setModelConfirmWarning(false);
        setModelConfirmOpen(false);
      };

      const openModelConfirm = () => {
        if (pendingHasDupe) return;
        setModelConfirmWarning(false);
        setModelConfirmOpen(true);
      };

      const [sendMode, setSendMode] = useState('parallel'); // 'parallel' | 'conductor'
      const [modeArmed, setModeArmed] = useState(false);
      const [conductorOrder, setConductorOrder] = useState(['claude', 'chatgpt', 'gemini']);
      const pendingHasChanges = conductorOrder.some(m => pendingModels[m] !== selectedModels[m]);
      const pendingVals = conductorOrder.map(m => pendingModels[m]);
      const pendingHasDupe = pendingVals.some((v, i) => pendingVals.indexOf(v) !== i);
      const [conductorActive, setConductorActive] = useState(false);
      const [directTo, setDirectTo] = useState('all');         // 'all' | 'claude' | 'chatgpt' | 'gemini'
      const [excludeModel, setExcludeModel] = useState('none'); // 'none' | 'claude' | 'chatgpt' | 'gemini'
      const [includeResponse, setIncludeResponse] = useState('none'); // 'none' | 'claude' | 'chatgpt' | 'gemini'

      const activeModels = conductorOrder.filter(m => enabled[m] && keys[m]?.trim());

      const handleSetDirectTo = (val) => {
        setDirectTo(val);
        if (val !== 'all') setExcludeModel('none');
      };
      const handleSetExcludeModel = (val) => {
        setExcludeModel(val);
        if (val !== 'none') {
          setDirectTo('all');
          setModeArmed(true);
        }
      };
      // Session vault (CT-083 / CT-019 / CT-084)
      const [sessionVault, setSessionVault] = useState([]);
      const [vaultForward, setVaultForward] = useState([]); // array of selected vault entry ids

      // CT-094 — In-app clipboard: one slot per model, replace on re-clip
      // { claude: { text, clippedAt } | null, chatgpt: ..., gemini: ... }
      const [clippedResponses, setClippedResponses] = useState(Object.fromEntries(ALL_PROVIDERS.map(p => [p, null])));
      // Which clipped slots are selected for include in next prompt
      const [clipInclude, setClipInclude] = useState(Object.fromEntries(ALL_PROVIDERS.map(p => [p, false])));

      const clipResponse = (model, text) => {
