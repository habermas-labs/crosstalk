<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    // ─────────────────────────────────────────────
    // Encryption Utilities (Web Crypto API)
    // ─────────────────────────────────────────────

    const cryptoUtils = {
      async deriveKey(passphrase, salt) {
        const enc = new TextEncoder();
        const keyMaterial = await crypto.subtle.importKey(
          'raw', enc.encode(passphrase), 'PBKDF2', false, ['deriveKey']
        );
        return crypto.subtle.deriveKey(
          { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
          keyMaterial,
          { name: 'AES-GCM', length: 256 },
          false,
          ['encrypt', 'decrypt']
        );
      },

      async encrypt(data, passphrase) {
        const enc = new TextEncoder();
        const salt = crypto.getRandomValues(new Uint8Array(16));
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const key = await this.deriveKey(passphrase, salt);
        const encrypted = await crypto.subtle.encrypt(
          { name: 'AES-GCM', iv },
          key,
          enc.encode(JSON.stringify(data))
        );
        const packed = new Uint8Array(salt.length + iv.length + encrypted.byteLength);
        packed.set(salt, 0);
        packed.set(iv, salt.length);
        packed.set(new Uint8Array(encrypted), salt.length + iv.length);
        return btoa(String.fromCharCode(...packed));
      },

      async decrypt(base64, passphrase) {
        const packed = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
        const salt = packed.slice(0, 16);
        const iv = packed.slice(16, 28);
        const ciphertext = packed.slice(28);
        const key = await this.deriveKey(passphrase, salt);
        const decrypted = await crypto.subtle.decrypt(
          { name: 'AES-GCM', iv },
          key,
          ciphertext
        );
        return JSON.parse(new TextDecoder().decode(decrypted));
      }
    };

    // ─────────────────────────────────────────────
    // Session Vault — IndexedDB (CT-019 / CT-083)
    // ─────────────────────────────────────────────
    // Schema: { id (auto), filename, content, mimeType, size, uploadedAt }
    // Stage one: .txt and .md only. mimeType/size fields are present for stage two
    // (binary formats, per-provider file APIs) without requiring a schema migration.

    const vaultDB = (() => {
      const DB_NAME = 'ct-vault';
      const STORE   = 'files';
      const VERSION = 1;

      const open = () => new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, VERSION);
        req.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(STORE)) {
            db.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true });
          }
        };
        req.onsuccess = (e) => resolve(e.target.result);
        req.onerror   = (e) => reject(e.target.error);
      });

      return {
        async getAll() {
          const db = await open();
          return new Promise((resolve, reject) => {
            const tx  = db.transaction(STORE, 'readonly');
            const req = tx.objectStore(STORE).getAll();
            req.onsuccess = (e) => resolve(e.target.result);
            req.onerror   = (e) => reject(e.target.error);
          });
        },

        async put(entry) {
          // entry: { filename, content, mimeType, size, uploadedAt }
          const db = await open();
          return new Promise((resolve, reject) => {
            const tx  = db.transaction(STORE, 'readwrite');
            const req = tx.objectStore(STORE).add(entry);
            req.onsuccess = (e) => resolve(e.target.result); // returns assigned id
            req.onerror   = (e) => reject(e.target.error);
          });
        },

        async remove(id) {
          const db = await open();
          return new Promise((resolve, reject) => {
            const tx  = db.transaction(STORE, 'readwrite');
            const req = tx.objectStore(STORE).delete(id);
            req.onsuccess = () => resolve();
            req.onerror   = (e) => reject(e.target.error);
          });
        },
      };
    })();

    // ─────────────────────────────────────────────
    // API Adapters
    // ─────────────────────────────────────────────

    const apiAdapters = {
      claude: async (messages, systemPrompt, apiKey) => {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 4096,
            system: systemPrompt || 'You are a helpful assistant participating in a multi-model triangulation discussion.',
            messages: messages.map(m => ({ role: m.role, content: m.content }))
          })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error.message);
        return data.content.map(b => b.text).join('\n');
      },

      chatgpt: async (messages, systemPrompt, apiKey) => {
        const msgs = [];
        if (systemPrompt) msgs.push({ role: 'system', content: systemPrompt });
        msgs.push(...messages.map(m => ({ role: m.role, content: m.content })));
        const res = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`
          },
          body: JSON.stringify({
            model: 'gpt-4o',
            max_tokens: 4096,
            messages: msgs
          })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error.message);
        return data.choices[0].message.content;
      },

      gemini: async (messages, systemPrompt, apiKey) => {
        const contents = messages.map(m => ({
          role: m.role === 'assistant' ? 'model' : 'user',
          parts: [{ text: m.content }]
        }));
        const body = { contents };
        if (systemPrompt) {
          body.systemInstruction = { parts: [{ text: systemPrompt }] };
        }
        const res = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          }
        );
        const data = await res.json();
        if (data.error) throw new Error(data.error.message);
        return data.candidates[0].content.parts.map(p => p.text).join('\n');
      }
    };

    // ─────────────────────────────────────────────
    // ─────────────────────────────────────────────
    // Session Utilities
    // ─────────────────────────────────────────────

    const generateSessionId = () => {
      // compact ISO date + 6 random hex chars — human-readable, no dependency
      const date = new Date().toLocaleDateString('en-CA').replace(/-/g, '');
      const rand = Math.floor(Math.random() * 0xffffff).toString(16).padStart(6, '0');
      return `${date}-${rand}`;
    };

    // Markdown renderer
    // ─────────────────────────────────────────────

    function RenderedMarkdown({ text }) {
      const html = marked.parse(text || '', { breaks: true, gfm: true });
      return <div dangerouslySetInnerHTML={{ __html: html }} className="prose" />;
    }

    // ─────────────────────────────────────────────
    // Settings Panel
    // ─────────────────────────────────────────────

    function SettingsPanel({ keys, setKeys, systemPrompts, setSystemPrompts, conductorOrder, setConductorOrder, onClose }) {
      const [exportPassphrase, setExportPassphrase] = useState('');
      const [importPassphrase, setImportPassphrase] = useState('');
      const [urlKeySource, setUrlKeySource] = useState('https://keys.yourcrosstalklab.com');
      const [urlPassphrase, setUrlPassphrase] = useState('');
      const [cryptoStatus, setCryptoStatus] = useState(null);
      const [exportConfirm, setExportConfirm] = useState(null); // { failedLabels, exportKeys }
      const fileInputRef = useRef(null);

      const [showKey, setShowKey] = useState({ claude: false, chatgpt: false, gemini: false });
      const [showPassphrase, setShowPassphrase] = useState({ export: false, import: false, url: false });

      // Key test state: null | 'testing' | 'pass' | 'fail'
      const [keyTestStatus, setKeyTestStatus] = useState({ claude: null, chatgpt: null, gemini: null });
      const [keyTestMsg, setKeyTestMsg] = useState({ claude: '', chatgpt: '', gemini: '' });

      const setTestResult = (modelId, status, msg = '') => {
        setKeyTestStatus(prev => ({ ...prev, [modelId]: status }));
        setKeyTestMsg(prev => ({ ...prev, [modelId]: msg }));
      };

      const testKey = async (modelId) => {
        const key = keys[modelId]?.trim();
        if (!key) {
          setTestResult(modelId, 'fail', 'No key entered.');
          return;
        }
        setTestResult(modelId, 'testing', '');
        try {
          if (modelId === 'claude') {
            const res = await fetch('https://api.anthropic.com/v1/messages', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'x-api-key': key,
                'anthropic-version': '2023-06-01',
                'anthropic-dangerous-direct-browser-access': 'true'
              },
              body: JSON.stringify({
                model: 'claude-haiku-4-5-20251001',
                max_tokens: 10,
                messages: [{ role: 'user', content: 'Hi' }]
              })
            });
            const data = await res.json();
            if (data.error) throw new Error(data.error.type + ': ' + data.error.message);
            setTestResult(modelId, 'pass', 'Key validated.');
          } else if (modelId === 'chatgpt') {
            const res = await fetch('https://api.openai.com/v1/chat/completions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${key}`
              },
              body: JSON.stringify({
                model: 'gpt-4o-mini',
                max_tokens: 10,
                messages: [{ role: 'user', content: 'Hi' }]
              })
            });
            const data = await res.json();
            if (data.error) throw new Error(data.error.code + ': ' + data.error.message);
            setTestResult(modelId, 'pass', 'Key validated.');
          } else if (modelId === 'gemini') {
            const res = await fetch(
              `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`,
              {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ role: 'user', parts: [{ text: 'Hi' }] }] })
              }
            );
            const data = await res.json();
            if (data.error) {
              // Distinguish quota:0 (provisioning failure) from other errors
              const msg = data.error.message || '';
              if (msg.includes('limit: 0') || msg.includes('free_tier') || (res.status === 429 && msg.includes('quota'))) {
                throw new Error('Quota not provisioned — create a new key in a new Google project. See Quick Start Guide Step 3.');
              }
              throw new Error(data.error.message);
            }
            setTestResult(modelId, 'pass', 'Key validated.');
          }
        } catch (err) {
          const msg = err.message || 'Unknown error.';
          // Friendly messages for common failure modes
          if (msg.includes('401') || msg.includes('invalid_api_key') || msg.includes('authentication')) {
            setTestResult(modelId, 'fail', 'Invalid key — check that you copied the full key without extra spaces.');
          } else if (msg.includes('Quota not provisioned')) {
            setTestResult(modelId, 'fail', msg);
          } else if (msg.includes('Failed to fetch') || msg.includes('NetworkError')) {
            setTestResult(modelId, 'fail', 'Service unreachable — check your connection and try again.');
          } else {
            setTestResult(modelId, 'fail', msg);
          }
        }
      };

      const testAll = async () => {
        // Only test fields that have content — empty fields stay yellow
        const ids = ['claude', 'chatgpt', 'gemini'].filter(id => keys[id]?.trim());
        if (ids.length === 0) return;
        await Promise.all(ids.map(id => testKey(id)));
      };

      // Derive export button state from test results
      // Empty fields count as yellow (unconfirmed), not red
      const exportState = (() => {
        const enteredIds = ['claude', 'chatgpt', 'gemini'].filter(id => keys[id]?.trim());
        if (enteredIds.length === 0) return 'yellow';
        const enteredStatuses = enteredIds.map(id => keyTestStatus[id]);
        const anyFail = enteredStatuses.some(s => s === 'fail');
        const allPass = enteredStatuses.every(s => s === 'pass');
        if (allPass) return 'green';
        if (anyFail) return 'red';
        return 'yellow';
      })();

      const exportColors = {
        green:  { bg: '#1a3d24', color: '#6bcf8e', border: '#1a3d24' },
        yellow: { bg: '#2a2a10', color: '#c8b84a', border: '#3a3a18' },
        red:    { bg: '#3d1a1a', color: '#f47068', border: '#3d1a1a' },
      };

      const exportTooltips = {
        green:  'All keys validated — ready to export',
        yellow: 'Some keys untested — export will include only entered keys',
        red:    'One or more keys failed — click to review before exporting',
      };

      // Pill color logic
      const pillColor = (modelId) => {
        const s = keyTestStatus[modelId];
        if (s === 'pass')    return { bg: '#1a3d24', color: '#6bcf8e', border: '#2a5a34' };
        if (s === 'fail')    return { bg: '#3d1a1a', color: '#f47068', border: '#5a2a2a' };
        if (s === 'testing') return { bg: 'var(--bg-input)', color: 'var(--text-muted)', border: 'var(--border-subtle)' };
        // null = unconfirmed (yellow attention)
        return { bg: '#2a2a10', color: '#c8b84a', border: '#3a3a18' };
      };

      const pillTooltip = (modelId) => {
        const s = keyTestStatus[modelId];
        if (s === 'pass')    return 'Key validated';
        if (s === 'fail')    return 'Validation failed — check your key';
        if (s === 'testing') return 'Testing...';
        return 'Not yet tested';
      };

      const MODEL_META = {
        claude:  { label: 'Claude',  accent: 'var(--claude-accent)',  icon: '◈' },
        chatgpt: { label: 'ChatGPT', accent: 'var(--chatgpt-accent)', icon: '◇' },
        gemini:  { label: 'Gemini',  accent: 'var(--gemini-accent)',  icon: '△' },
      };

      const models = [
        { id: 'claude',  label: 'Claude',  accent: 'var(--claude-accent)'  },
        { id: 'chatgpt', label: 'ChatGPT', accent: 'var(--chatgpt-accent)' },
        { id: 'gemini',  label: 'Gemini',  accent: 'var(--gemini-accent)'  }
      ];

      // Update a single position in the conductor order
      const handleOrderChange = (position, newModel) => {
        // Swap: if newModel is already in the order, swap it with what's currently at this position
        const current = [...conductorOrder];
        const existingPos = current.indexOf(newModel);
        const displaced = current[position];
        current[existingPos] = displaced;
        current[position] = newModel;
        setConductorOrder(current);
      };

      // Load keys from a remote URL (Cloudflare Worker → R2)
      const handleLoadFromUrl = async () => {
        if (!urlKeySource.trim()) {
          setCryptoStatus({ type: 'error', msg: 'Enter a URL to load from.' });
          return;
        }
        if (!urlPassphrase.trim()) {
          setCryptoStatus({ type: 'error', msg: 'Enter your passphrase before loading.' });
          return;
        }
        try {
          setCryptoStatus({ type: 'info', msg: 'Fetching key file...' });
          const res = await fetch(urlKeySource.trim(), { credentials: 'include' });
          if (!res.ok) throw new Error(`Server returned ${res.status}`);
          const base64 = (await res.text()).trim();
          setCryptoStatus({ type: 'info', msg: 'Decrypting...' });
          const data = await cryptoUtils.decrypt(base64, urlPassphrase);
          if (data.keys) setKeys(data.keys);
          if (data.systemPrompts) setSystemPrompts(data.systemPrompts);
          setUrlPassphrase('');
          setCryptoStatus({ type: 'success', msg: 'Keys loaded from URL successfully.' });
        } catch (err) {
          setCryptoStatus({ type: 'error', msg: 'Load failed — ' + err.message });
        }
      };

      // Export keys to encrypted file
      const handleExport = async () => {
        if (!exportPassphrase.trim()) {
          setCryptoStatus({ type: 'error', msg: 'Enter a passphrase to encrypt your keys.' });
          return;
        }

        const failedModels = ['claude', 'chatgpt', 'gemini'].filter(id => keyTestStatus[id] === 'fail');

        if (failedModels.length > 0) {
          // Show inline confirmation instead of window.confirm
          const failedLabels = failedModels.map(id =>
            ({ claude: 'Claude', chatgpt: 'ChatGPT', gemini: 'Gemini' }[id])
          );
          let exportKeys = { ...keys };
          failedModels.forEach(id => { exportKeys[id] = ''; });
          const hasValid = ['claude', 'chatgpt', 'gemini'].some(id => exportKeys[id]?.trim());
          if (!hasValid) {
            setCryptoStatus({ type: 'error', msg: 'No valid keys to export — all keys either failed or are empty.' });
            return;
          }
          setExportConfirm({ failedLabels, exportKeys });
          return;
        }

        await doExport({ ...keys });
      };

      const doExport = async (exportKeys) => {
        setExportConfirm(null);
        try {
          setCryptoStatus({ type: 'info', msg: 'Encrypting...' });
          const data = { keys: exportKeys, systemPrompts, exportedAt: new Date().toISOString() };
          const encrypted = await cryptoUtils.encrypt(data, exportPassphrase);
          const blob = new Blob([encrypted], { type: 'text/plain' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'crosstalk-keys.ctk';
          a.click();
          URL.revokeObjectURL(url);
          setExportPassphrase('');
          setCryptoStatus({ type: 'success', msg: 'Keys exported and encrypted.' });
        } catch (err) {
          setCryptoStatus({ type: 'error', msg: 'Export failed: ' + err.message });
        }
      };

      // Import keys from encrypted file
      const handleImport = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        if (!importPassphrase.trim()) {
          setCryptoStatus({ type: 'error', msg: 'Enter your passphrase before importing.' });
          fileInputRef.current.value = '';
          return;
        }
        try {
          setCryptoStatus({ type: 'info', msg: 'Decrypting...' });
          const base64 = await file.text();
          const data = await cryptoUtils.decrypt(base64.trim(), importPassphrase);
          if (data.keys) setKeys(data.keys);
          if (data.systemPrompts) setSystemPrompts(data.systemPrompts);
          setImportPassphrase('');
          setCryptoStatus({ type: 'success', msg: 'Keys imported successfully.' });
        } catch (err) {
          setCryptoStatus({ type: 'error', msg: 'Decryption failed — wrong passphrase or corrupted file.' });
        }
        fileInputRef.current.value = '';
      };

      const statusColors = { error: '#f47068', success: '#6bcf8e', info: 'var(--gemini-accent)' };

      const selectStyle = {
        padding: '6px 10px',
        background: 'var(--bg-secondary)',
        border: '1px solid var(--border-subtle)',
        borderRadius: 'var(--radius)',
        color: 'var(--text-primary)',
        fontFamily: 'JetBrains Mono',
        fontSize: '12px',
        outline: 'none',
        cursor: 'pointer',
        flex: 1,
      };

      return (
        <div style={{
          position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.7)',
          display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 100
        }}
          onMouseDown={e => { if (e.target === e.currentTarget) e.currentTarget._closeOnMouseUp = true; }}
          onMouseUp={e => { if (e.currentTarget._closeOnMouseUp) { e.currentTarget._closeOnMouseUp = false; onClose(); } }}
        >
          <div style={{
            background: 'var(--bg-secondary)', borderRadius: '12px', padding: '32px',
            width: '90%', maxWidth: '600px', maxHeight: '80vh', overflowY: 'auto',
            border: '1px solid var(--border-subtle)', boxShadow: 'var(--shadow)'
          }} onMouseDown={e => e.stopPropagation()} onClick={e => e.stopPropagation()}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '24px' }}>
              <h2 style={{ fontFamily: 'JetBrains Mono', fontSize: '18px', fontWeight: 700 }}>Configuration</h2>
              <button onClick={onClose} style={{
                background: 'none', border: 'none', color: 'var(--text-secondary)',
                fontSize: '20px', cursor: 'pointer'
              }}>✕</button>
            </div>

            {/* API Keys + System Prompts */}
            {models.map(m => (
              <div key={m.id} style={{ marginBottom: '24px' }}>
                <label style={{
                  fontFamily: 'JetBrains Mono', fontSize: '13px', fontWeight: 500,
                  color: m.accent, display: 'block', marginBottom: '6px'
                }}>{m.label} API Key</label>
                <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
                  <div style={{ flex: 1, position: 'relative' }}>
                    <input
                      type={showKey[m.id] ? 'text' : 'password'}
                      autoComplete="new-password"
                      value={keys[m.id] || ''}
                      onChange={e => {
                        setKeys(prev => ({ ...prev, [m.id]: e.target.value }));
                        setKeyTestStatus(prev => ({ ...prev, [m.id]: null }));
                        setKeyTestMsg(prev => ({ ...prev, [m.id]: '' }));
                      }}
                      onInput={e => {
                        setKeys(prev => ({ ...prev, [m.id]: e.target.value }));
                        setKeyTestStatus(prev => ({ ...prev, [m.id]: null }));
                        setKeyTestMsg(prev => ({ ...prev, [m.id]: '' }));
                      }}
                      placeholder={`Enter ${m.label} API key...`}
                      style={{
                        width: '100%', padding: '10px 36px 10px 14px', background: 'var(--bg-input)',
                        border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius)',
                        color: 'var(--text-primary)', fontFamily: 'JetBrains Mono', fontSize: '13px',
                        outline: 'none'
                      }}
                    />
                    <button
                      onClick={() => setShowKey(prev => ({ ...prev, [m.id]: !prev[m.id] }))}
                      title={showKey[m.id] ? 'Hide key' : 'Show key'}
                      style={{
                        position: 'absolute', right: '10px', top: '50%', transform: 'translateY(-50%)',
                        background: 'none', border: 'none', cursor: 'pointer',
                        color: 'var(--text-muted)', fontSize: '14px', padding: '2px', lineHeight: 1
                      }}
                    >
                      {showKey[m.id] ? '🙈' : '👁'}
                    </button>
                  </div>
                  <button
                    onClick={() => testKey(m.id)}
                    disabled={keyTestStatus[m.id] === 'testing'}
                    title={pillTooltip(m.id)}
                    style={{
                      fontFamily: 'JetBrains Mono', fontSize: '11px', padding: '6px 12px',
                      borderRadius: '999px', border: `1px solid ${pillColor(m.id).border}`,
                      background: pillColor(m.id).bg, color: pillColor(m.id).color,
                      cursor: keyTestStatus[m.id] === 'testing' ? 'default' : 'pointer',
                      whiteSpace: 'nowrap', transition: 'all 0.2s ease', flexShrink: 0
                    }}
                  >
                    {keyTestStatus[m.id] === 'testing' ? '...' : 'Test'}
                  </button>
                </div>
                {keyTestMsg[m.id] && (
                  <div style={{
                    marginTop: '4px', fontSize: '11px', fontFamily: 'JetBrains Mono',
                    color: keyTestStatus[m.id] === 'pass' ? '#6bcf8e' : '#f47068',
                    lineHeight: 1.4
                  }}>
                    {keyTestMsg[m.id]}
                  </div>
                )}
                <label style={{
                  fontFamily: 'JetBrains Mono', fontSize: '13px', fontWeight: 500,
                  color: 'var(--text-secondary)', display: 'block', marginBottom: '6px', marginTop: '12px'
                }}>{m.label} System Prompt (optional)</label>
                <textarea
                  value={systemPrompts[m.id] || ''}
                  onChange={e => setSystemPrompts(prev => ({ ...prev, [m.id]: e.target.value }))}
                  placeholder={`Custom instructions for ${m.label}...`}
                  rows={3}
                  style={{
                    width: '100%', padding: '10px 14px', background: 'var(--bg-input)',
                    border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius)',
                    color: 'var(--text-primary)', fontFamily: 'Source Serif 4', fontSize: '14px',
                    outline: 'none', resize: 'vertical'
                  }}
                />
              </div>
            ))}

            {/* Key File Management */}
            <div style={{
              padding: '20px', background: 'var(--bg-input)', borderRadius: 'var(--radius)',
              border: '1px solid var(--border-subtle)', marginBottom: '16px'
            }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
                <h3 style={{ fontFamily: 'JetBrains Mono', fontSize: '14px', fontWeight: 600 }}>
                  Key File (Encrypted)
                </h3>
                <button
                  onClick={testAll}
                  disabled={['claude','chatgpt','gemini'].some(id => keyTestStatus[id] === 'testing')}
                  title={
                    ['claude','chatgpt','gemini'].every(id => keyTestStatus[id] === 'pass')
                      ? 'All keys validated'
                      : 'Test all keys before exporting'
                  }
                  style={{
                    fontFamily: 'JetBrains Mono', fontSize: '11px', padding: '5px 14px',
                    borderRadius: '999px', cursor: 'pointer', transition: 'all 0.2s ease',
                    border: `1px solid ${exportColors[exportState].border}`,
                    background: exportColors[exportState].bg,
                    color: exportColors[exportState].color,
                  }}
                >
                  {['claude','chatgpt','gemini'].some(id => keyTestStatus[id] === 'testing') ? 'Testing...' : 'Test All'}
                </button>
              </div>

              {/* Export */}
              <div style={{ marginBottom: '16px' }}>
                <label style={{
                  fontFamily: 'JetBrains Mono', fontSize: '12px', color: 'var(--text-secondary)',
                  display: 'block', marginBottom: '4px'
                }}>Export — save your keys to an encrypted file</label>
                <p style={{
                  fontFamily: 'JetBrains Mono', fontSize: '10px', color: 'var(--text-muted)',
                  marginBottom: '8px', lineHeight: 1.5
                }}>
                  🟡 Yellow = untested keys included as-is · 🟢 Green = all passed · 🔴 Red = failed keys excluded with confirmation · Test and export in the same Settings session — closing resets test results.
                </p>
                <div style={{ display: 'flex', gap: '8px' }}>
                  <div style={{ flex: 1, position: 'relative' }}>
                    <input
                      type={showPassphrase.export ? 'text' : 'password'}
                      value={exportPassphrase}
                      onChange={e => setExportPassphrase(e.target.value)}
                      autoComplete="new-password"
                      placeholder="Choose a passphrase..."
                      style={{
                        width: '100%', padding: '8px 32px 8px 12px', background: 'var(--bg-secondary)',
                        border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius)',
                        color: 'var(--text-primary)', fontFamily: 'JetBrains Mono', fontSize: '12px',
                        outline: 'none'
                      }}
                    />
                    <button
                      onClick={() => setShowPassphrase(prev => ({ ...prev, export: !prev.export }))}
                      title={showPassphrase.export ? 'Hide passphrase' : 'Show passphrase'}
                      style={{
                        position: 'absolute', right: '8px', top: '50%', transform: 'translateY(-50%)',
                        background: 'none', border: 'none', cursor: 'pointer',
                        color: 'var(--text-muted)', fontSize: '12px', padding: '2px', lineHeight: 1
                      }}
                    >{showPassphrase.export ? '🙈' : '👁'}</button>
                  </div>
                  <button
                    onClick={handleExport}
                    title={exportTooltips[exportState]}
                    style={{
                      fontFamily: 'JetBrains Mono', fontSize: '12px', padding: '8px 16px',
                      border: 'none', borderRadius: 'var(--radius)',
                      cursor: 'pointer', whiteSpace: 'nowrap', transition: 'all 0.2s ease',
                      background: exportColors[exportState].bg,
                      color: exportColors[exportState].color,
                    }}
                  >
                    Export .ctk
                  </button>
                </div>
              </div>

              {/* Import */}
              <div>
                <label style={{
                  fontFamily: 'JetBrains Mono', fontSize: '12px', color: 'var(--text-secondary)',
                  display: 'block', marginBottom: '6px'
                }}>Import — load keys from an encrypted file</label>
                <div style={{ display: 'flex', gap: '8px' }}>
                  <div style={{ flex: 1, position: 'relative' }}>
                    <input
                      type={showPassphrase.import ? 'text' : 'password'}
                      value={importPassphrase}
                      onChange={e => setImportPassphrase(e.target.value)}
                      autoComplete="new-password"
                      placeholder="Enter your passphrase..."
                      style={{
                        width: '100%', padding: '8px 32px 8px 12px', background: 'var(--bg-secondary)',
                        border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius)',
                        color: 'var(--text-primary)', fontFamily: 'JetBrains Mono', fontSize: '12px',
                        outline: 'none'
                      }}
                    />
                    <button
                      onClick={() => setShowPassphrase(prev => ({ ...prev, import: !prev.import }))}
                      title={showPassphrase.import ? 'Hide passphrase' : 'Show passphrase'}
                      style={{
                        position: 'absolute', right: '8px', top: '50%', transform: 'translateY(-50%)',
                        background: 'none', border: 'none', cursor: 'pointer',
                        color: 'var(--text-muted)', fontSize: '12px', padding: '2px', lineHeight: 1
                      }}
                    >{showPassphrase.import ? '🙈' : '👁'}</button>
                  </div>
                  <button onClick={() => fileInputRef.current?.click()} style={{
                    fontFamily: 'JetBrains Mono', fontSize: '12px', padding: '8px 16px',
                    background: 'var(--gemini-border)', border: 'none', borderRadius: 'var(--radius)',
                    cursor: 'pointer', color: 'var(--gemini-accent)', whiteSpace: 'nowrap'
                  }}>
                    Import .ctk
                  </button>
                  <input
                    ref={fileInputRef}
                    type="file"
                    accept=".ctk"
                    onChange={handleImport}
                    style={{ display: 'none' }}
                  />
                </div>
              </div>

              {/* Load from URL */}
              <div style={{ marginTop: '16px', paddingTop: '16px', borderTop: '1px solid var(--border-subtle)' }}>
                <label style={{
                  fontFamily: 'JetBrains Mono', fontSize: '12px', color: 'var(--text-secondary)',
                  display: 'block', marginBottom: '6px'
                }}>Load from URL — fetch encrypted key file from your Worker</label>
                <div style={{ display: 'flex', gap: '8px', marginBottom: '8px' }}>
                  <input
                    type="text"
                    value={urlKeySource}
                    onChange={e => setUrlKeySource(e.target.value)}
                    placeholder="https://keys.yourcrosstalklab.com"
                    style={{
                      flex: 1, padding: '8px 12px', background: 'var(--bg-secondary)',
                      border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius)',
                      color: 'var(--text-primary)', fontFamily: 'JetBrains Mono', fontSize: '12px',
                      outline: 'none'
                    }}
                  />
                </div>
                <div style={{ display: 'flex', gap: '8px' }}>
                  <div style={{ flex: 1, position: 'relative' }}>
                    <input
                      type={showPassphrase.url ? 'text' : 'password'}
                      value={urlPassphrase}
                      onChange={e => setUrlPassphrase(e.target.value)}
                      autoComplete="new-password"
                      placeholder="Enter your passphrase..."
                      style={{
                        width: '100%', padding: '8px 32px 8px 12px', background: 'var(--bg-secondary)',
                        border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius)',
                        color: 'var(--text-primary)', fontFamily: 'JetBrains Mono', fontSize: '12px',
                        outline: 'none'
                      }}
                    />
                    <button
                      onClick={() => setShowPassphrase(prev => ({ ...prev, url: !prev.url }))}
                      title={showPassphrase.url ? 'Hide passphrase' : 'Show passphrase'}
                      style={{
                        position: 'absolute', right: '8px', top: '50%', transform: 'translateY(-50%)',
                        background: 'none', border: 'none', cursor: 'pointer',
                        color: 'var(--text-muted)', fontSize: '12px', padding: '2px', lineHeight: 1
                      }}
                    >{showPassphrase.url ? '🙈' : '👁'}</button>
                  </div>
                  <button onClick={handleLoadFromUrl} style={{
                    fontFamily: 'JetBrains Mono', fontSize: '12px', padding: '8px 16px',
                    background: 'var(--chatgpt-border)', border: 'none', borderRadius: 'var(--radius)',
                    cursor: 'pointer', color: 'var(--chatgpt-accent)', whiteSpace: 'nowrap'
                  }}>
                    Load ↓
                  </button>
                </div>
              </div>

              {/* Inline export confirmation — replaces window.confirm */}
              {exportConfirm && (
                <div style={{
                  marginTop: '12px', padding: '12px', borderRadius: 'var(--radius)',
                  background: '#3d1a1a', border: '1px solid #5a2a2a',
                  fontFamily: 'JetBrains Mono', fontSize: '12px', color: '#f47068'
                }}>
                  <div style={{ marginBottom: '8px', fontWeight: 600 }}>
                    The following key{exportConfirm.failedLabels.length > 1 ? 's' : ''} failed validation and will not be included:
                  </div>
                  {exportConfirm.failedLabels.map(l => (
                    <div key={l} style={{ marginBottom: '4px' }}>• {l}</div>
                  ))}
                  <div style={{ marginTop: '10px', display: 'flex', gap: '8px' }}>
                    <button
                      onClick={() => doExport(exportConfirm.exportKeys)}
                      style={{
                        fontFamily: 'JetBrains Mono', fontSize: '11px', padding: '5px 12px',
                        background: '#5a2a2a', border: '1px solid #7a3a3a', borderRadius: 'var(--radius)',
                        color: '#f47068', cursor: 'pointer'
                      }}
                    >
                      Proceed without {exportConfirm.failedLabels.length > 1 ? 'them' : 'it'}
                    </button>
                    <button
                      onClick={() => setExportConfirm(null)}
                      style={{
                        fontFamily: 'JetBrains Mono', fontSize: '11px', padding: '5px 12px',
                        background: 'var(--bg-input)', border: '1px solid var(--border-subtle)',
                        borderRadius: 'var(--radius)', color: 'var(--text-secondary)', cursor: 'pointer'
                      }}
                    >
                      Cancel
                    </button>
                  </div>
                </div>
              )}

              {/* Status message */}
              {cryptoStatus && (
                <div style={{
                  marginTop: '12px', fontSize: '12px', fontFamily: 'JetBrains Mono',
                  color: statusColors[cryptoStatus.type] || 'var(--text-secondary)'
                }}>
                  {cryptoStatus.msg}
                </div>
              )}
            </div>

            {/* ── Conductor Order ── */}
            <div style={{
              padding: '20px', background: 'var(--bg-input)', borderRadius: 'var(--radius)',
              border: '1px solid var(--border-subtle)', marginBottom: '16px'
            }}>
              <h3 style={{ fontFamily: 'JetBrains Mono', fontSize: '14px', fontWeight: 600, marginBottom: '4px' }}>
                Conductor Order
              </h3>
              <p style={{
                fontFamily: 'JetBrains Mono', fontSize: '11px', color: 'var(--text-muted)',
                marginBottom: '14px', lineHeight: 1.5
              }}>
                Opening cycle sequence — each model sees the responses of models before it.
              </p>
              <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                {conductorOrder.map((modelId, position) => (
                  <React.Fragment key={position}>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '4px', flex: 1 }}>
                      <label style={{
                        fontFamily: 'JetBrains Mono', fontSize: '10px',
                        color: 'var(--text-muted)', textAlign: 'center'
                      }}>
                        {position === 0 ? '1st' : position === 1 ? '2nd' : '3rd'}
                      </label>
                      <select
                        value={modelId}
                        onChange={e => handleOrderChange(position, e.target.value)}
                        style={{
                          ...selectStyle,
                          color: MODEL_META[modelId].accent,
                          borderColor: modelId === 'claude' ? 'var(--claude-border)'
                            : modelId === 'chatgpt' ? 'var(--chatgpt-border)'
                            : 'var(--gemini-border)',
                        }}
                      >
                        <option value="claude">◈ Claude</option>
                        <option value="chatgpt">◇ ChatGPT</option>
                        <option value="gemini">△ Gemini</option>
                      </select>
                    </div>
                    {position < 2 && (
                      <span style={{
                        color: 'var(--text-muted)', fontFamily: 'JetBrains Mono',
                        fontSize: '14px', marginTop: '18px', flexShrink: 0
                      }}>→</span>
                    )}
                  </React.Fragment>
                ))}
              </div>
              {/* Preview */}
              <div style={{
                marginTop: '12px', fontFamily: 'JetBrains Mono', fontSize: '11px',
                color: 'var(--text-muted)', textAlign: 'center'
              }}>
                {conductorOrder.map((m, i) => (
                  <span key={m}>
                    <span style={{ color: MODEL_META[m].accent }}>{MODEL_META[m].icon} {MODEL_META[m].label}</span>
                    {i < conductorOrder.length - 1 && <span> → </span>}
                  </span>
                ))}
              </div>
            </div>

            <div style={{
              padding: '16px', background: 'var(--bg-input)', borderRadius: 'var(--radius)',
              border: '1px solid var(--border-subtle)', fontSize: '13px', color: 'var(--text-secondary)',
              lineHeight: 1.5
            }}>
              <strong style={{ color: 'var(--text-primary)' }}>Security:</strong> API keys exist only in browser
              session memory and are never stored on disk unless you explicitly export them. Exported .ctk files
              are encrypted with AES-256-GCM — without your passphrase, the contents are unrecoverable. Keep the
              .ctk file on your USB drive alongside the app.
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────
    // Model Response Card
    // ─────────────────────────────────────────────

    function ModelCard({ model, response, isLoading, error, enabled, onToggle }) {
      const config = {
        claude:  { label: 'Claude',  accent: 'var(--claude-accent)',  bg: 'var(--claude-bg)',  border: 'var(--claude-border)',  icon: '◈' },
        chatgpt: { label: 'ChatGPT', accent: 'var(--chatgpt-accent)', bg: 'var(--chatgpt-bg)', border: 'var(--chatgpt-border)', icon: '◇' },
        gemini:  { label: 'Gemini',  accent: 'var(--gemini-accent)',  bg: 'var(--gemini-bg)',  border: 'var(--gemini-border)',  icon: '△' }
      }[model];

      return (
        <div style={{
          background: enabled ? config.bg : 'var(--bg-secondary)',
          border: `1px solid ${enabled ? config.border : 'var(--border-subtle)'}`,
          borderRadius: '12px', padding: '20px', minHeight: '200px',
          opacity: enabled ? 1 : 0.4, transition: 'all 0.3s ease',
          display: 'flex', flexDirection: 'column', position: 'relative'
        }}>
          {/* Header */}
          <div style={{
            display: 'flex', justifyContent: 'space-between', alignItems: 'center',
            marginBottom: '16px'
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
              <span style={{ color: config.accent, fontSize: '18px' }}>{config.icon}</span>
              <span style={{
                fontFamily: 'JetBrains Mono', fontSize: '14px', fontWeight: 700, color: config.accent
              }}>{config.label}</span>
              {isLoading && (
                <span style={{
                  display: 'inline-block', width: '8px', height: '8px', borderRadius: '50%',
                  background: config.accent, animation: 'pulse 1s infinite'
                }} />
              )}
            </div>
            <button
              onClick={onToggle}
              style={{
                fontFamily: 'JetBrains Mono', fontSize: '11px', padding: '4px 10px',
                background: enabled ? config.border : 'var(--border-subtle)',
                border: 'none', borderRadius: '4px', cursor: 'pointer',
                color: enabled ? config.accent : 'var(--text-muted)'
              }}
            >
              {enabled ? 'ON' : 'OFF'}
            </button>
          </div>

          {/* Content */}
          <div style={{ flex: 1, overflowY: 'auto', fontSize: '14px', lineHeight: 1.7 }}>
            {error && (
              <div style={{
                color: '#f47068', fontFamily: 'JetBrains Mono', fontSize: '12px',
                padding: '8px', background: 'rgba(244,112,104,0.1)', borderRadius: '4px'
              }}>
                {error}
              </div>
            )}
            {isLoading && !response && (
              <div style={{ color: 'var(--text-muted)', fontStyle: 'italic' }}>Thinking...</div>
            )}
            {response && <RenderedMarkdown text={response} />}
            {!response && !isLoading && !error && (
              <div style={{ color: 'var(--text-muted)', fontStyle: 'italic', fontSize: '13px' }}>
                Waiting for prompt...
              </div>
            )}
          </div>

          {/* Copy button — stays at bottom, only when there's a response */}
          {response && (
            <div style={{ marginTop: '12px' }}>
              <button onClick={() => navigator.clipboard.writeText(response)}
                style={{
                  fontFamily: 'JetBrains Mono', fontSize: '10px', padding: '4px 8px',
                  background: 'var(--bg-input)', border: '1px solid var(--border-subtle)',
                  borderRadius: '4px', cursor: 'pointer', color: 'var(--text-secondary)'
                }}

              </button>

          )}

      );
    }

    // ─────────────────────────────────────────────
    // Conversation History
    // ─────────────────────────────────────────────

    function HistoryPanel({ history, onLoadTurn }) {
      const [expanded, setExpanded] = useState({});
      const [copied, setCopied] = useState({});

      if (history.length === 0) return null;

      const toggleExpand = (i, e) => {
        e.stopPropagation();
        setExpanded(prev => ({ ...prev, [i]: !prev[i] }));
      };

      const copyText = (i, text, e) => {
        e.stopPropagation();
        navigator.clipboard.writeText(text).then(() => {
          setCopied(prev => ({ ...prev, [i]: true }));
          setTimeout(() => setCopied(prev => ({ ...prev, [i]: false })), 2000);
        });
      };

      return (
        <div style={{
          borderTop: '1px solid var(--border-subtle)', marginTop: '24px', paddingTop: '20px'
        }}>
          <h3 style={{ fontFamily: 'JetBrains Mono', fontSize: '13px', color: 'var(--text-muted)', marginBottom: '12px' }}>
            CONVERSATION HISTORY
          </h3>
          <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
            {history.map((turn, i) => {
              const fullText = turn.userText || turn.prompt || '';
              const isLong = fullText.length > 120;
              const isExpanded = expanded[i];
              return (
                <div key={i} style={{
                  padding: '12px 16px', background: 'var(--bg-secondary)',
                  borderRadius: 'var(--radius)', border: '1px solid var(--border-subtle)',
                  cursor: 'pointer'
                }} onClick={() => onLoadTurn(turn)}>
                  <div style={{
                    fontFamily: 'JetBrains Mono', fontSize: '11px', color: 'var(--text-muted)', marginBottom: '6px'
                  }}>
                    Turn {i + 1} — {
                      turn.mode === 'parallel' ? 'Parallel' :
                      turn.mode === 'conductor' ? `Conductor (${turn.order?.map(m => ({claude:'◈',chatgpt:'◇',gemini:'△'})[m]).join('→')})` :
                      `Directed → ${{claude:'◈ Claude',chatgpt:'◇ ChatGPT',gemini:'△ Gemini'}[turn.target] || turn.target}`
                    }
                  </div>
                  <div style={{ fontSize: '14px', color: 'var(--text-secondary)' }}>
                    {isExpanded ? fullText : `${fullText.slice(0, 120)}${isLong ? '…' : ''}`}
                  </div>
                  {/* Expand / copy controls */}
                  {(isLong || isExpanded) && (
                    <div style={{
                      display: 'flex', alignItems: 'center', gap: '10px',
                      marginTop: '8px'
                    }} onClick={e => e.stopPropagation()}>
                      <button onClick={e => toggleExpand(i, e)} style={{
                        fontFamily: 'JetBrains Mono', fontSize: '11px', padding: '3px 8px',
                        background: 'transparent', border: '1px solid var(--border-subtle)',
                        borderRadius: 'var(--radius)', cursor: 'pointer', color: 'var(--text-muted)'
                      }}>
                        {isExpanded ? '▲ collapse' : '▼ expand'}
                      </button>
                      {isExpanded && (
                        <button onClick={e => copyText(i, fullText, e)} style={{
                          fontFamily: 'JetBrains Mono', fontSize: '11px', padding: '3px 8px',
                          background: copied[i] ? 'var(--chatgpt-border)' : 'transparent',
                          border: '1px solid var(--border-subtle)',
                          borderRadius: 'var(--radius)', cursor: 'pointer',
                          color: copied[i] ? 'var(--chatgpt-accent)' : 'var(--text-muted)',
                          transition: 'color 0.15s, background 0.15s'
                        }}>
                          {copied[i] ? '✓ copied' : '⎘ copy'}
                        </button>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────
    // Main App
    // ─────────────────────────────────────────────

    function App() {
      const [keys, setKeys] = useState({ claude: '', chatgpt: '', gemini: '' });
      const [systemPrompts, setSystemPrompts] = useState({ claude: '', chatgpt: '', gemini: '' });
      const [showSettings, setShowSettings] = useState(false);
      const [prompt, setPrompt] = useState('');
      const [responses, setResponses] = useState({ claude: null, chatgpt: null, gemini: null });
      const [loading, setLoading] = useState({ claude: false, chatgpt: false, gemini: false });
      const [errors, setErrors] = useState({ claude: null, chatgpt: null, gemini: null });
      const [enabled, setEnabled] = useState({ claude: true, chatgpt: true, gemini: true });
      const [conversationHistory, setConversationHistory] = useState({
        claude: [], chatgpt: [], gemini: []
      });
      const [turnHistory, setTurnHistory] = useState([]);
      const [sessionMeta, setSessionMeta] = useState(() => ({
        sessionId: generateSessionId(),
        startedAt: new Date().toISOString(),
        modelsActive: [],       // populated on first send
        verbosity: null,        // hook for CT-063
        readabilityTarget: null, // hook for CT-064
        sessionModality: 'visual', // hook for CT-062/067
      }));
      const [sendMode, setSendMode] = useState('parallel'); // 'parallel' | 'conductor'
      const [modeArmed, setModeArmed] = useState(false);
      const [conductorOrder, setConductorOrder] = useState(['claude', 'chatgpt', 'gemini']);
      const [conductorActive, setConductorActive] = useState(false);
      const [directTo, setDirectTo] = useState('all');         // 'all' | 'claude' | 'chatgpt' | 'gemini'
      const [excludeModel, setExcludeModel] = useState('none'); // 'none' | 'claude' | 'chatgpt' | 'gemini'
      const [includeResponse, setIncludeResponse] = useState('none'); // 'none' | 'claude' | 'chatgpt' | 'gemini'

      const activeModels = ['claude', 'chatgpt', 'gemini'].filter(m => enabled[m] && keys[m]?.trim());

      const handleSetDirectTo = (val) => {
        setDirectTo(val);
        if (val !== 'all') setExcludeModel('none');
      };
      const handleSetExcludeModel = (val) => {
        setExcludeModel(val);
        if (val !== 'none') {
          setDirectTo('all');
          setSendMode('parallel');
          setModeArmed(true);
        }
      };
      // Session vault (CT-083 / CT-019 / CT-084)
      const [sessionVault, setSessionVault] = useState([]);
      const [vaultForward, setVaultForward] = useState(null); // null | vault entry id (number)
      const vaultInputRef = useRef(null);

      // Load vault from IndexedDB on mount
      useEffect(() => {
        vaultDB.getAll().then(entries => setSessionVault(entries)).catch(() => {});
      }, []);

      const handleVaultUpload = (e) => {
        const files = Array.from(e.target.files || []);
        e.target.value = '';
        files.forEach(file => {
          const allowed = file.name.endsWith('.txt') || file.name.endsWith('.md');
          if (!allowed) return;
          const reader = new FileReader();
          reader.onload = async (ev) => {
            const entry = {
              filename:   file.name,
              content:    ev.target.result,
              mimeType:   file.type || 'text/plain',
              size:       file.size,
              uploadedAt: new Date().toISOString(),
            };
            try {
              const id = await vaultDB.put(entry);
              setSessionVault(prev => [...prev, { ...entry, id }]);
            } catch (err) {
              console.error('Vault write failed:', err);
            }
          };
          reader.readAsText(file);
        });
      };

      const removeFromVault = async (id) => {
        try {
          await vaultDB.remove(id);
          setSessionVault(prev => prev.filter(f => f.id !== id));
          if (vaultForward === id) setVaultForward(null);
        } catch (err) {
          console.error('Vault remove failed:', err);
        }
      };

      const textareaRef = useRef(null);
      const exportMenuRef = useRef(null);
      const [exportMenuOpen, setExportMenuOpen] = useState(false);
      const [summarizeMenuOpen, setSummarizeMenuOpen] = useState(false);
      const [summarizing, setSummarizing] = useState(false);

      // Carousel
      const CAROUSEL_WORDS = [
        'Triangulation', 'Reciprocity', 'the Agora', 'Discourse',
        'Porosity', 'Calibration', 'the In-Between', 'RIP', 'your Crosstalk Lab'
      ];
      const [carouselIndex, setCarouselIndex] = useState(0);
      const [carouselKey, setCarouselKey] = useState(1);
      const [carouselRunKey, setCarouselRunKey] = useState(0);
      const [taglineVisible, setTaglineVisible] = useState(false);
      const carouselTickRef = useRef(0);
      useEffect(() => {
        carouselTickRef.current = 0;
        setCarouselIndex(0);
        setCarouselKey(k => k + 1);
        setTaglineVisible(false);
        const timer = setInterval(() => {
          carouselTickRef.current += 1;
          if (carouselTickRef.current >= CAROUSEL_WORDS.length) {
            clearInterval(timer);
            setTimeout(() => setTaglineVisible(true), 2000);
            return;
          }
          setCarouselIndex(carouselTickRef.current);
          setCarouselKey(k => k + 1);
        }, 3800);
        return () => clearInterval(timer);
      }, [carouselRunKey]);

      // Auto-resize textarea
      useEffect(() => {
        const ta = textareaRef.current;
        if (ta) {
          ta.style.height = 'auto';
          ta.style.height = Math.min(ta.scrollHeight, 200) + 'px';
        }
      }, [prompt]);

      // Close export menu on outside click
      useEffect(() => {
        const handler = (e) => {
          if (exportMenuRef.current && !exportMenuRef.current.contains(e.target)) {
            setExportMenuOpen(false);
            setSummarizeMenuOpen(false);
          }
        };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, []);

      const hasAnyKey = Object.values(keys).some(k => k.trim());

      // Build the full prompt content, optionally appending vault file and/or included model response
      const buildPromptContent = (userText, includeModel, vaultFile) => {
        let base = userText;

        // Append vault file first if present — it is reference material, not dialogue
        if (vaultFile) {
          const fileBlock = `\n\n---\nThe following is plain text inlined directly into this prompt from the user's local session. No file transfer is occurring — this is text content included as part of your context (source: ${vaultFile.filename}):\n\n${vaultFile.content}\n---`;
          base = base ? base + fileBlock : fileBlock.trimStart();
        }

        // No model response to include — return base (prompt + optional file)
        if (!includeModel || includeModel === 'none' || !responses[includeModel]) return base || userText;

        const modelLabels = { claude: 'Claude', chatgpt: 'ChatGPT', gemini: 'Gemini' };
        const included = responses[includeModel];
        if (!base.trim()) {
          // Move 2: pure response routing, no new user text
          return `Here is ${modelLabels[includeModel]}'s response to our discussion. Please react to it, noting points of agreement, disagreement, or areas you'd like to develop further:\n\n---\n${included}\n---`;
        }
        // Move 3: combined — user prompt (+ optional file) + included response
        return `${base}\n\n---\nFor context, here is ${modelLabels[includeModel]}'s response to our previous discussion:\n\n${included}\n---`;
      };

      // Send to all enabled models in parallel
      const sendParallel = useCallback(async () => {
        const userText = prompt.trim();
        const included = includeResponse !== 'none' ? includeResponse : null;
        if (!userText && !included) return;

        const turnTimestamp = new Date().toISOString();
        const includeSnapshot = included ? { model: included, snapshot: responses[included] } : null;
        const vaultFile = vaultForward !== null ? sessionVault.find(f => f.id === vaultForward) || null : null;
        const content = buildPromptContent(userText, included, vaultFile);
        setPrompt('');
        setDirectTo('all');
        setExcludeModel('none');
        setIncludeResponse('none');
        setVaultForward(null);
        setModeArmed(false);

        const models = ['claude', 'chatgpt', 'gemini'].filter(m => enabled[m] && keys[m]?.trim() && m !== excludeModel);

        // Record active models on first send
        setSessionMeta(prev => prev.modelsActive.length === 0
          ? { ...prev, modelsActive: models }
          : prev
        );

        const resetResponses = {};
        const resetErrors = {};
        const loadingState = { claude: false, chatgpt: false, gemini: false };
        models.forEach(m => { resetResponses[m] = null; resetErrors[m] = null; loadingState[m] = true; });
        setResponses(prev => ({ ...prev, ...resetResponses }));
        setErrors(prev => ({ ...prev, ...resetErrors }));
        setLoading(loadingState);

        const newHistories = { ...conversationHistory };
        models.forEach(m => {
          newHistories[m] = [...newHistories[m], { role: 'user', content }];
        });
        setConversationHistory(newHistories);

        const results = {};
        await Promise.allSettled(models.map(async (model) => {
          try {
            const response = await apiAdapters[model](
              newHistories[model], systemPrompts[model], keys[model]
            );
            results[model] = { response, error: null, responseTimestamp: new Date().toISOString() };
            setResponses(prev => ({ ...prev, [model]: response }));
            setConversationHistory(prev => ({
              ...prev,
              [model]: [...prev[model], { role: 'assistant', content: response }]
            }));
          } catch (err) {
            results[model] = { response: null, error: err.message, responseTimestamp: new Date().toISOString() };
            setErrors(prev => ({ ...prev, [model]: err.message }));
          } finally {
            setLoading(prev => ({ ...prev, [model]: false }));
          }
        }));

        setTurnHistory(prev => [...prev, {
          turnIndex: prev.length,
          timestamp: turnTimestamp,
          mode: 'parallel',
          userText,
          include: includeSnapshot,
          target: null,
          order: null,
          builtPrompt: content,
          results,
          sessionModality: 'visual',
          roles: {},
        }]);
      }, [prompt, excludeModel, includeResponse, vaultForward, sessionVault, enabled, keys, systemPrompts, conversationHistory, responses]);

      // Opening cycle — sequential, each model sees prior responses
      const sendConductor = useCallback(async () => {
        const userText = prompt.trim();
        const included = includeResponse !== 'none' ? includeResponse : null;
        if (!userText && !included) return;

        const turnTimestamp = new Date().toISOString();
        const includeSnapshot = included ? { model: included, snapshot: responses[included] } : null;
        const vaultFile = vaultForward !== null ? sessionVault.find(f => f.id === vaultForward) || null : null;
        const baseContent = buildPromptContent(userText, included, vaultFile);
        setPrompt('');
        setDirectTo('all');
        setExcludeModel('none');
        setIncludeResponse('none');
        setVaultForward(null);
        setModeArmed(false);

        const models = conductorOrder.filter(m => enabled[m] && keys[m]?.trim());
        if (models.length === 0) return;

        // Record active models on first send
        setSessionMeta(prev => prev.modelsActive.length === 0
          ? { ...prev, modelsActive: models }
          : prev
        );

        setResponses({ claude: null, chatgpt: null, gemini: null });
        setErrors({ claude: null, chatgpt: null, gemini: null });
        setConductorActive(true);

        const results = {};
        const priorResponses = [];

        for (const model of models) {
          setLoading(prev => ({ ...prev, [model]: true }));

          let contextualPrompt = baseContent;
          if (priorResponses.length > 0) {
            const modelLabels = { claude: 'Claude', chatgpt: 'ChatGPT', gemini: 'Gemini' };
            const priorText = priorResponses
              .map(p => '### ' + modelLabels[p.model] + '\n' + p.response)
              .join('\n\n');
            contextualPrompt = baseContent
              + '\n\n---\nThe following models have already responded to this prompt.'
              + ' Please read their responses before giving your own:\n\n'
              + priorText
              + '\n\n---\nNow give your own response, engaging with what has been said where relevant.';
          }

          const newHistory = [...conversationHistory[model], { role: 'user', content: contextualPrompt }];

          try {
            const response = await apiAdapters[model](newHistory, systemPrompts[model], keys[model]);
            results[model] = { response, error: null, responseTimestamp: new Date().toISOString() };
            priorResponses.push({ model, response });
            setResponses(prev => ({ ...prev, [model]: response }));
            setConversationHistory(prev => ({
              ...prev,
              [model]: [...prev[model], { role: 'assistant', content: response }]
            }));
          } catch (err) {
            results[model] = { response: null, error: err.message, responseTimestamp: new Date().toISOString() };
            setErrors(prev => ({ ...prev, [model]: err.message }));
            priorResponses.push({ model, response: `[Error: ${err.message}]` });
          } finally {
            setLoading(prev => ({ ...prev, [model]: false }));
          }
        }

        setConductorActive(false);
        setTurnHistory(prev => [...prev, {
          turnIndex: prev.length,
          timestamp: turnTimestamp,
          mode: 'conductor',
          userText,
          include: includeSnapshot,
          target: null,
          order: models,
          builtPrompt: baseContent,
          results,
          sessionModality: 'visual',
          roles: {},
        }]);
      }, [prompt, includeResponse, vaultForward, sessionVault, enabled, keys, systemPrompts, conversationHistory, conductorOrder, responses]);

      // Send to a single model — directed prompt (Move 1) or combined (Move 3)
      const sendDirect = useCallback(async (targetModel) => {
        const userText = prompt.trim();
        const included = includeResponse !== 'none' ? includeResponse : null;
        if (!userText && !included) return;
        if (!keys[targetModel]?.trim()) {
          setErrors(prev => ({ ...prev, [targetModel]: `No API key configured for ${targetModel}` }));
          return;
        }

        const turnTimestamp = new Date().toISOString();
        const includeSnapshot = included ? { model: included, snapshot: responses[included] } : null;
        const vaultFile = vaultForward !== null ? sessionVault.find(f => f.id === vaultForward) || null : null;
        const content = buildPromptContent(userText, included, vaultFile);
        setPrompt('');
        setDirectTo('all');
        setExcludeModel('none');
        setIncludeResponse('none');
        setVaultForward(null);

        // Record active models on first send
        setSessionMeta(prev => prev.modelsActive.length === 0
          ? { ...prev, modelsActive: [targetModel] }
          : prev
        );

        setLoading(prev => ({ ...prev, [targetModel]: true }));
        setResponses(prev => ({ ...prev, [targetModel]: null }));
        setErrors(prev => ({ ...prev, [targetModel]: null }));

        const newHistory = [...conversationHistory[targetModel], { role: 'user', content }];
        setConversationHistory(prev => ({ ...prev, [targetModel]: newHistory }));

        try {
          const response = await apiAdapters[targetModel](newHistory, systemPrompts[targetModel], keys[targetModel]);
          setResponses(prev => ({ ...prev, [targetModel]: response }));
          setConversationHistory(prev => ({
            ...prev,
            [targetModel]: [...prev[targetModel], { role: 'assistant', content: response }]
          }));
          setTurnHistory(prev => [...prev, {
            turnIndex: prev.length,
            timestamp: turnTimestamp,
            mode: 'directed',
            userText,
            include: includeSnapshot,
            target: targetModel,
            order: null,
            builtPrompt: content,
            results: { [targetModel]: { response, error: null, responseTimestamp: new Date().toISOString() } },
            sessionModality: 'visual',
            roles: {},
          }]);
        } catch (err) {
          setErrors(prev => ({ ...prev, [targetModel]: err.message }));
          setTurnHistory(prev => [...prev, {
            turnIndex: prev.length,
            timestamp: turnTimestamp,
            mode: 'directed',
            userText,
            include: includeSnapshot,
            target: targetModel,
            order: null,
            builtPrompt: content,
            results: { [targetModel]: { response: null, error: err.message, responseTimestamp: new Date().toISOString() } },
            sessionModality: 'visual',
            roles: {},
          }]);
        } finally {
          setLoading(prev => ({ ...prev, [targetModel]: false }));

      }, [prompt, includeResponse, vaultForward, sessionVault, keys, systemPrompts, conversationHistory, responses]);

      // Moderated dialogue — send one model's response to another


      // Clear conversation
      const clearConversation = () => {
        setResponses({ claude: null, chatgpt: null, gemini: null });
        setErrors({ claude: null, chatgpt: null, gemini: null });
        setConversationHistory({ claude: [], chatgpt: [], gemini: [] });
        setTurnHistory([]);
        setSessionMeta({
          sessionId: generateSessionId(),
          startedAt: new Date().toISOString(),
          modelsActive: [],
          verbosity: null,

          sessionModality: 'visual',

        setDirectTo('all');
        setExcludeModel('none');
        setIncludeResponse('none');
        setModeArmed(false);
      };

      // Export session as markdown transcript
      const exportTranscript = () => {
        if (turnHistory.length === 0) return;
        const modelLabels = { claude: 'Claude', chatgpt: 'ChatGPT', gemini: 'Gemini' };
        const modelIcons  = { claude: '◈', chatgpt: '◇', gemini: '△' };
        const now = new Date();
        const exportedAt = now.toISOString();
        const dateStr = now.toLocaleDateString('en-CA');
        const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

        // Session duration
        const startedAt = new Date(sessionMeta.startedAt);
        const durationMs = now - startedAt;
        const durationMins = Math.round(durationMs / 60000);
        const durationStr = durationMins < 1 ? '<1 min' : `${durationMins} min`;

        // Active models from sessionMeta, fallback to keyed models
        const activeModelIds = sessionMeta.modelsActive.length > 0
          ? sessionMeta.modelsActive
          : ['claude', 'chatgpt', 'gemini'].filter(m => keys[m]?.trim());
        const activeModelsStr = activeModelIds.map(m => `${modelIcons[m]} ${modelLabels[m]}`).join(' · ');

        // Modes used across turns
        const modesUsed = [...new Set(turnHistory.map(t => t.mode))].join(', ');

        let md = `# Crosstalk Lab — Session Transcript\n\n`;
        md += `**Session ID:** \`${sessionMeta.sessionId}\`  \n`;
        md += `**Started:** ${new Date(sessionMeta.startedAt).toLocaleDateString('en-CA')} at ${new Date(sessionMeta.startedAt).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })}  \n`;
        md += `**Exported:** ${dateStr} at ${timeStr}  \n`;
        md += `**Duration:** ${durationStr}  \n`;
        md += `**Models:** ${activeModelsStr}  \n`;
        md += `**Turns:** ${turnHistory.length}  \n`;
        md += `**Modes used:** ${modesUsed}  \n`;
        if (sessionMeta.verbosity)        md += `**Verbosity:** ${sessionMeta.verbosity}  \n`;
        if (sessionMeta.readabilityTarget) md += `**Readability target:** ${sessionMeta.readabilityTarget}  \n`;
        md += `\n---\n\n`;
        
        turnHistory.forEach((turn, i) => {
          // Turn header
          let turnLabel = '';
          if (turn.mode === 'parallel') {
            turnLabel = 'Parallel';
          } else if (turn.mode === 'conductor') {
            turnLabel = `Conductor — ${turn.order.map(m => modelIcons[m]).join(' → ')}`;
          } else {
            // directed
            const includeLabel = turn.include ? ` + ${modelIcons[turn.include.model]}` : '';
            turnLabel = `Directed → ${modelIcons[turn.target]} ${modelLabels[turn.target]}${includeLabel}`;
          }

          const turnTime = new Date(turn.timestamp).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
          md += `## Turn ${i + 1} — ${turnLabel}\n`;
          md += `*${turnTime}*\n\n`;

          // Prompt — show userText and include provenance separately
          if (turn.userText) {
            md += `**Prompt:** ${turn.userText}\n\n`;
          }
          if (turn.include) {
            md += `**Included:** ${modelIcons[turn.include.model]} ${modelLabels[turn.include.model]}'s prior response\n\n`;
            md += `> ${turn.include.snapshot.split('\n').join('\n> ')}\n\n`;
          }
          if (!turn.userText && !turn.include) {
            // fallback — should not occur with enriched schema
            md += `**Prompt:** *(no text)*\n\n`;
          }

          // Responses
          const responseModels = turn.order
            ? turn.order.filter(m => turn.results[m])
            : Object.keys(turn.results);

          responseModels.forEach(model => {
            const result = turn.results[model];
            const respTime = result.responseTimestamp
              ? new Date(result.responseTimestamp).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' })
              : null;
            md += `### ${modelIcons[model]} ${modelLabels[model]}`;
            if (respTime) md += ` *[${respTime}]*`;
            md += `\n\n`;
            if (result.response) md += `${result.response}\n\n`;
            else if (result.error) md += `*Error: ${result.error}*\n\n`;
          });

          md += `---\n\n`;
        });

        const blob = new Blob([md], { type: 'text/markdown' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `ct-session-${sessionMeta.sessionId}.md`;
        a.click();
        URL.revokeObjectURL(url);
      };

      // Summary export — send full transcript to a model, download the synthesis
      const summarizeWith = async (targetModel) => {

        const modelLabels = { claude: 'Claude', chatgpt: 'ChatGPT', gemini: 'Gemini' };

        const activeModelIds = sessionMeta.modelsActive.length > 0

          else turnLabel = `Directed → ${modelIcons[turn.target]} ${modelLabels[turn.target]}`;

          digest += `## Turn ${i + 1} — ${turnLabel}\n\n`;
          if (turn.userText) digest += `**Prompt:** ${turn.userText}\n\n`;
          if (turn.include) digest += `**Included:** ${modelLabels[turn.include.model]}'s prior response\n\n`;

            ? turn.order.filter(m => turn.results[m])

          });

            [{ role: 'user', content: summaryPrompt }],
            '', // no system prompt — the prompt itself is fully framed
            keys[targetModel]

          md += `| | |\n|---|---|\n`;
          md += `| **Session ID** | \`${sessionMeta.sessionId}\` |\n`;
          md += `| **Synthesized by** | ${modelIcons[targetModel]} ${modelLabels[targetModel]} |\n`;
          md += `| **Exported** | ${dateStr} at ${timeStr} |\n`;
          md += `| **Source turns** | ${turnHistory.length} |\n\n`;
          md += `---\n\n`;
          md += response;

          const blob = new Blob([md], { type: 'text/markdown' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `ct-summary-${sessionMeta.sessionId}-${targetModel}.md`;
          a.click();
          URL.revokeObjectURL(url);
        } catch (err) {
          console.error('Summary export failed:', err);
        } finally {
          setSummarizing(false);
        }
      };

      // Keyboard handler
      // Send is armed if mode explicitly selected OR Exclude active OR session already underway
      const sendArmed = modeArmed || excludeModel !== 'none' || turnHistory.length > 0;

      const handleKeyDown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          if (directTo !== 'all') sendDirect(directTo);
          else if (sendArmed && !conductorActive && (prompt.trim() || includeResponse !== 'none')) {
            if (sendMode === 'conductor') sendConductor();

      // Conductor order display for status line
      const conductorOrderLabels = { claude: '◈', chatgpt: '◇', gemini: '△' };

      return (
