                    <option value="none">None</option>
                    {enabled['claude']  && keys['claude']?.trim()  && <option value="claude">◈ Claude</option>}
                    {enabled['chatgpt'] && keys['chatgpt']?.trim() && <option value="chatgpt">◇ ChatGPT</option>}
                    {enabled['gemini']  && keys['gemini']?.trim()  && <option value="gemini">△ Gemini</option>}
                  </select>
                </div>
              )}

              {/* Forward dropdown — shown when a model has a response or vault has files */}
              {(['claude','chatgpt','gemini'].some(m => responses[m]) || sessionVault.length > 0) && (
                <div style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
                  <label style={{
                    fontFamily: 'JetBrains Mono', fontSize: '11px', color: 'var(--text-muted)', whiteSpace: 'nowrap'
                  }}>Forward</label>
                  <select
                    value={vaultForward !== null ? `vault:${vaultForward}` : includeResponse}
                    onChange={e => {
                      const val = e.target.value;
                      if (val.startsWith('vault:')) {
                        setVaultForward(Number(val.slice(6)));
                        setIncludeResponse('none');
                      } else {
                        setIncludeResponse(val);
                        setVaultForward(null);
                      }
                    }}
                    style={{
                      padding: '5px 8px', background: 'var(--bg-input)',
                      border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius)',
                      color: vaultForward !== null ? 'var(--text-secondary)'
                        : includeResponse === 'none' ? 'var(--text-secondary)'
                        : includeResponse === 'claude' ? 'var(--claude-accent)'
                        : includeResponse === 'chatgpt' ? 'var(--chatgpt-accent)'
                        : 'var(--gemini-accent)',
                      fontFamily: 'JetBrains Mono', fontSize: '12px', outline: 'none', cursor: 'pointer'
                    }}
                  >
                    <option value="none">None</option>
                    {responses['claude']  && <option value="claude">◈ Claude</option>}
                    {responses['chatgpt'] && <option value="chatgpt">◇ ChatGPT</option>}
                    {responses['gemini']  && <option value="gemini">△ Gemini</option>}
                    {sessionVault.length > 0 && <option disabled>── vault ──</option>}
                    {sessionVault.map(f => (
                      <option key={f.id} value={`vault:${f.id}`}>
                        {f.filename.endsWith('.md') ? '▪' : '◻'} {f.filename}
                      </option>
                    ))}
                  </select>
                </div>
              )}

              {/* Vault upload button */}
              <button
                onClick={() => vaultInputRef.current?.click()}
                title="Upload .txt or .md files to session vault"
                style={{
                  fontFamily: 'JetBrains Mono', fontSize: '11px', padding: '5px 10px',
                  background: sessionVault.length > 0 ? 'var(--bg-input)' : 'transparent',
                  border: `1px solid ${sessionVault.length > 0 ? 'var(--border-hover)' : 'var(--border-subtle)'}`,
                  borderRadius: 'var(--radius)', cursor: 'pointer',
                  color: sessionVault.length > 0 ? 'var(--text-secondary)' : 'var(--text-muted)',
                  whiteSpace: 'nowrap',
                }}
              >
                ⊕ {sessionVault.length > 0 ? `${sessionVault.length} file${sessionVault.length > 1 ? 's' : ''}` : 'Vault'}
              </button>

              {/* Spacer */}
              <div style={{ flex: 1 }} />

              {/* Status */}
              <div style={{ fontFamily: 'JetBrains Mono', fontSize: '11px', color: 'var(--text-muted)' }}>
                {conductorActive
                  ? <span style={{ color: 'var(--gemini-accent)' }}>
                      ◈ Conducting… {conductorOrder.map(m => conductorOrderLabels[m]).join(' → ')}
                    </span>
                  : directTo !== 'all'
                  ? <span style={{ color: {claude:'var(--claude-accent)',chatgpt:'var(--chatgpt-accent)',gemini:'var(--gemini-accent)'}[directTo] }}>
                      {{ claude:'◈ Claude', chatgpt:'◇ ChatGPT', gemini:'△ Gemini' }[directTo]}
                    </span>
                  : excludeModel !== 'none'
                  ? <span>Excluding <span style={{ color: {claude:'var(--claude-accent)',chatgpt:'var(--chatgpt-accent)',gemini:'var(--gemini-accent)'}[excludeModel] }}>{{ claude:'◈ Claude', chatgpt:'◇ ChatGPT', gemini:'△ Gemini' }[excludeModel]}</span></span>
                  : sendMode === 'conductor'
                  ? <span>
                      Order: {conductorOrder.map((m, i) => (
                        <span key={m}>
                          <span style={{ color: {claude:'var(--claude-accent)',chatgpt:'var(--chatgpt-accent)',gemini:'var(--gemini-accent)'}[m] }}>
                            {conductorOrderLabels[m]}
                          </span>
                          {i < conductorOrder.length - 1 && ' → '}
                        </span>
                      ))}
                    </span>
                  : <>Active: {activeModels
                      .map(m => ({ claude: 'Claude', chatgpt: 'ChatGPT', gemini: 'Gemini' }[m]))
                      .join(', ') || 'None'}
                    </>
                }
              </div>

              {/* Send controls — mode dropdown + send button when directTo=all, single Send when directed */}
              {directTo === 'all' ? (
                <>
                  <select
                    value={modeArmed || sendMode !== 'parallel' || turnHistory.length > 0 ? sendMode : ''}
                    onChange={e => { if (e.target.value) { setSendMode(e.target.value); setModeArmed(true); } }}
                    style={{
                      fontFamily: 'JetBrains Mono', fontSize: '12px', padding: '6px 10px',
                      background: sendArmed ? 'var(--bg-card)' : turnHistory.length > 0 ? 'var(--bg-input)' : 'transparent',
                      border: `1px solid ${sendArmed ? 'var(--border-hover)' : 'var(--border-subtle)'}`,
                      borderRadius: 'var(--radius)', cursor: 'pointer', outline: 'none',
                      color: sendArmed ? 'var(--text-primary)' : turnHistory.length > 0 ? 'var(--text-secondary)' : 'var(--text-muted)',
                    }}
                  >
                    {!sendArmed && turnHistory.length === 0 && <option value="">Mode:</option>}
                    <option value="parallel">Parallel</option>
                    <option value="conductor">Conductor</option>
                  </select>
                  <button
                    disabled={!sendArmed || (!prompt.trim() && includeResponse === 'none') || conductorActive}
                    onClick={() => sendMode === 'parallel' ? sendParallel() : sendConductor()}
                    style={{
                      fontFamily: 'JetBrains Mono', fontSize: '12px', padding: '6px 14px',
                      background: sendArmed && (prompt.trim() || includeResponse !== 'none') && !conductorActive
                        ? 'var(--bg-card)' : 'transparent',
                      border: `1px solid ${sendArmed && (prompt.trim() || includeResponse !== 'none') && !conductorActive
                        ? 'var(--border-hover)' : 'var(--border-subtle)'}`,
                      borderRadius: 'var(--radius)',
                      cursor: sendArmed && (prompt.trim() || includeResponse !== 'none') && !conductorActive
                        ? 'pointer' : 'default',
                      color: sendArmed && (prompt.trim() || includeResponse !== 'none') && !conductorActive
                        ? 'var(--text-primary)'
                        : turnHistory.length > 0 ? 'var(--text-muted)' : 'var(--text-muted)',
                      fontWeight: 600,
                      opacity: sendArmed && (prompt.trim() || includeResponse !== 'none') && !conductorActive ? 1 : 0.4,
                    }}
                  >Send ↵</button>
                </>
              ) : (
                <button
                  disabled={!prompt.trim() && includeResponse === 'none'}
                  onClick={() => sendDirect(directTo)}
                  style={{
                    fontFamily: 'JetBrains Mono', fontSize: '12px', padding: '6px 14px',
                    background: {claude:'var(--claude-border)',chatgpt:'var(--chatgpt-border)',gemini:'var(--gemini-border)'}[directTo],
                    border: 'none', borderRadius: 'var(--radius)',
                    cursor: (!prompt.trim() && includeResponse === 'none') ? 'default' : 'pointer',
                    color: {claude:'var(--claude-accent)',chatgpt:'var(--chatgpt-accent)',gemini:'var(--gemini-accent)'}[directTo],
                    fontWeight: 600,
                    opacity: (!prompt.trim() && includeResponse === 'none') ? 0.4 : 1
                  }}
                >Send ↵</button>
              )}

            </div>
          </div>

          {/* Model Response Grid */}
          <div style={{
            display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '16px', marginBottom: '24px'
          }}>
            {['claude', 'chatgpt', 'gemini'].map(model => (
              <ModelCard
                key={model}
                model={model}
                response={responses[model]}
                isLoading={loading[model]}
                error={errors[model]}
                enabled={enabled[model]}
                onToggle={() => setEnabled(prev => ({ ...prev, [model]: !prev[model] }))}
              />
            ))}
          </div>

          {/* History */}
          <HistoryPanel history={turnHistory} onLoadTurn={() => {}} />

          {/* Settings Modal */}
          {showSettings && (
            <SettingsPanel
              keys={keys} setKeys={setKeys}
              systemPrompts={systemPrompts} setSystemPrompts={setSystemPrompts}
              conductorOrder={conductorOrder} setConductorOrder={setConductorOrder}
              onClose={() => setShowSettings(false)}
            />
          )}

          <style>{`
            @keyframes pulse {
              0%, 100% { opacity: 1; }
              50% { opacity: 0.3; }
            }
            .prose { color: var(--text-primary); }
            .prose h1, .prose h2, .prose h3 { font-family: 'JetBrains Mono'; margin: 16px 0 8px; }
            .prose h1 { font-size: 18px; }
            .prose h2 { font-size: 16px; }
            .prose h3 { font-size: 14px; }
            .prose p { margin-bottom: 12px; }
            .prose ul, .prose ol { margin: 8px 0 12px 20px; }
            .prose li { margin-bottom: 4px; }
            .prose code {
              background: var(--bg-input); padding: 2px 6px; border-radius: 3px;
              font-family: 'JetBrains Mono'; font-size: 13px;
            }
            .prose pre {
              background: var(--bg-input); padding: 12px; border-radius: 6px;
              overflow-x: auto; margin: 12px 0;
            }
            .prose pre code { background: none; padding: 0; }
            .prose blockquote {
              border-left: 3px solid var(--border-hover); padding-left: 12px;
              color: var(--text-secondary); margin: 12px 0;
            }
            .prose strong { color: var(--text-primary); }
            .prose a { color: var(--gemini-accent); }
            select option { background: var(--bg-secondary); color: var(--text-primary); }
            @media (max-width: 900px) {
              div[style*="grid-template-columns: repeat(3"] {
                grid-template-columns: 1fr !important;
              }
            }
          `}</style>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
