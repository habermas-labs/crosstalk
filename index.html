        setClippedResponses(prev => ({ ...prev, [model]: { text, clippedAt: new Date().toISOString() } }));
      };

      const clearClip = (model) => {
        setClippedResponses(prev => ({ ...prev, [model]: null }));
        setClipInclude(prev => ({ ...prev, [model]: false }));
      };

      const toggleClipInclude = (model) => {
        if (!clippedResponses[model]) return;
        setClipInclude(prev => ({ ...prev, [model]: !prev[model] }));
      };

      const clearAllClips = () => {
        setClippedResponses(Object.fromEntries(ALL_PROVIDERS.map(p => [p, null])));
        setClipInclude(Object.fromEntries(ALL_PROVIDERS.map(p => [p, false])));
      };

      const anyClipIncluded = Object.values(clipInclude).some(Boolean);

      const toggleVaultForward = (id) => {
        setVaultForward(prev =>
          prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]
        );
      };
      const vaultInputRef = useRef(null);

      // Load vault from IndexedDB on mount.
      // On a fresh navigation (not a reload), clear the vault first — this handles
      // crashes, sleep, and any other session termination that bypasses beforeunload.
      // Reloads preserve the vault so accidental F5 doesn't wipe in-progress work.
      useEffect(() => {
        const navType = performance?.getEntriesByType?.('navigation')?.[0]?.type;
        const isFreshLoad = navType === 'navigate' || navType === 'back_forward';
        if (isFreshLoad) {
          vaultDB.clear().then(() => setSessionVault([])).catch(() => {});
        } else {
          vaultDB.getAll().then(entries => setSessionVault(entries)).catch(() => {});
        }
      }, []);

      const handleVaultUpload = (e) => {
        const files = Array.from(e.target.files || []);
        e.target.value = '';
        files.forEach(file => {
          const allowed = file.name.endsWith('.txt') || file.name.endsWith('.md');
          if (!allowed) return;
          const reader = new FileReader();
          reader.onload = async (ev) => {
            const entry = {
              filename:   file.name,
              content:    ev.target.result,
              mimeType:   file.type || 'text/plain',
              size:       file.size,
              uploadedAt: new Date().toISOString(),
            };
            try {
              const id = await vaultDB.put(entry);
              setSessionVault(prev => [...prev, { ...entry, id }]);
            } catch (err) {
              console.error('Vault write failed:', err);
            }
          };
          reader.readAsText(file);
        });
      };

      const removeFromVault = async (id) => {
        try {
          await vaultDB.remove(id);
          setSessionVault(prev => prev.filter(f => f.id !== id));
          setVaultForward(prev => prev.filter(x => x !== id));
        } catch (err) {
          console.error('Vault remove failed:', err);
        }
      };

      const clearVault = async () => {
        try {
          await vaultDB.clear();
          setSessionVault([]);
          setVaultForward([]);
        } catch (err) {
          console.error('Vault clear failed:', err);
        }
      };

      const textareaRef = useRef(null);
      const exportMenuRef = useRef(null);
      const [exportMenuOpen, setExportMenuOpen] = useState(false);
      const [summarizeMenuOpen, setSummarizeMenuOpen] = useState(false);
      const [summarizing, setSummarizing] = useState(false);

      // Carousel
      const CAROUSEL_WORDS = [
        'Triangulation', 'Reciprocity', 'the Agora', 'Discourse',
        'Porosity', 'Calibration', 'the In-Between', 'RIP', 'your Crosstalk Lab'
      ];
      const [carouselIndex, setCarouselIndex] = useState(0);
      const [carouselKey, setCarouselKey] = useState(1);
      const [carouselRunKey, setCarouselRunKey] = useState(0);
      const [taglineVisible, setTaglineVisible] = useState(false);
      const carouselTickRef = useRef(0);
      useEffect(() => {
        carouselTickRef.current = 0;
        setCarouselIndex(0);
        setCarouselKey(k => k + 1);
        setTaglineVisible(false);
        const timer = setInterval(() => {
          carouselTickRef.current += 1;
          if (carouselTickRef.current >= CAROUSEL_WORDS.length) {
            clearInterval(timer);
            setTimeout(() => setTaglineVisible(true), 2000);
            return;
          }
          setCarouselIndex(carouselTickRef.current);
          setCarouselKey(k => k + 1);
        }, 3800);
        return () => clearInterval(timer);
      }, [carouselRunKey]);

      // Auto-resize textarea
      useEffect(() => {
        const ta = textareaRef.current;
        if (ta) {
          ta.style.height = 'auto';
          ta.style.height = Math.min(ta.scrollHeight, 200) + 'px';
        }
      }, [prompt]);

      // Close export menu on outside click
      useEffect(() => {
        const handler = (e) => {
          if (exportMenuRef.current && !exportMenuRef.current.contains(e.target)) {
            setExportMenuOpen(false);
            setSummarizeMenuOpen(false);
          }
        };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, []);

      const hasAnyKey = Object.values(keys).some(k => k.trim());

      // Build the full prompt content, optionally appending vault file and/or included model response
      const buildPromptContent = (userText, includeModel, vaultFiles, clippedItems) => {
        let base = userText;

        // Append vault files first — reference material, not dialogue
        if (vaultFiles && vaultFiles.length > 0) {
          const fileBlocks = vaultFiles.map(vaultFile =>
            `\n\n---\nThe following is plain text inlined directly into this prompt from the user's local session. No file transfer is occurring — this is text content included as part of your context (source: ${vaultFile.filename}):\n\n${vaultFile.content}\n---`
          ).join('');
          base = base ? base + fileBlocks : fileBlocks.trimStart();
        }

        // Append clipped responses — in-app clipboard inclusions
        if (clippedItems && clippedItems.length > 0) {
          const modelLabels = Object.fromEntries(ALL_PROVIDERS.map(p => [p, PROVIDER_META[p].label]));
          const clipBlocks = clippedItems.map(({ model, text }) =>
            `\n\n---\nThe following is a clipped response from ${modelLabels[model]} included from the in-app clipboard:\n\n${text}\n---`
          ).join('');
          base = base ? base + clipBlocks : clipBlocks.trimStart();
        }

        // No model response to include — return base
        if (!includeModel || includeModel === 'none' || !responses[includeModel]) return base || userText;

        const modelLabels = Object.fromEntries(ALL_PROVIDERS.map(p => [p, PROVIDER_META[p].label]));
        const included = responses[includeModel];
        if (!base.trim()) {
          return `Here is ${modelLabels[includeModel]}'s response to our discussion. Please react to it, noting points of agreement, disagreement, or areas you'd like to develop further:\n\n---\n${included}\n---`;
        }
        return `${base}\n\n---\nFor context, here is ${modelLabels[includeModel]}'s response to our previous discussion:\n\n${included}\n---`;
      };

      // Send to all enabled models in parallel
      const sendParallel = useCallback(async () => {
        const userText = prompt.trim();
        const included = includeResponse !== 'none' ? includeResponse : null;
        if (!userText && !included) return;

        const turnTimestamp = new Date().toISOString();
        const includeSnapshot = included ? { model: included, snapshot: responses[included] } : null;
        const vaultFiles = vaultForward.length > 0 ? sessionVault.filter(f => vaultForward.includes(f.id)) : [];
        const clippedItems = conductorOrder.filter(m => clipInclude[m] && clippedResponses[m]).map(m => ({ model: m, text: clippedResponses[m].text }));
        const content = buildPromptContent(userText, included, vaultFiles, clippedItems);
        setPrompt('');
        setDirectTo('all');
        setExcludeModel('none');
        setIncludeResponse('none');
        setVaultForward([]);
        setClipInclude(Object.fromEntries(ALL_PROVIDERS.map(p => [p, false])));
        setModeArmed(false);

        const models = conductorOrder.filter(m => enabled[m] && keys[m]?.trim() && m !== excludeModel);

        // Record active models on first send
        setSessionMeta(prev => prev.modelsActive.length === 0
          ? { ...prev, modelsActive: models }
          : prev
        );

        const resetResponses = {};
        const resetErrors = {};
        const loadingState = Object.fromEntries(ALL_PROVIDERS.map(p => [p, false]));
        models.forEach(m => { resetResponses[m] = null; resetErrors[m] = null; loadingState[m] = true; });
        setResponses(prev => ({ ...prev, ...resetResponses }));
        setErrors(prev => ({ ...prev, ...resetErrors }));
        setLoading(loadingState);

        const newHistories = { ...conversationHistory };
        models.forEach(m => {
          newHistories[m] = [...newHistories[m], { role: 'user', content }];
        });
        setConversationHistory(newHistories);

        const results = {};
        await Promise.allSettled(models.map(async (model) => {
          try {
            const response = await apiAdapters[model](
              newHistories[model], systemPrompts[model], keys[model], selectedModels[model]
            );
            results[model] = { response, error: null, responseTimestamp: new Date().toISOString() };
            setResponses(prev => ({ ...prev, [model]: response }));
            setConversationHistory(prev => ({
              ...prev,
              [model]: [...prev[model], { role: 'assistant', content: response }]
            }));
          } catch (err) {
            results[model] = { response: null, error: err.message, responseTimestamp: new Date().toISOString() };
            setErrors(prev => ({ ...prev, [model]: err.message }));
          } finally {
            setLoading(prev => ({ ...prev, [model]: false }));
          }
        }));

        setTurnHistory(prev => [...prev, {
          turnIndex: prev.length,
          timestamp: turnTimestamp,
          mode: 'parallel',
          userText,
          include: includeSnapshot,
          target: null,
          order: null,
          builtPrompt: content,
          results,
          sessionModality: 'visual',
          roles: {},
        }]);
      }, [prompt, excludeModel, includeResponse, vaultForward, sessionVault, enabled, keys, systemPrompts, conversationHistory, responses]);

      // Opening cycle — sequential, each model sees prior responses
      const sendConductor = useCallback(async () => {
        const userText = prompt.trim();
        const included = includeResponse !== 'none' ? includeResponse : null;
        if (!userText && !included) return;

        const turnTimestamp = new Date().toISOString();
        const includeSnapshot = included ? { model: included, snapshot: responses[included] } : null;
        const vaultFiles = vaultForward.length > 0 ? sessionVault.filter(f => vaultForward.includes(f.id)) : [];
        const clippedItems = conductorOrder.filter(m => clipInclude[m] && clippedResponses[m]).map(m => ({ model: m, text: clippedResponses[m].text }));
        const baseContent = buildPromptContent(userText, included, vaultFiles, clippedItems);
        const activeExclude = excludeModel;
        setPrompt('');
        setDirectTo('all');
        setExcludeModel('none');
        setIncludeResponse('none');
        setVaultForward([]);
        setClipInclude(Object.fromEntries(ALL_PROVIDERS.map(p => [p, false])));
        setModeArmed(false);

        const models = conductorOrder.filter(m => enabled[m] && keys[m]?.trim() && m !== activeExclude);
        if (models.length === 0) return;

        // Record active models on first send
        setSessionMeta(prev => prev.modelsActive.length === 0
          ? { ...prev, modelsActive: models }
          : prev
        );

        const resetResponses = {};
        const resetErrors = {};
        models.forEach(m => { resetResponses[m] = null; resetErrors[m] = null; });
        setResponses(prev => ({ ...prev, ...resetResponses }));
        setErrors(prev => ({ ...prev, ...resetErrors }));
        setConductorActive(true);

        const results = {};
        const priorResponses = [];

        for (const model of models) {
          setLoading(prev => ({ ...prev, [model]: true }));

          let contextualPrompt = baseContent;
          if (priorResponses.length > 0) {
            const modelLabels = Object.fromEntries(ALL_PROVIDERS.map(p => [p, PROVIDER_META[p].label]));
            const priorText = priorResponses
              .map(p => '### ' + modelLabels[p.model] + '\n' + p.response)
              .join('\n\n');
            contextualPrompt = baseContent
              + '\n\n---\nThe following models have already responded to this prompt.'
              + ' Please read their responses before giving your own:\n\n'
              + priorText
              + '\n\n---\nNow give your own response, engaging with what has been said where relevant.';
          }

          const newHistory = [...conversationHistory[model], { role: 'user', content: contextualPrompt }];

          try {
            const response = await apiAdapters[model](newHistory, systemPrompts[model], keys[model], selectedModels[model]);
            results[model] = { response, error: null, responseTimestamp: new Date().toISOString() };
            priorResponses.push({ model, response });
            setResponses(prev => ({ ...prev, [model]: response }));
            setConversationHistory(prev => ({
              ...prev,
              [model]: [...prev[model], { role: 'assistant', content: response }]
            }));
          } catch (err) {
            results[model] = { response: null, error: err.message, responseTimestamp: new Date().toISOString() };
            setErrors(prev => ({ ...prev, [model]: err.message }));
            priorResponses.push({ model, response: `[Error: ${err.message}]` });
          } finally {
            setLoading(prev => ({ ...prev, [model]: false }));
          }
        }

        setConductorActive(false);
        setTurnHistory(prev => [...prev, {
          turnIndex: prev.length,
          timestamp: turnTimestamp,
          mode: 'conductor',
          userText,
          include: includeSnapshot,
          target: null,
          order: models,
          builtPrompt: baseContent,
          results,
          sessionModality: 'visual',
          roles: {},
        }]);
      }, [prompt, includeResponse, vaultForward, sessionVault, enabled, keys, systemPrompts, conversationHistory, conductorOrder, responses]);

      // Send to a single model — directed prompt (Move 1) or combined (Move 3)
      const sendDirect = useCallback(async (targetModel) => {
        const userText = prompt.trim();
        const included = includeResponse !== 'none' ? includeResponse : null;
        if (!userText && !included) return;
        if (!keys[targetModel]?.trim()) {
          setErrors(prev => ({ ...prev, [targetModel]: `No API key configured for ${targetModel}` }));
          return;
        }

        const turnTimestamp = new Date().toISOString();
        const includeSnapshot = included ? { model: included, snapshot: responses[included] } : null;
        const vaultFiles = vaultForward.length > 0 ? sessionVault.filter(f => vaultForward.includes(f.id)) : [];
        const clippedItems = conductorOrder.filter(m => clipInclude[m] && clippedResponses[m]).map(m => ({ model: m, text: clippedResponses[m].text }));
        const content = buildPromptContent(userText, included, vaultFiles, clippedItems);
        setPrompt('');
        setDirectTo('all');
        setExcludeModel('none');
        setIncludeResponse('none');
        setVaultForward([]);
        setClipInclude(Object.fromEntries(ALL_PROVIDERS.map(p => [p, false])));

        // Record active models on first send
        setSessionMeta(prev => prev.modelsActive.length === 0
          ? { ...prev, modelsActive: [targetModel] }
          : prev
        );

        setLoading(prev => ({ ...prev, [targetModel]: true }));
        setResponses(prev => ({ ...prev, [targetModel]: null }));
        setErrors(prev => ({ ...prev, [targetModel]: null }));

        const newHistory = [...conversationHistory[targetModel], { role: 'user', content }];
        setConversationHistory(prev => ({ ...prev, [targetModel]: newHistory }));

        try {
          const response = await apiAdapters[targetModel](newHistory, systemPrompts[targetModel], keys[targetModel], selectedModels[targetModel]);
          setResponses(prev => ({ ...prev, [targetModel]: response }));
          setConversationHistory(prev => ({
            ...prev,
            [targetModel]: [...prev[targetModel], { role: 'assistant', content: response }]
          }));
          setTurnHistory(prev => [...prev, {
            turnIndex: prev.length,
            timestamp: turnTimestamp,
            mode: 'directed',
            userText,
            include: includeSnapshot,
            target: targetModel,
            order: null,
            builtPrompt: content,
            results: { [targetModel]: { response, error: null, responseTimestamp: new Date().toISOString() } },
            sessionModality: 'visual',
            roles: {},
          }]);
        } catch (err) {
          setErrors(prev => ({ ...prev, [targetModel]: err.message }));
          setTurnHistory(prev => [...prev, {
            turnIndex: prev.length,
            timestamp: turnTimestamp,
            mode: 'directed',
            userText,
            include: includeSnapshot,
            target: targetModel,
            order: null,
            builtPrompt: content,
            results: { [targetModel]: { response: null, error: err.message, responseTimestamp: new Date().toISOString() } },
            sessionModality: 'visual',
            roles: {},
          }]);
        } finally {
          setLoading(prev => ({ ...prev, [targetModel]: false }));
        }
      }, [prompt, includeResponse, vaultForward, sessionVault, keys, systemPrompts, conversationHistory, responses]);

      // Moderated dialogue — send one model's response to another


      // Clear conversation
      const clearConversation = () => {
        setResponses(Object.fromEntries(ALL_PROVIDERS.map(p => [p, null])));
        setErrors(Object.fromEntries(ALL_PROVIDERS.map(p => [p, null])));
        setConversationHistory(Object.fromEntries(ALL_PROVIDERS.map(p => [p, []])));
        setTurnHistory([]);
        setSessionMeta({
          sessionId: generateSessionId(),
          startedAt: new Date().toISOString(),
          modelsActive: [],
          verbosity: null,
          readabilityTarget: null,
          sessionModality: 'visual',
        });
        setDirectTo('all');
        setExcludeModel('none');
        setIncludeResponse('none');
        setVaultForward([]);
        setClipInclude(Object.fromEntries(ALL_PROVIDERS.map(p => [p, false])));
        setModeArmed(false);
      };

      // Export session as markdown transcript
      const exportTranscript = () => {
        if (turnHistory.length === 0) return;
        const modelLabels = Object.fromEntries(ALL_PROVIDERS.map(p => [p, PROVIDER_META[p].label]));
        const modelIcons  = Object.fromEntries(ALL_PROVIDERS.map(p => [p, PROVIDER_META[p].icon]));
        const now = new Date();
        const exportedAt = now.toISOString();
        const dateStr = now.toLocaleDateString('en-CA');
        const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

        // Session duration
        const startedAt = new Date(sessionMeta.startedAt);
        const durationMs = now - startedAt;
        const durationMins = Math.round(durationMs / 60000);
        const durationStr = durationMins < 1 ? '<1 min' : `${durationMins} min`;

        // Active models from sessionMeta, fallback to keyed models
        const activeModelIds = sessionMeta.modelsActive.length > 0
          ? sessionMeta.modelsActive
          : conductorOrder.filter(m => keys[m]?.trim());
        const activeModelsStr = activeModelIds.map(m => `${modelIcons[m]} ${modelLabels[m]}`).join(' · ');

        // Modes used across turns
        const modesUsed = [...new Set(turnHistory.map(t => t.mode))].join(', ');

        let md = `# Crosstalk Lab — Session Transcript\n\n`;
        md += `**Session ID:** \`${sessionMeta.sessionId}\`  \n`;
        md += `**Started:** ${new Date(sessionMeta.startedAt).toLocaleDateString('en-CA')} at ${new Date(sessionMeta.startedAt).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })}  \n`;
        md += `**Exported:** ${dateStr} at ${timeStr}  \n`;
        md += `**Duration:** ${durationStr}  \n`;
        md += `**Models:** ${activeModelsStr}  \n`;
        md += `**Turns:** ${turnHistory.length}  \n`;
        md += `**Modes used:** ${modesUsed}  \n`;
        if (sessionMeta.verbosity)        md += `**Verbosity:** ${sessionMeta.verbosity}  \n`;
        if (sessionMeta.readabilityTarget) md += `**Readability target:** ${sessionMeta.readabilityTarget}  \n`;
        md += `\n---\n\n`;
        
        turnHistory.forEach((turn, i) => {
          // Turn header
          let turnLabel = '';
          if (turn.mode === 'parallel') {
            turnLabel = 'Parallel';
          } else if (turn.mode === 'conductor') {
            turnLabel = `Conductor — ${turn.order.map(m => modelIcons[m]).join(' → ')}`;
          } else {
            // directed
            const includeLabel = turn.include ? ` + ${modelIcons[turn.include.model]}` : '';
            turnLabel = `Directed → ${modelIcons[turn.target]} ${modelLabels[turn.target]}${includeLabel}`;
          }

          const turnTime = new Date(turn.timestamp).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
          md += `## Turn ${i + 1} — ${turnLabel}\n`;
          md += `*${turnTime}*\n\n`;

          // Prompt — show userText and include provenance separately
          if (turn.userText) {
            md += `**Prompt:** ${turn.userText}\n\n`;
          }
          if (turn.include) {
            md += `**Included:** ${modelIcons[turn.include.model]} ${modelLabels[turn.include.model]}'s prior response\n\n`;
            md += `> ${turn.include.snapshot.split('\n').join('\n> ')}\n\n`;
          }
          if (!turn.userText && !turn.include) {
            // fallback — should not occur with enriched schema
            md += `**Prompt:** *(no text)*\n\n`;
          }

          // Responses
          const responseModels = turn.order
            ? turn.order.filter(m => turn.results[m])
            : Object.keys(turn.results);

          responseModels.forEach(model => {
            const result = turn.results[model];
            const respTime = result.responseTimestamp
              ? new Date(result.responseTimestamp).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' })
              : null;
            md += `### ${modelIcons[model]} ${modelLabels[model]}`;
            if (respTime) md += ` *[${respTime}]*`;
            md += `\n\n`;
            if (result.response) md += `${result.response}\n\n`;
            else if (result.error) md += `*Error: ${result.error}*\n\n`;
          });

          md += `---\n\n`;
        });

        const blob = new Blob([md], { type: 'text/markdown' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `ct-session-${sessionMeta.sessionId}.md`;
        a.click();
        URL.revokeObjectURL(url);
      };

      // Summary export — send full transcript to a model, download the synthesis
      const summarizeWith = async (targetModel) => {
        if (turnHistory.length === 0 || !keys[targetModel]?.trim()) return;
        setExportMenuOpen(false);
        setSummarizing(true);

        const modelLabels = Object.fromEntries(ALL_PROVIDERS.map(p => [p, PROVIDER_META[p].label]));
        const modelIcons  = Object.fromEntries(ALL_PROVIDERS.map(p => [p, PROVIDER_META[p].icon]));

        // Build a compact session digest to send — structured but not full prose
        const activeModelIds = sessionMeta.modelsActive.length > 0
          ? sessionMeta.modelsActive
          : conductorOrder.filter(m => keys[m]?.trim());

        let digest = `You are synthesizing a multi-model triangulation session from Crosstalk Lab.\n\n`;
        digest += `Session ID: ${sessionMeta.sessionId}\n`;
        digest += `Models: ${activeModelIds.map(m => `${modelIcons[m]} ${modelLabels[m]}`).join(', ')}\n`;
        digest += `Turns: ${turnHistory.length}\n\n`;
        digest += `---\n\n`;

        turnHistory.forEach((turn, i) => {
          let turnLabel = '';
          if (turn.mode === 'parallel') turnLabel = 'Parallel';
          else if (turn.mode === 'conductor') turnLabel = `Conductor (${turn.order.map(m => modelIcons[m]).join(' → ')})`;
          else turnLabel = `Directed → ${modelIcons[turn.target]} ${modelLabels[turn.target]}`;

          digest += `## Turn ${i + 1} — ${turnLabel}\n\n`;
          if (turn.userText) digest += `**Prompt:** ${turn.userText}\n\n`;
          if (turn.include) digest += `**Included:** ${modelLabels[turn.include.model]}'s prior response\n\n`;

          const responseModels = turn.order
            ? turn.order.filter(m => turn.results[m])
            : Object.keys(turn.results);

          responseModels.forEach(model => {
            const result = turn.results[model];
            digest += `### ${modelIcons[model]} ${modelLabels[model]}\n\n`;
            if (result.response) digest += `${result.response}\n\n`;
            else if (result.error) digest += `*Error: ${result.error}*\n\n`;
          });
          digest += `---\n\n`;
        });

        const summaryPrompt = `${digest}\nPlease synthesize this triangulation session. Your synthesis should:\n\n1. **Points of convergence** — where did the models agree or reinforce each other?\n2. **Points of divergence** — where did perspectives differ meaningfully, and what does that tension reveal?\n3. **Emergent insights** — what ideas or framings emerged from the dialogue that no single model introduced alone?\n4. **Open questions** — what threads were raised but not resolved?\n\nWrite as a structured document, not a bullet list. Preserve the attribution of specific ideas to the models that raised them.`;

        try {
          const response = await apiAdapters[targetModel](
            [{ role: 'user', content: summaryPrompt }],
            '', // no system prompt — the prompt itself is fully framed
            keys[targetModel],
            selectedModels[targetModel]
          );

          const now = new Date();
          const dateStr = now.toLocaleDateString('en-CA');
          const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

          let md = `# Crosstalk Lab — Session Summary\n\n`;
          md += `| | |\n|---|---|\n`;
          md += `| **Session ID** | \`${sessionMeta.sessionId}\` |\n`;
          md += `| **Synthesized by** | ${modelIcons[targetModel]} ${modelLabels[targetModel]} |\n`;
          md += `| **Exported** | ${dateStr} at ${timeStr} |\n`;
          md += `| **Source turns** | ${turnHistory.length} |\n\n`;
          md += `---\n\n`;
          md += response;

          const blob = new Blob([md], { type: 'text/markdown' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `ct-summary-${sessionMeta.sessionId}-${targetModel}.md`;
          a.click();
          URL.revokeObjectURL(url);
        } catch (err) {
          console.error('Summary export failed:', err);
        } finally {
          setSummarizing(false);
        }
      };

      // Keyboard handler
      // Send is armed if mode explicitly selected OR Exclude active OR session already underway
      const sendArmed = modeArmed || excludeModel !== 'none' || turnHistory.length > 0;
      const [noKeyWarning, setNoKeyWarning] = useState(false);

      const handleKeyDown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          if (directTo !== 'all') sendDirect(directTo);
          else if (sendArmed && !conductorActive && (prompt.trim() || includeResponse !== 'none' || vaultForward.length > 0)) {
            if (activeModels.length === 0) {
              setNoKeyWarning(true);
              setTimeout(() => setNoKeyWarning(false), 4000);
              return;
            }
            if (sendMode === 'conductor') sendConductor();
            else sendParallel();
          }
        }
      };

      // Conductor order display for status line
      const conductorOrderLabels = Object.fromEntries(ALL_PROVIDERS.map(p => [p, PROVIDER_META[p].icon]));

      return (
        <div className="ct-layout">

          {/* ── Left Sidebar (constitutive zone) ── */}
          <aside className={`ct-sidebar-left${sidebarOpen ? '' : ' collapsed'}`} style={{ position: 'relative' }}>
            <button
              className="sidebar-toggle"
              onClick={() => setSidebarOpen(o => !o)}
              title={sidebarOpen ? 'Collapse sidebar' : 'Expand sidebar'}
            >{sidebarOpen ? '‹' : '›'}</button>

            <div className="sidebar-content">

              {/* Identity mark */}
              <div style={{ marginBottom: '20px', paddingBottom: '16px', borderBottom: '1px solid var(--border-subtle)' }}>
                <div style={{ fontFamily: 'JetBrains Mono', fontSize: '13px', fontWeight: 700, letterSpacing: '-0.3px', marginBottom: '2px' }}>
                  <span style={{ color: 'var(--claude-accent)' }}>◈</span>
                  <span style={{ color: 'var(--chatgpt-accent)' }}>◇</span>
                  <span style={{ color: 'var(--gemini-accent)' }}>△</span>
                  {' '}CT
                </div>
                <div style={{ fontFamily: 'JetBrains Mono', fontSize: '9px', color: 'var(--text-muted)', letterSpacing: '0.08em' }}>
                  Crosstalk Lab
                </div>
              </div>

              {/* Tetras — stub */}
              <div style={{ marginBottom: '16px' }}>
                <div className="sidebar-section-label">Tetras</div>
                <div className="sidebar-stub">
                  <span style={{ opacity: 0.7 }}>⊘</span> No Tetra active
                </div>
                <div className="sidebar-stub" style={{ fontSize: '10px', justifyContent: 'center', opacity: 0.4 }}>
                  CT-101 · planned
                </div>
              </div>

              {/* Hedras — stub */}
              <div style={{ marginBottom: '16px' }}>
                <div className="sidebar-section-label">Hedras</div>
                <div className="sidebar-stub">
                  <span style={{ opacity: 0.7 }}>⊘</span> No Hedra active
                </div>
                <div className="sidebar-stub" style={{ fontSize: '10px', justifyContent: 'center', opacity: 0.4 }}>
                  CT-102 · planned
                </div>
              </div>

              {/* Conducting — Conductor Order */}
              <div style={{ marginBottom: '16px' }}>
                <div className="sidebar-section-label">Conducting</div>
                <div style={{
                  background: 'var(--bg-input)', border: '1px solid var(--border-subtle)',
                  borderRadius: 'var(--radius)', padding: '10px 12px',
                }}>
                  <div style={{
                    fontFamily: 'JetBrains Mono', fontSize: '10px', color: 'var(--text-muted)',
                    marginBottom: '8px'
                  }}>Active Model Order</div>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: '4px' }}>
                    {conductorOrder.map((modelId, position) => {
                      const meta = PROVIDER_META[modelId] || {};
                      return (
                        <div key={position} style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
                          <span style={{
                            fontFamily: 'JetBrains Mono', fontSize: '9px', color: 'var(--text-muted)',
                            width: '20px', flexShrink: 0
                          }}>{position + 1}.</span>
                          <select
                            value={modelId}
                            onChange={e => {
                              const newModel = e.target.value;
                              const current = [...conductorOrder];
                              const existingPos = current.indexOf(newModel);
                              const displaced = current[position];
                              current[existingPos] = displaced;
                              current[position] = newModel;
                              setConductorOrder(current);
                            }}
                            style={{
                              flex: 1, padding: '4px 6px',
                              background: 'var(--bg-secondary)',
                              border: `1px solid ${meta.border || 'var(--border-subtle)'}`,
                              borderRadius: '4px',
                              color: meta.accent || 'var(--text-muted)',
                              fontFamily: 'JetBrains Mono', fontSize: '11px',
                              outline: 'none', cursor: 'pointer',
                            }}
                          >
                            {ALL_PROVIDERS.map(p => (
                              <option key={p} value={p}>{PROVIDER_META[p].icon} {PROVIDER_META[p].label}</option>
                            ))}
                          </select>
                        </div>
                      );
                    })}
                  </div>
                  <div style={{ fontFamily: 'JetBrains Mono', fontSize: '9px', color: 'var(--text-muted)', marginTop: '8px', lineHeight: 1.5 }}>
                    Only 3 models active at a time — swap slots to change providers.
                  </div>
                </div>
              </div>

              {/* CT-097 — Models section */}
              <div style={{ marginBottom: '16px' }}>
                <div className="sidebar-section-label">Models</div>
                <div style={{
                  background: 'var(--bg-input)', border: '1px solid var(--border-subtle)',
                  borderRadius: 'var(--radius)', padding: '10px 12px',
                }}>
                  {(conductorOrder).map(provider => {
                    const meta    = PROVIDER_META[provider] || {};
                    const hasKey  = !!keys[provider]?.trim();
                    const options = availableModels[provider] || [];
                    const isDupe  = pendingVals.filter(v => v === pendingModels[provider]).length > 1;
                    return (
                      <div key={provider} style={{ display: 'flex', alignItems: 'center', gap: '6px', marginBottom: '6px' }}>
                        <span style={{
                          fontFamily: 'JetBrains Mono', fontSize: '11px',
                          color: hasKey ? meta.accent : 'var(--text-muted)',
                          width: '14px', flexShrink: 0, textAlign: 'center'
                        }}>{meta.icon}</span>
                        <select
                          disabled={!hasKey || modelsFetching[provider]}
                          value={pendingModels[provider]}
                          onChange={e => setPendingModels(prev => ({ ...prev, [provider]: e.target.value }))}
                          style={{
                            flex: 1, padding: '4px 6px',
                            background: hasKey ? 'var(--bg-secondary)' : 'var(--bg-input)',
                            border: `1px solid ${isDupe ? '#f47068' : hasKey ? meta.border : 'var(--border-subtle)'}`,
                            borderRadius: '4px',
                            color: hasKey ? meta.accent : 'var(--text-muted)',
                            fontFamily: 'JetBrains Mono', fontSize: '10px',
                            outline: 'none', cursor: hasKey ? 'pointer' : 'default',
                            opacity: hasKey ? 1 : 0.4,
                          }}
                        >
                          {modelsFetching[provider]
                            ? <option>Loading…</option>
                            : options.map(o => (
                                <option key={o.id} value={o.id}>{o.label}</option>
                              ))
                          }
                        </select>
                      </div>

                          ? 'var(--bg-card)' : 'transparent',
                        border: `1px solid ${sendArmed && (prompt.trim() || includeResponse !== 'none' || vaultForward.length > 0) && !conductorActive
                          ? 'var(--border-hover)' : 'var(--border-subtle)'}`,
                        borderRadius: 'var(--radius)',
                        cursor: sendArmed && (prompt.trim() || includeResponse !== 'none' || vaultForward.length > 0) && !conductorActive
                          ? 'pointer' : 'default',
                        color: sendArmed && (prompt.trim() || includeResponse !== 'none' || vaultForward.length > 0) && !conductorActive
                          ? 'var(--text-primary)' : 'var(--text-muted)',
                        fontWeight: 600,
                        opacity: sendArmed && (prompt.trim() || includeResponse !== 'none' || vaultForward.length > 0) && !conductorActive ? 1 : 0.4,
                      }}
                    >Send ↵</button>
                    {noKeyWarning && (
                      <div style={{
                        position: 'absolute', top: 'calc(100% + 4px)', right: 0,
                        background: 'var(--bg-card)', border: '1px solid #f47068',
                        borderRadius: 'var(--radius)', padding: '8px 12px',
                        fontFamily: 'JetBrains Mono', fontSize: '11px', color: '#f47068',
                        whiteSpace: 'nowrap', zIndex: 10
                      }}>
                        No API keys loaded — open Configuration to add keys.
                      </div>
                    )}
                  </div>
                </>
              ) : (
                <button
                  disabled={!prompt.trim() && includeResponse === 'none' && vaultForward.length === 0}
                  onClick={() => sendDirect(directTo)}
                  style={{
                    fontFamily: 'JetBrains Mono', fontSize: '12px', padding: '6px 14px',
                    background: PROVIDER_META[directTo]?.border || 'var(--bg-input)',
                    border: 'none', borderRadius: 'var(--radius)',
                    cursor: (!prompt.trim() && includeResponse === 'none' && vaultForward.length === 0) ? 'default' : 'pointer',
                    color: PROVIDER_META[directTo]?.accent || 'var(--text-primary)',
                    fontWeight: 600,
                    opacity: (!prompt.trim() && includeResponse === 'none' && vaultForward.length === 0) ? 0.4 : 1
                  }}
                >Send ↵</button>
              )}

            </div>
          </div>

          {/* Model Response Grid */}
          <div style={{
            display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '16px', marginBottom: '24px'
          }}>
            {conductorOrder.map(model => (
              <ModelCard
                key={model}
                model={model}
                response={responses[model]}
                isLoading={loading[model]}
                error={errors[model]}
                enabled={enabled[model]}
                hasKey={!!(keys[model]?.trim())}
                onToggle={() => setEnabled(prev => ({ ...prev, [model]: !prev[model] }))}
                onOpenPanel={openCodePanel}
                onClip={clipResponse}
              />
            ))}
          </div>

          {/* CT-110 — Floating code panels */}
          {codePanels.map(panel => (
            <CodePanel
              key={panel.id}
              panel={panel}
              onClose={closeCodePanel}
              onFocus={focusCodePanel}
            />
          ))}
          {panelLimitWarning && (
            <div className="ct-panel-limit-warning">
              Max {MAX_PANELS} panels open — close one to open another
            </div>
          )}

          {/* History */}
          <HistoryPanel history={turnHistory} onLoadTurn={() => {}} />

          {/* Settings Modal */}
          {showLoadKeys && (
            <LoadKeysModal
              setKeys={setKeys}
              setSystemPrompts={setSystemPrompts}
              onClose={() => setShowLoadKeys(false)}
            />
          )}

          {showGenerateCtk && (
            <GenerateCtkModal
              keys={keys} setKeys={setKeys}
              systemPrompts={systemPrompts} setSystemPrompts={setSystemPrompts}
              onClose={() => setShowGenerateCtk(false)}
            />
          )}

          {/* CT-105 — About modal */}
          {showAbout && (
            <div
              style={{
                position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.6)',
                zIndex: 200, display: 'flex', alignItems: 'center', justifyContent: 'center'
              }}
              onClick={e => { if (e.target === e.currentTarget) setShowAbout(false); }}
            >
              <div style={{
                background: 'var(--bg-card)', border: '1px solid var(--border-hover)',
                borderRadius: 'var(--radius)', padding: '32px', maxWidth: '480px', width: '90%',
                boxShadow: 'var(--shadow)',
              }}>
                {/* Header */}
                <div style={{ display: 'flex', alignItems: 'baseline', gap: '10px', marginBottom: '20px', paddingBottom: '16px', borderBottom: '1px solid var(--border-subtle)' }}>
                  <div style={{ fontFamily: 'JetBrains Mono', fontSize: '15px', fontWeight: 700 }}>
                    <span style={{ color: 'var(--claude-accent)' }}>◈</span>
                    <span style={{ color: 'var(--chatgpt-accent)' }}>◇</span>
                    <span style={{ color: 'var(--gemini-accent)' }}>△</span>
                    {' '}Crosstalk Lab
                  </div>
                  <div style={{ fontFamily: 'JetBrains Mono', fontSize: '10px', color: 'var(--text-muted)' }}>
                    by Habermas Labs
                  </div>
                </div>

                {/* Body */}
                <div style={{ fontFamily: 'Source Serif 4, Georgia, serif', fontSize: '14px', color: 'var(--text-secondary)', lineHeight: '1.75', marginBottom: '24px' }}>
                  <p style={{ marginBottom: '14px' }}>
                    Crosstalk Lab is a multi-model thinking environment built on a simple premise: epistemic diversity is structurally valuable, not just practically convenient.
                  </p>
                  <p style={{ marginBottom: '14px' }}>
                    Three AI models with distinct training, architecture, and institutional provenance respond to the same prompts, react to each other's outputs, and are directed by a human conductor. The result is a form of dialogue unavailable in any single-model interface — one where difference is the instrument rather than the problem.
                  </p>
                  <p>
                    CT is designed for triangulation: philosophical inquiry, research synthesis, design critique, and any domain where convergence too quickly reached is a sign something was missed.
                  </p>
                </div>

                {/* Footer links */}
                <div style={{ display: 'flex', gap: '10px', alignItems: 'center', paddingTop: '16px', borderTop: '1px solid var(--border-subtle)' }}>
                  <a
                    href="https://ko-fi.com/habermaslabs"
                    target="_blank"
                    rel="noopener noreferrer"
                    style={{
                      fontFamily: 'JetBrains Mono', fontSize: '11px',
                      color: '#ff6b6b', textDecoration: 'none',
                      padding: '6px 12px', border: '1px solid rgba(255,107,107,0.3)',
                      borderRadius: '4px', display: 'flex', alignItems: 'center', gap: '5px',
                    }}
                    onMouseEnter={e => e.currentTarget.style.borderColor = '#ff6b6b'}
                    onMouseLeave={e => e.currentTarget.style.borderColor = 'rgba(255,107,107,0.3)'}
                  >
                    ♥ Support CT
                  </a>
                  <a
                    href="https://mdreaderapp.com/"
                    target="_blank"
                    rel="noopener noreferrer"
                    style={{
                      fontFamily: 'JetBrains Mono', fontSize: '11px',
                      color: 'var(--chatgpt-accent)', textDecoration: 'none',
                      padding: '6px 12px', border: '1px solid rgba(107,207,142,0.3)',
                      borderRadius: '4px', display: 'flex', alignItems: 'center', gap: '5px',
                    }}
                    onMouseEnter={e => e.currentTarget.style.borderColor = 'var(--chatgpt-accent)'}
                    onMouseLeave={e => e.currentTarget.style.borderColor = 'rgba(107,207,142,0.3)'}
                  >
                    ↗ MDReader
                  </a>
                  <button
                    onClick={() => setShowAbout(false)}
                    style={{
                      marginLeft: 'auto', fontFamily: 'JetBrains Mono', fontSize: '11px',
                      padding: '6px 14px', background: 'transparent',
                      border: '1px solid var(--border-hover)', borderRadius: '4px',
                      cursor: 'pointer', color: 'var(--text-secondary)',
                    }}
                  >Close</button>
                </div>
              </div>
            </div>
          )}

          </div>{/* /inner max-width wrapper */}
          </div>{/* /ct-main */}

          {/* ── Right Sidebar (accumulative zone) CT-107 ── */}
          <aside
            ref={rightSidebarRef}
            className={`ct-sidebar-right${sidebarRightOpen ? '' : ' collapsed'}`}
            style={{ position: 'relative' }}
          >
            <button
              className="sidebar-toggle"
              onClick={() => setSidebarRightOpen(o => !o)}
              title={sidebarRightOpen ? 'Collapse sidebar' : 'Expand sidebar'}
            >{sidebarRightOpen ? '›' : '‹'}</button>

            <div className="sidebar-content">

              {/* Top spacer — matches left sidebar identity block height so File Vault aligns with Tetras */}
              <div style={{ marginBottom: '20px', paddingBottom: '16px', borderBottom: '1px solid var(--border-subtle)', visibility: 'hidden', flexShrink: 0 }}>
                <div style={{ fontFamily: 'JetBrains Mono', fontSize: '13px', fontWeight: 700 }}>CT</div>
                <div style={{ fontFamily: 'JetBrains Mono', fontSize: '9px' }}>Crosstalk Lab</div>
              </div>

              {/* Vault section */}
              <div style={{ marginBottom: '16px' }}>
                <div className="sidebar-section-label">File Vault</div>

                {/* Hidden file input */}
                <input
                  ref={vaultInputRef}
                  type="file"
                  accept=".txt,.md"
                  multiple
                  style={{ display: 'none' }}
                  onChange={handleVaultUpload}
                />

                {sessionVault.length === 0 ? (
                  <div className="sidebar-stub" style={{ marginBottom: '6px' }}>
                    <span style={{ opacity: 0.6 }}>⊘</span> No files loaded
                  </div>
                ) : (
                  <div style={{ marginBottom: '6px' }}>
                    {sessionVault.map(f => {
                      const selected = vaultForward.includes(f.id);
                      return (
                        <div
                          key={f.id}
                          className="vault-file-row"
                          onClick={() => toggleVaultForward(f.id)}
                          style={{
                            cursor: 'pointer',
                            background: selected ? 'var(--bg-card)' : 'var(--bg-input)',
                            border: `1px solid ${selected ? 'var(--border-hover)' : 'var(--border-subtle)'}`,
                            fontWeight: selected ? 600 : 400,
                            color: selected ? 'var(--text-primary)' : 'var(--text-secondary)',
                          }}
                        >
                          <span className="vault-filename" title={f.filename}>{f.filename}</span>
                          <button
                            className="vault-file-remove"
                            onClick={e => { e.stopPropagation(); removeFromVault(f.id); }}
                            title={`Remove ${f.filename}`}
                          >✕</button>
                        </div>
                      );
                    })}
                  </div>
                )}

                <button
                  className="sidebar-btn"
                  onClick={() => vaultInputRef.current?.click()}
                >
                  <span>⊕</span> Add files
                </button>

                {sessionVault.length > 0 && (
                  <button
                    className="sidebar-btn"
                    onClick={clearVault}
                    style={{ color: 'var(--text-muted)' }}
                  >
                    <span>↺</span> Clear vault
                  </button>
                )}
              </div>

              <div className="sidebar-divider" />

              {/* Clipboard — CT-094 */}
              <div style={{ marginBottom: '16px' }}>
                <div className="sidebar-section-label" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                  <span>Clipboard</span>
                  <span style={{ fontSize: '11px', opacity: 0.5 }}>✂</span>
                </div>
                {conductorOrder.map(m => {
                  const META = PROVIDER_META[m] || {};
                  const clip = clippedResponses[m];
                  const selected = clipInclude[m];
                  return (
                    <div
                      key={m}
                      onClick={() => toggleClipInclude(m)}
                      style={{
                        marginBottom: '4px',
                        padding: '6px 10px',
                        borderRadius: 'var(--radius)',
                        border: `1px solid ${selected ? META.border : clip ? 'var(--border-subtle)' : 'var(--border-subtle)'}`,
                        background: selected ? 'var(--bg-card)' : 'var(--bg-input)',
                        cursor: clip ? 'pointer' : 'default',
                        opacity: clip ? 1 : 0.4,
                        transition: 'background 0.12s, border-color 0.12s',
                        position: 'relative',
                      }}
                    >
                      <div style={{ display: 'flex', alignItems: 'center', gap: '5px', marginBottom: clip ? '3px' : 0 }}>
                        <span style={{ fontFamily: 'JetBrains Mono', fontSize: '10px', color: META.accent, fontWeight: 700 }}>
                          {META.icon} {META.label}
                        </span>
                        {clip && (
                          <span style={{ fontFamily: 'JetBrains Mono', fontSize: '9px', color: 'var(--text-muted)', marginLeft: '2px' }}>
                            {new Date(clip.clippedAt).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}
                          </span>
                        )}
                        {clip && (
                          <button
                            onClick={e => { e.stopPropagation(); clearClip(m); }}
                            style={{
                              marginLeft: 'auto', background: 'none', border: 'none',
                              cursor: 'pointer', color: 'var(--text-muted)', fontSize: '11px',
                              lineHeight: 1, padding: '0 2px', transition: 'color 0.12s'
                            }}
                            title={`Clear ${META.label} clip`}
                          >✕</button>
                        )}
                      </div>
                      {clip ? (
                        <div style={{
                          fontFamily: 'JetBrains Mono', fontSize: '10px',
                          color: selected ? 'var(--text-primary)' : 'var(--text-secondary)',
                          fontWeight: selected ? 600 : 400,
                          overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
                        }}>
                          {clip.text.trim().split('\n').find(l => l.trim()) ? clip.text.trim().split('\n').find(l => l.trim()).slice(0, 60) : '(empty)'}
                        </div>
                      ) : (
                        <div style={{ fontFamily: 'JetBrains Mono', fontSize: '10px', color: 'var(--text-muted)' }}>
                          nothing clipped
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>

              <div className="sidebar-divider" />

              {/* Cost tracker — stub */}
              <div style={{ marginBottom: '16px' }}>
                <div className="sidebar-section-label">Cost</div>
                <div className="sidebar-stub">
                  <span style={{ opacity: 0.7 }}>⊘</span> Not tracked
                </div>
                <div className="sidebar-stub" style={{ fontSize: '10px', justifyContent: 'center', opacity: 0.4 }}>
                  CT-017 · idea
                </div>
              </div>

              <div className="sidebar-spacer" />
              <div className="sidebar-divider" />

              {/* Reset — deliberately last */}
              <div className="sidebar-section-label">Session</div>
              <button
                className="sidebar-btn"
                onClick={clearConversation}
                style={{ color: 'var(--text-muted)' }}
              >
                <span>↺</span> Reset session
              </button>

            </div>
          </aside>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
